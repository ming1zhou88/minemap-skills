<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8"/>
	<meta
		name="viewport"
		content="initial-scale=1,maximum-scale=1,user-scalable=no"
	/>
	<title>经纬度投影下symbol碰撞</title>
	<!--问题的原因是tile的zoom和cameraHeight转的zoom不是一回事，转换除了问题-->
	<link
		rel="stylesheet"
		href="../style/demo.css"
	/>
	<link
		rel="stylesheet"
		href="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap-dark.css"
	/>
	<script src="../../dist/minemap-dev.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map">
	<button
		style="position: absolute; top: 0px; left: 0px; z-index: 10"
		onclick="addzoom()">
		zoom增加
	</button>
</div>
<script>

	minemap.domainUrl = "//210.22.101.138:65074";
	minemap.dataDomainUrl = "//210.22.101.138:65074";
	minemap.serverDomainUrl = "//210.22.101.138:65074";
	minemap.spriteUrl =
		"//210.22.101.138:65074/minemapapi/v2.1.0/sprite/sprite";
	minemap.serviceUrl = "//210.22.101.138:65074/service/";

	/**
	 * key、solution设置
	 */
	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
	minemap.solution = 11001;

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: "map",
		style:
			"../data/style/minemap_style_3.0.0_222557.json" /*底图样式*/,
		center: [119.194352,34.591933] /*地图中心点*/,
		zoom: 15 /*地图默认缩放等级*/,
		pitch: 60 /*地图俯仰角度*/,
		maxZoom: 17 /*地图最大缩放等级*/,
		minZoom: 3 /*地图最小缩放等级*/,
		projection: "LATLON",
	});

	function addzoom() {
		console.log(11111);
		map.zoomIn({duration: 200});
	}
</script>
</body>
</html>
