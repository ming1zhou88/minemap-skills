<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>extrusion自定义高度</title>
    <link rel="stylesheet" href="../style/demo.css" />
    <link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v3.4.0/minemap.css" />
    <script src="../../dist/minemap-dev.js"></script>
    <style>
        body {
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="mapCompare"></div>
    <div id="map"></div>
    <script>
        /**
         * 全局参数设置
         */
         minemap.domainUrl = "https://minedata.cn";
		minemap.dataDomainUrl = "https://minedata.cn";
		minemap.serverDomainUrl = "https://minedata.cn";
		minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
		minemap.serviceUrl = "https://minedata.cn/service/";

		minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
		minemap.solution = 11001;

        var map = new minemap.Map({
            container: "map",
            center: [114.201562, 36.68137],
            zoom: 16.212980701013223,
            pitch: 55.2,
            bearing: 7.9,
            maxZoom: 24,
            minZoom: 0,
            style: {
                IBL: "minemap://assets/IBLtextures",
                sources: {},
                layers: [],
                sprite: "minemap://sprite/sprite",
                glyphs: "minemap://fonts/{fontstack}/{range}",
                version: 8,
            },
        });
        map.repaint = true;
        map.on("load", function () {
            map.addSource("3D_SOURCE", {
                type: "raster",
                tiles: [
                    "https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg",
                ],
                tileSize: 512,
            });
            map.addLayer({
                type: "raster",
                id: "3d-layer",
                source: "3D_SOURCE",
                minzoom: 1,
                maxzoom: 20,
                layout: {},
            });

            map.addLayer({
                id: "vector-layer",
                source: {
                    tiles: [
                        "http://116.132.27.130:30252/service/resource/data/mvt-layer/1086686066281705472/{z}/{x}/{y}",
                    ],
                    type: "vector",
                    //自定义extrusion的高度
                    customHeight: {
                        minimumHeight: 0,
                        maximumHeight: 200
                    }
                },
                maxzoom: 24,
                paint: {
                    "extrusion-height": [
                        "+",
                        ["to-number", ["get", "height"]],
                        ["to-number", ["get", "h0"]],
                    ],
                    "extrusion-color": "#bbbbbb",
                    "extrusion-base": { property: "h0", type: "identity" },
                    "extrusion-opacity": 1,
                    "extrusion-translate-anchor": "map",
                    "extrusion-translate": [0, 0],
                },
                "source-layer": "1086686066281705472",
                type: "extrusion",
                minzoom: 0,
            });
        });

    </script>
</body>

</html>
