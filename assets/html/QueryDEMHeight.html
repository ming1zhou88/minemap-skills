<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no"/>
	<title>DEM高度查询</title>
	<!-- demo样式文件 -->
	<link rel="stylesheet" href="../style/demo.css">
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css">
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}

		#text {
			position: absolute;
			z-index: 999;
			top: 16px;
			right: 14px;
			background: #fff;
			border-radius: 2px;
		}

		.text-content {
			line-height: 38px;
			padding: 0 16px 0 12px;
		}

		.minemap-popup-content {
			font-size: 12px !important;
			font-weight: 400;
			position: relative;
			padding: 0 !important;
			background-color: transparent !important;
		}

		.minemap-popup-anchor-top-left .minemap-popup-tip {
			border-bottom-color: rgba(255, 255, 255, 0) !important;
		}

		.minemap-popup-diy-jw {
			line-height: 28px;
			text-align: center;
			height: 28px;
			border-radius: 2px;
			color: #e5f0ff;
			display: inline-block;
			background: rgba(43, 43, 51, 0.8);
			padding: 0 10px;
		}
	</style>
</head>

<body>
<div id="map"></div>
<div id="text"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = 'https://minemap.minedata.cn';
	minemap.dataDomainUrl = 'https://minemap.minedata.cn';
	minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
	minemap.spriteUrl = 'https://minemap.minedata.cn/minemapapi/v3.4.0/sprite/sprite';
	minemap.serviceUrl = 'https://service.minedata.cn/service';

	/**
	 * token、solution设置
	 */
	minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
	minemap.solution = 11001;

	// 定义空底图样式
	var style = {
		"glyphs": "minemap://fonts/{fontstack}/{range}",
		"sprite": "minemap://sprite/sprite",
		"sources": {},
		"layers": [{
			"id": "background",
			"type": "background",
			"source": "",
			"paint": {
				"background-color": "#005100"
			}
		}],
		"version": 8
	};

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: 'map',
		style: style, /*球面矢量底图样式*/
		center: [122.51933936770776, 39.90749491269932], /*地图中心点*/
		zoom: 5.450618152989758, /*地图默认缩放等级*/
		pitch: 0, /*地图俯仰角度*/
		bearing: 0,/*地图旋转角度*/
		maxZoom: 22, /*地图最大缩放等级*/
		minZoom: 1,  /*地图最小缩放等级*/
		projection: 'MERCATOR'
	});

	const myObj = {
		"获取高度为：": "?米"
	};
	const gui = new lil.GUI({ title: "信息显示->服务查询" });
	const control = gui.add(myObj, "获取高度为：");

	map.on('load', function () {
		/*添加DEM数字高程模型数据*/
		map.addSource("3D_SOURCE", {
			"type": "raster",//DEM的数据类型为"raster"
			"tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			"tileSize": 512,  //瓦片大小
		});
		map.addLayer({
			"type": "raster",//DEM的图层类型为"raster"
			"id": "3d-layer",
			"source": "3D_SOURCE",
			"minzoom": 1,
			"maxzoom": 20,
			"layout": {}
		});
		map.setTerrain({
			type: "terrain", //DEM的数据类型为"raster"
			tiles: ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
			availabilities: ["https://staticdata-b.minedata.cn:14434/dem/layer.json"], // 查询最高级别DEM时必须设定索引文件
			tileSize: 512, //瓦片大小
			maxzoom: 14, //dem最高切分zoom，30米一般是14级；12.5米一般是16级
		});

		const popup = new minemap.Popup({
			closeOnClick: false,
			closeButton: false,
			anchor: 'top-left',
			offset: [10, 5]
		})
			.setHTML(`<div class="minemap-popup-diy-jw">点击获取当前位置高度</div>`)
			.trackPointer() //此方法可以让popup跟随鼠标指针，使用此方法就不再需要使用setLngLat()方法
			.addTo(map)
		// 点击地图，获取位置点高度
		map.on("click", function (e) {
			map.queryAccurateDEMHeightByPoint(e.point).then((point) => {
				control.setValue(point[2].toFixed(2) + '米');
			});

		})
	})
</script>
</body>
