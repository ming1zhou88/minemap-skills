<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>3d-model裁剪</title>
		<!-- demo样式文件 -->
		<link rel="stylesheet" href="../style/demo.css" />
		<!-- 引入MineMap API插件 -->
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<script src="../js/lil-gui.umd.min.js"></script>
		<style>
			#map {
				width: 100%;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<div id="map"></div>
		<script>
			/**
			 * 全局参数设置
			 */
			minemap.domainUrl = "https://minedata.cn";
			minemap.dataDomainUrl = "https://minedata.cn";
			minemap.serverDomainUrl = "https://minedata.cn";
			minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
			minemap.serviceUrl = "https://mineservice.minedata.cn/service/";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;

			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};
			/**
			 * 初始化地图实例
			 */
			var map = new minemap.Map({
				container: "map",
				style: style /*球面矢量底图样式*/,
				center: [116.23307172184752, 40.0688014408867] /*地图中心点*/,
				bearing: -30,
				zoom: 11 /*地图默认缩放等级*/,
				pitch: 0 /*地图俯仰角度*/,
				maxZoom: 22 /*地图最大缩放等级*/,
				minZoom: 1 /*地图最小缩放等级*/,
				projection: "MERCATOR",
				logDepth: true
			});
			map.repaint = true;
			map.enableLight();

			const clippingPlanesEnabled = true;
			const cartographicForRed = new minemap.Math.Vector3([116.2, 40.1, 0]);
			const modelMatrix = minemap.Transforms.cartographicToFixedFrame(cartographicForRed);

			const clippingPlaneCollection = new minemap.ClippingPlaneCollection({
				modelMatrix: modelMatrix,
				edgeColor: new minemap.Color(0, 0, 0, 1), //注意minemap.Color的数据范围是0-1
				edgeWidth: 5.0,
				enabled: clippingPlanesEnabled,
				unionClippingRegions: false,
				planes: [
					new minemap.ClippingPlane({
						position: minemap.Math.Vector3.fromDegrees(116.2, 40.1, 300),
						normal: new minemap.Math.Vector3(1.0, 0.0, 0.0),
						distance: -1000.0
					}),
					new minemap.ClippingPlane({
						position: minemap.Math.Vector3.fromDegrees(116.2, 40.1, 300),
						normal: new minemap.Math.Vector3(-1.0, 0.0, 0.0),
						distance: -1000.0
					}),
					new minemap.ClippingPlane({
						position: minemap.Math.Vector3.fromDegrees(116.2, 40.1, 300),
						normal: new minemap.Math.Vector3(0.0, 1.0, 0.0),
						distance: -1000.0
					}),
					new minemap.ClippingPlane({
						position: minemap.Math.Vector3.fromDegrees(116.2, 40.1, 300),
						normal: new minemap.Math.Vector3(0.0, -1.0, 0.0),
						distance: -1000.0
					}),
					new minemap.ClippingPlane({
						position: minemap.Math.Vector3.fromDegrees(116.2, 40.1, 0),
						normal: new minemap.Math.Vector3(0.0, 0.0, 1.0),
						distance: -800.0
					}),
					new minemap.ClippingPlane({
						position: minemap.Math.Vector3.fromDegrees(116.2, 40.1, 0),
						normal: new minemap.Math.Vector3(0.0, 0.0, -1.0),
						distance: -100.0
					})
				]
			});

			const cartographicForGreen = new minemap.Math.Vector3([116.2, 40.1, 500]);
			const matrixForGreen = minemap.Transforms.cartographicToFixedFrame(cartographicForGreen);

			const greenBoxGeometry = new minemap.Geometries.BoxGeometry({
				width: 2000,
				height: 2000,
				depth: 600
			});
			map.addPrimitive(
				new minemap.Primitive({
					modelMatrix: matrixForGreen,
					geometry: greenBoxGeometry,
					material: minemap.StandardMaterial.fromType("Color", {
						color: "green",
						opacity: 0.5,
						doubleSided: true
					})
				})
			);

			let sceneModel;

			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23
				});

				// 添加glb
				sceneModel = map.addSceneComponent({
					id: "glbModel",
					type: "3d-model", // 数据类型为“3d-model”
					data: "http://192.168.152.123:11187/demo-data/models/house.glb", // 要加载的gltf格式数据
					modelFolder: "http://192.168.152.123:11187/demo-data/models/maps/", // 该数据引用图片等资源的文件夹路径
					scale: [1, 1, 1], // 在xyz轴方向上的缩放比例
					rotation: [90, 0, 0], // 绕xyz轴方向上的旋转，单位为度
					position: [116.24433782743151, 40.07330251849555], // 锚点（模型局部坐标原点）的经纬度位置
					clippingPlanes: clippingPlaneCollection
				});
			});

			function enableClip(e) {
				if (e) {
					sceneModel.clippingPlanes = clippingPlaneCollection;
				} else {
					sceneModel.clippingPlanes = undefined;
				}
			}

			function reverseClip() {
				clippingPlaneCollection.unionClippingRegions = !clippingPlaneCollection.unionClippingRegions;
				for (let i = 0; i < clippingPlaneCollection.length; i++) {
					const plane = clippingPlaneCollection.get(i);
					plane.normal = plane.normal.multiplyScalar(-1);
					plane.distance = -plane.distance;
				}
			}

			const myObj = {
				是否裁剪: true,
				反向裁剪: false
			};
			//添加gui
			const gui = new lil.GUI({ title: "控制菜单" });
			gui.add(myObj, "是否裁剪").onChange(enableClip);
			gui.add(myObj, "反向裁剪").onChange(reverseClip);
		</script>
	</body>
</html>
