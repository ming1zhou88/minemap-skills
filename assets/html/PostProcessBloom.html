<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>bloom辉光</title>
		<script src="../js/lil-gui.umd.min.js"></script>
		<!-- 引入MineMap API插件 -->
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<style>
			html,
			body,
			#map {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<div id="map"></div>
		<script>
			/**
			 * 全局参数设置
			 */
			minemap.domainUrl = "https://minemap.minedata.cn";
			minemap.dataDomainUrl = "https://minemap.minedata.cn";
			minemap.serverDomainUrl = "https://minemap.minedata.cn";
			minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
			minemap.serviceUrl = "https://minedata.cn/service/";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;
			window.minemapCDN = "https://minemap.minedata.cn/minemapapi/minemap-CDN"; // minemapCDN 配置

			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};

			/**
			 * 初始化地图实例
			 */
			var map = new minemap.Map({
				container: "map",
				style: style,
				// style: "https://mineservice.minedata.cn/map/solu/style/11001" /*底图样式*/ /*球面矢量底图样式*/,
				bearing: -87.18744098264303,
				center: [108.94733550459136, 34.30940496948484],
				pitch: 61.603551292866726,
				zoom: 15.7,
				maxZoom: 22 /*地图最大缩放等级*/,
				minZoom: 1 /*地图最小缩放等级*/,
			});

			map.repaint = true;

			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23,
					"depth-test": true
				});

				const tileset = map.addSceneComponent({
					id: "serve",
					type: "3d-tiles",
					show: true,
					translation: new minemap.Math.Vector3(0, 0, 0), //在enu坐标系下的位置移动距离，顺序为[east, north, height]，单位为m，并且只用于3dtiles图层
					url: "https://staticdata-b.minedata.cn:14434/oblique/tileset.json",
					skipLevelOfDetail: false, //跨层调度
					maximumScreenSpaceError: 8,
					allowPick: true
				});
				updateBloomParams(true);
				initializeGUI();
				adjustParameters(true);
			});

			const bloomParams = {
				enabled: true,
				glowOnly: false,
				contrast: 128,
				brightness: -0.53,
				delta: 1.0,
				sigma: 3.78,
				stepSize: 1
			};

			let bloomGUI;
			function initializeGUI() {
				const gui = new lil.GUI({ width: 300 });
				bloomGUI = gui.addFolder("Bloom");

				bloomGUI.open();
				bloomGUI.add({ enabled: true }, "enabled").onChange((value) => {
					map.bloom = value;
					adjustParameters(value);
				});
			}

			function updateBloomParams(value) {
				map.bloom = value;
				if (value) {
					map.postProcessStages.bloom.uniforms.glowOnly = bloomParams.glowOnly;
					map.postProcessStages.bloom.uniforms.contrast = bloomParams.contrast;
					map.postProcessStages.bloom.uniforms.brightness = bloomParams.brightness;
					map.postProcessStages.bloom.uniforms.delta = bloomParams.delta;
					map.postProcessStages.bloom.uniforms.sigma = bloomParams.sigma;
					map.postProcessStages.bloom.uniforms.stepSize = bloomParams.stepSize;
				}
			}

			let glowOnlyFolder, contrastFolder, brightnessFolder, deltaFolder, sigmaFolder, stepSizeFolder;
			function adjustParameters(shouldAdd) {
				if (shouldAdd) {
					glowOnlyFolder = bloomGUI.add(bloomParams, "glowOnly").onChange((value) => {
						map.postProcessStages.bloom.uniforms.glowOnly = value;
					});
					contrastFolder = bloomGUI
						.add(bloomParams, "contrast")
						.min(-255)
						.max(255)
						.step(0.01)
						.onChange((value) => {
							map.postProcessStages.bloom.uniforms.contrast = value;
						});
					brightnessFolder = bloomGUI
						.add(bloomParams, "brightness")
						.min(-1)
						.max(1)
						.step(0.01)
						.onChange((value) => {
							map.postProcessStages.bloom.uniforms.brightness = value;
						});
					deltaFolder = bloomGUI
						.add(bloomParams, "delta")
						.min(1)
						.max(5)
						.step(0.01)
						.onChange((value) => {
							map.postProcessStages.bloom.uniforms.delta = value;
						});
					sigmaFolder = bloomGUI
						.add(bloomParams, "sigma")
						.min(1)
						.max(5)
						.step(0.01)
						.onChange((value) => {
							map.postProcessStages.bloom.uniforms.sigma = value;
						});
					stepSizeFolder = bloomGUI
						.add(bloomParams, "stepSize")
						.min(1)
						.max(5)
						.step(0.01)
						.onChange((value) => {
							map.postProcessStages.bloom.uniforms.stepSize = value;
						});
				} else {
					glowOnlyFolder.destroy();
					contrastFolder.destroy();
					brightnessFolder.destroy();
					deltaFolder.destroy();
					sigmaFolder.destroy();
					stepSizeFolder.destroy();
				}
			}
		</script>
	</body>
</html>
