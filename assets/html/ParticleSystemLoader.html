<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>粒子系统-JSON加载</title>
	<link
		rel="stylesheet"
		href="../style/demo.css"
	/>
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = "https://minedata.cn";
	minemap.dataDomainUrl = "https://minedata.cn";
	minemap.serverDomainUrl = "https://minedata.cn";
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	minemap.serviceUrl = "https://minedata.cn/service/";

	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
	minemap.solution = 11001;
	window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

	// 定义空底图样式
	var style = {
		glyphs: "minemap://fonts/{fontstack}/{range}",
		sprite: "minemap://sprite/sprite",
		sources: {},
		layers: [],
		version: 8
	};

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: "map",
		style: style,
		/*球面矢量底图样式*/
		position: [108.96096727426128, 34.21804256051038, 10.595399474588389],
		/*地图中心点*/
		bearing: -51.867616526228645,
		/*地图默认缩放等级*/
		pitch: 82.50115687814355,
		/*地图俯仰角度*/
		maxZoom: 22,
		/*地图最大缩放等级*/
		minZoom: 1,
		/*地图最小缩放等级*/
		projection: "MERCATOR"
	});
	map.repaint = true;

	map.on("load", function () {
		/*添加栅格图*/
		map.addSource("IMAGERY_SOURCE", {
			type: "raster", //数据源类型：栅格数据源
			tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			tileSize: 512 //瓦片尺寸
		});

		map.addLayer({
			id: "IMAGERY",
			type: "raster", //图层类型为"raster"
			source: "IMAGERY_SOURCE",
			minzoom: 1,
			maxzoom: 23,
			paint: {
				"raster-opacity": 1
			}
		});

		// 通过json的方式加载粒子系统
		new minemap.ParticleSystemLoader(map).load('../data/particle/subEmitter.json', (obj) => {
			obj.traverse((child) => {
				if (child.type === 'ParticleEmitter') {
					map.addParticleSystem(child.system);
				}
			});
			if (obj.type === 'ParticleEmitter') {
				map.addParticleSystem(obj.system);
			}

			// 加载的粒子系统json中looping是false的，需要定时重启，否则不会播放
			setInterval(() => {
				map.restartAllParticleSystems();
			}, 3000);
		});

	});

</script>
</body>
</html>
