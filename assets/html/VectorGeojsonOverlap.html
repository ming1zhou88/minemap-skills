			fillColor: '#FF9800',
			fillOpacity: 0.1,
			fillOutlineColor: '#FF9800',
			fillOutlineWidth: 1.5,

			let features = map.queryRenderedFeatures(
				e.point,
				{ layers: ['fillLayer'] }
				// { layers: ['layer_point-icon', 'layer_point-line'] }
			)
			console.log(features)
			map.getCanvas().style.cursor = features.length ? 'pointer' : ''
		})

		map.on("click", function (e) {
			let features = map.queryRenderedFeatures(e.point, { layers: ['fillLayer'] })
			console.log("----------获取到的所有信息：", features)
		})
	});

	})
