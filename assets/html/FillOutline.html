<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>FillOutline</title>
    <!-- demo样式文件 -->
    <link rel="stylesheet" href="../style/demo.css">
    <!-- 引入MineMap API插件 -->
    <link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.css">
    <!-- <script src="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.js"></script> -->
    <script src="../../dist/minemap-dev.js"></script>
    <style>
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>
        /**
         * 全局参数设置
         */
        minemap.domainUrl = "https://minedata.cn";
        minemap.dataDomainUrl = "https://minedata.cn";
        minemap.serverDomainUrl = "https://minedata.cn";
        minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
        minemap.serviceUrl = "https://minedata.cn/service/";

        minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
        minemap.solution = 11001;
        window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

        var style = {
            "glyphs": "minemap://fonts/{fontstack}/{range}",
            "sprite": "minemap://sprite/sprite",
            "sources": {},
            "layers": [],
            "version": 8
        };

        /**
         * 初始化地图实例
         */
        var map = new minemap.Map({
            container: 'map',
            style: style, /*球面矢量底图样式*/
            center: [116.46, 39.92], /*地图中心点*/
            zoom: 15, /*地图默认缩放等级*/
            pitch: 0, /*地图俯仰角度*/
            maxZoom: 22, /*地图最大缩放等级*/
            minZoom: 1,  /*地图最小缩放等级*/
            projection: 'MERCATOR'
        });
        map.repaint = true;

        map.on('load', function () {
            map.addSource("IMAGERY_SOURCE", {
                "type": "raster",//数据源类型：栅格数据源
                "tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
                "tileSize": 512,//瓦片尺寸
            });

            map.addLayer({
                "id": "IMAGERY",
                "type": "raster", //图层类型为"raster"
                "source": "IMAGERY_SOURCE",
                "minzoom": 1,
                "maxzoom": 23,
            })
            // 增加自定义数据源、自定义图层
            addSources();
            addLayers();
        })
        function addSources() {
            var center = map.getCenter();
            var jsonData = {
                "type": "FeatureCollection",
                "features": [
                    {
                        "type": "Feature",
                        "geometry": {
                            "type": "Polygon",
                            "coordinates": [[[center.lng, center.lat], [center.lng, center.lat - 3], [center.lng - 6, center.lat - 3], [center.lng - 6, center.lat], [center.lng, center.lat]]]
                        }
                    }
                ]
            };
            map.addSource("fillSource", {
                "type": "geojson",
                "data": jsonData
            });
        }

        function addLayers() {
            map.addLayer({
                "id": "fillLayer",
                "type": "fill",//图层类型为"fill"
                "source": "fillSource",
                "layout": {
                    "visibility": "visible",
                },
                "paint": {
                    "fill-color": "rgba(0.0, 0.0, 0.0, 0.5)",
                    "fill-outline-color": "white",
                },
                "minzoom": 1,
                "maxzoom": 17.5
            });
        }
    </script>
</body>
