<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>圆几何体</title>
  <!-- 引入MineMap API插件 -->
  <link rel="stylesheet" href="../../dist/minemap.css" />
  <script src="../../dist/minemap-dev.js"></script>
  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  /**
   * 全局参数设置
   */
  minemap.domainUrl = 'https://minemap.minedata.cn';
  minemap.dataDomainUrl = 'https://minemap.minedata.cn';
  minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
  minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
  minemap.serviceUrl = 'https://service.minedata.cn/service';

  minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
  minemap.solution = 11001;

  // 定义空底图样式
  var style = {
    "glyphs": "minemap://fonts/{fontstack}/{range}",
    "sprite": "minemap://sprite/sprite",
    "sources": {},
    "layers": [],
    "version": 8
  };

  /**
   * 初始化地图实例
   */
  var map = new minemap.Map({
    container: 'map',
    style: style, /*底图样式*/
    center: [109.73630736833147, 38.2902375758749], /*地图中心点*/
    zoom: 14, /*地图默认缩放等级*/
    pitch: 0, /*地图俯仰角度*/
    maxZoom: 22, /*地图最大缩放等级*/
    minZoom: 1,  /*地图最小缩放等级*/
    projection: 'MERCATOR',
	  OIT: true,
  });
  map.repaint = true;
  map.on('load', function () {
	  /*添加栅格图*/
	  map.addSource("IMAGERY_SOURCE", {
		  "type": "raster",//数据源类型：栅格数据源
		  "tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
		  "tileSize": 512,//瓦片尺寸
	  });

	  map.addLayer({
		  "id": "IMAGERY",
		  "type": "raster", //图层类型为"raster"
		  "source": "IMAGERY_SOURCE",
		  "minzoom": 0,
		  "maxzoom": 23
	  });

	  // 波纹圆
	  const positionWorld = minemap.Math.Vector3.fromDegrees(109.73630736833147, 38.2902375758749, 80);
	  let matrix = minemap.Transforms.cartesianToFixedFrame(positionWorld);
	  map.addPrimitive(
		  new minemap.Primitive({
			  modelMatrix: matrix,
			  geometry: new minemap.Geometries.CircleGeometry({
				  radius: 200, // 半径
				  segments: 128, // 分段数
				  thetaStart: 0, // 起始角度
				  thetaLength: Math.PI * 2 // 终止角度
			  }),
			  material: minemap.StandardMaterial.fromType("CircleWave", {
				  color: "#ffff00", // 颜色
				  speed: 1, // 播放速度
				  waveCount: 3, // 波纹数量
				  gradient: 0.5 // 梯度变化
			  })
		  })
	  );

	  // 红色半圆
	  const positionWorld2 = minemap.Math.Vector3.fromDegrees(109.73030736833147, 38.2903675758749, 0);
	  let matrix2 = minemap.Transforms.cartesianToFixedFrame(positionWorld2);
	  map.addPrimitive(
		  new minemap.Primitive({
			  modelMatrix: matrix2,
			  geometry: new minemap.Geometries.CircleGeometry({
				  radius: 200, // 半径
				  segments: 128, // 分段数
				  thetaStart: 0, // 起始角度
				  thetaLength: Math.PI // 终止角度
			  }),
			  material: minemap.StandardMaterial.fromType("Color", {
				  color: "#ff0000", // 颜色
			  })
		  })
	  );

	  // 带纹理的圆
	  const positionWorld3 = minemap.Math.Vector3.fromDegrees(109.74230736833147, 38.2903675758749, 0);
	  let matrix3 = minemap.Transforms.cartesianToFixedFrame(positionWorld3);
	  const texDefault = minemap.TextureLoader.load({ map, texUrl: "../image/Vegetation_Grass_Artificial.jpg" });
	  map.addPrimitive(
		  new minemap.Primitive({
			  modelMatrix: matrix3,
			  geometry: new minemap.Geometries.CircleGeometry({
				  radius: 200, // 半径
				  segments: 128, // 分段数
				  thetaStart: 0, // 起始角度
				  thetaLength: Math.PI * 2 // 终止角度
			  }),
			  material: minemap.StandardMaterial.fromType("Texture", {
				  baseColorMap: texDefault,
				  opacity: 1.0,
			  })
		  })
	  );
  })
</script>
</body>
</html>
