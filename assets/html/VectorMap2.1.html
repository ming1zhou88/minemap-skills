<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>球体矢量图层2.1</title>
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="http://192.168.152.123/minemapapi/v2.1.1/minemap.css">
	<script src="http://192.168.152.123/minemapapi/v2.1.1/minemap.js"></script>
	<style>
		html, body, #map {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = 'https://minemap.minedata.cn';
	minemap.dataDomainUrl = 'https://minemap.minedata.cn';
	minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
	minemap.spriteUrl = 'http://192.168.152.123/minemap-engine/v4.0.0/sprite/sprite';
	minemap.serviceUrl = 'https://service.minedata.cn/service';
	minemap.fontsUrl = 'http://192.168.152.123/minemap-engine/v2.1.1/fonts';

	minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
	minemap.solution = 11001;
	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: 'map',
		style: 'https://service.minedata.cn/map/solu/style/11001', /*底图样式*/
		center: [116.46,39.92], /*地图中心点*/
		zoom: 10, /*地图默认缩放等级*/
		pitch: 0, /*地图俯仰角度*/
		maxZoom: 17, /*地图最大缩放等级*/
		minZoom: 3,  /*地图最小缩放等级*/
		projection: 'MERCATOR'
	});
</script>
</body>
