<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>网格框选交互</title>
		<link
			rel="stylesheet"
			href="../style/demo.css"
		/>
		<link rel="stylesheet" href="http://192.168.152.123/minemapapi/v4.0.0/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<script src="http://192.168.152.123/minemapapi/minemap-plugins/edit/minemap-edit.js"></script>
		<style>
			#map {
				width: 100%;
				height: 100%;
			}
			.box-select {
				background: rgba(111, 124, 150, 0.1);
				border: 2px solid #40c0f5;
				position: absolute;
				top: 0;
				left: 0;
				width: 0;
				height: 0;
			}
		</style>
	</head>
	<body>
		<div class="card-panel card-panel-top-right toolContainer">
			<div class="card-item">
				<p>按下shift键，在网格区域进行框选，选中的区域支持popup交互</p>
			</div>
		</div>
		<div id="map"></div>
		<script>
	  minemap.domainUrl = "https://minedata.cn";
        minemap.dataDomainUrl = "https://minedata.cn";
        minemap.serverDomainUrl = "https://minedata.cn";
        minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
        minemap.serviceUrl = "https://minedata.cn/service/";

        minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
        minemap.solution = 11001;
        window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};

			var map = new minemap.Map({
				container: "map",
				style: style,
				center: [116.46, 39.92],
				zoom: 9,
				pitch: 0,
				maxZoom: 17,
				minZoom: 3,
				boxZoom: false,
				projection: "MERCATOR"
			});

			var center = map.getCenter();
			var container = map.getCanvasContainer();
			// 起始点和动态移动点
			var startPoint;
			var currentPoint;
			var boxContainer;

			var popup = new minemap.Popup({ closeOnClick: true, closeButton: false, offset: [0, 0] });

			/**
			 * 创建地图对象后，开始加载地图资源，地图资源加载完成后触发load事件
			 */
			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23
				});
				// 增加自定义数据源、自定义图层
				minemap.util.getJSON(
					"https://minedata.cn/nce-static/support/demo/js-3d-ultra/zh/assets/grid_data.json",
					function (error, data) {
						addSources(data);
						addLayers();
					}
				);

				container.addEventListener("mousedown", onMouseDown, true);
				map.on("mousemove", onMouseHighlightMove);
			});

			function addSources(data) {
				map.addSource("gridSource", {
					type: "geojson",
					data: data
				});
			}

			function addLayers() {
				//添加所有数据
				map.addLayer({
					id: "grid-layer",
					type: "fill",
					source: "gridSource",
					paint: {
						"fill-outline-color": "rgba(1,0,0,0.4)",
						"fill-color": "rgba(1,0,0,0.4)"
					}
				});

				//添加查询后的数据
				map.addLayer({
					id: "grid-highlighted-layer",
					type: "fill",
					source: "gridSource",
					paint: {
						"fill-outline-color": "#336699",
						"fill-color": "#4477aa",
						"fill-opacity": 0.75
					},
					filter: ["in", "name", ""]
				});
			}

			function getMousePos(e) {
				var rect = container.getBoundingClientRect();
				return new minemap.Math.Vector2(
					e.clientX - rect.left - container.clientLeft,
					e.clientY - rect.top - container.clientTop
				);
			}

			function onMouseDown(e) {
				// 检测shift按键是否按下
				if (!(e.shiftKey && e.button === 0)) return;
				// 获取起始点坐标
				startPoint = getMousePos(e);
				//禁止拖拽
				map.dragPan.disable();
				// 注册事件
				document.addEventListener("mousemove", onMouseMove);
				document.addEventListener("mouseup", onMouseUp);
				document.addEventListener("keydown", onKeyDown);
			}

			function onMouseMove(e) {
				// 获取当前点坐标
				currentPoint = getMousePos(e);
				// 检测box的Dom容器是否存在
				if (!boxContainer) {
					boxContainer = document.createElement("div");
					boxContainer.classList.add("box-select");
					container.appendChild(boxContainer);
				}
				var minX = Math.min(startPoint.x, currentPoint.x),
					maxX = Math.max(startPoint.x, currentPoint.x),
					minY = Math.min(startPoint.y, currentPoint.y),
					maxY = Math.max(startPoint.y, currentPoint.y);

				var pos = "translate(" + minX + "px," + minY + "px)";
				boxContainer.style.transform = pos;
				boxContainer.style.WebkitTransform = pos;
				boxContainer.style.width = maxX - minX + "px";
				boxContainer.style.height = maxY - minY + "px";
			}

			function onMouseUp(e) {
				finish([startPoint, getMousePos(e)]);
			}

			function onKeyDown(e) {
				// 当ESC按键被按下时
				if (e.keyCode === 27) finish();
			}

			function finish(bbox) {
				// 注销事件
				document.removeEventListener("mousemove", onMouseMove);
				document.removeEventListener("keydown", onKeyDown);
				document.removeEventListener("mouseup", onMouseUp);
				if (boxContainer) {
					boxContainer.parentNode.removeChild(boxContainer);
					boxContainer = null;
				}
				// 如果选框存在那么执行查询几何信息
				if (bbox) {
					var features = map.queryRenderedFeatures(bbox, { layers: ["grid-layer"] });
					var filter = features.reduce(
						function (memo, feature) {
							memo.push(feature.properties.name);
							return memo;
						},
						["in", "name"]
					);
					map.setFilter("grid-highlighted-layer", filter);
				}
				map.dragPan.enable();
			}

			function onMouseHighlightMove(e) {
				var features = map.queryRenderedFeatures(e.point, { layers: ["grid-highlighted-layer"] });
				// 改变鼠标样式
				map.getCanvas().style.cursor = features.length ? "pointer" : "";
				if (!features.length) {
					popup.remove();
					return;
				}
				var feature = features[0];
				popup.setLngLat(e.lngLat).setText(feature.properties.count).addTo(map);
			}
		</script>
	</body>
</html>
