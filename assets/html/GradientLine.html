<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>渐变线</title>
	<!-- demo样式文件 -->
	<link rel="stylesheet" href="../style/demo.css">
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css">
	<script src="../../dist/minemap-dev.js"></script>
	<script type="text/javascript" src="../js/lil-gui.umd.min.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = 'https://minemap.minedata.cn';
	minemap.dataDomainUrl = 'https://minemap.minedata.cn';
	minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	minemap.serviceUrl = 'https://service.minedata.cn/service';

	minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
	minemap.solution = 11001;

	// 定义空底图样式
	const style = {
		"glyphs": "minemap://fonts/{fontstack}/{range}",
		"sprite": "minemap://sprite/sprite",
		"sources": {},
		"layers": [],
		"version": 8
	};

	/**
	 * 初始化地图实例
	 */
	const map = new minemap.Map({
		container: 'map',
		style: style, /*球面矢量底图样式*/
		center: [116.398426, 39.935657],
		zoom: 15.8, /*地图默认缩放等级*/
		pitch: 0, /*地图俯仰角度*/
		maxZoom: 22, /*地图最大缩放等级*/
		minZoom: 1,  /*地图最小缩放等级*/
		projection: 'MERCATOR'
	});
	map.on('load', function() {
		/*添加栅格图*/
		map.addSource("IMAGERY_SOURCE", {
			"type": "raster",//数据源类型：栅格数据源
			"tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			"tileSize": 512,//瓦片尺寸
		});

		map.addLayer({
			"id": "IMAGERY",
			"type": "raster", //图层类型为"raster"
			"source": "IMAGERY_SOURCE",
			"minzoom": 0,
			"maxzoom": 23,
		});
		map.repaint = true;
		const geojsonData = {
			"type": "FeatureCollection", // 固定为FeatureCollection类型
			"features": [
				{
					"type": "Feature",
					"id": "line-001", // 可选：要素唯一标识
					"properties": {
						"values": [0, 60, 80],
						"name": "测试渐变线",
						"type": "demo-line"
					},
					"geometry": {
						"type": "LineString",
						"coordinates": [
							[116.398426, 39.935657, 5],    // 顶点1：业务值0 → 对应绿色(rgba(0,255,0,1))
							[116.398426, 39.93331, 5],    // 顶点2：业务值60 → 对应蓝色(rgba(0,0,255,1))
							[116.400459, 39.93331, 5]     // 顶点3：业务值80 → 对应红色(rgba(255,0,0,1))
						]
					}
				}]
		};
		// 修改属性这么操作
		// gradientLine.setWidth(20);
		// gradientLine.setColor([
		// 		[0, "rgba(255,255,0,1)"],
		// 		[100, "rgba(0,255,255,1)"]
		// 	]);
		// gradientLine.setOpacity(0.5);
		map.addSceneComponent(new minemap.GradientLine(
			{
				"id": "jianbianxian",
				"data": geojsonData,
				"gradient-line-width": 10,
				// "gradient-line-value-key": "speed", 指定从properties中读取哪个属性作为顶点值（默认values）
				"gradient-line-color": [
					[0, "rgba(0,255,0,1)"],
					[60, "rgba(0,0,255,1)"],
					[80, "rgba(255,0,0,1)"]
				],
				"gradient-line-opacity": 1.0,
			}
		));
	})
</script>
</body>
