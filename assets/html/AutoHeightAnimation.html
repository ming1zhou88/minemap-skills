		});

		});

		const animationMode = gui.addFolder("动画设置");
		animationMode.open();
		animationMode.add(params, "播放速度", 0.1, 10).onChange((value) => {
			updateSpeed(value);
		});
		pauseButton = animationMode.add(params, "暂停");
		stopButton = animationMode.add(params, "停止");
		animationMode.add(params, "复位");

		const animationEdit = gui.addFolder("动画编辑");
		timeAxis = animationEdit.add(params, "时间轴", 0.1, 30).onChange((value) => {
			if (!animationBlender) {

			}

				animationBlender.currentTime = value; // 设置当前动画运行的时间(动画起止时间差值，单位：秒)

	// 创建跟踪路径
	function createTrackingPath() {
		const redRoute = new minemap.Geometries.PolylineGeometry({
			positions: animationPositions,
			width: 2,
			arcType: minemap.ARCTYPE.GEODESIC
		});

		const redRouteMaterial = new minemap.PolylineMaterial({
			color: "yellow"
		});

		const redRoutePrimitive = new minemap.Primitive({
			geometry: redRoute,
			material: redRouteMaterial,
			name: "redRoutePrimitive",
			adaptTerrain: true
		});

		map.addPrimitive(redRoutePrimitive);
	}

	// 创建动画并播放
	function playAnimation() {
		carModel.rotation = [90, -90, 0];
		const content = {
			id: "cartoon_car",
			type: "model",
			reference: "ellipsoid",
			positions: trackPositions,
			times: {
				start: "2023-08-21T11:30:00.000Z",
				end: "2023-08-21T11:30:30.000Z"
			},
			loop: "repeat", //repeat、once、 none
			autoPlay: true, // 默认:false
			autoHeight: true
		};
		const animationJson = {
			documnet: "Animation",
			contents: [content]
		};

		const animation = map.animationManager.add(animationJson);
		animation.then((value) => {
			animationBlender = value[0];
			timeAxis.max(animationBlender.duration); // 设置时间轴最大值
			// animationBlender.onPlay = (event) => {
			// 	console.log("Play", event);
			// }; // 开始播放时的回调
			animationBlender.onPlaying = (event) => {
				timeAxis.setValue(event.time);
				// console.log("Playing", event);
			}; // 播放时的回调，参数包含动画时间和模型状态
			// animationBlender.onPause = (event) => {
			// 	console.log("Pause", event);
			// }; // 暂停播放时的回调
			// animationBlender.onStop = (event) => {
			// 	console.log("Stop", event);
			// }; // 停止播放时的回调
			// animationBlender.onReset = (event) => {
			// 	console.log("Reset", event);
			// }; // 重置播放时的回调
		});
	}

	// 暂停、停止、复位
	function pause() {
		if (!animationBlender) {
			return;
		}

		if (pauseButton.$button.children[0].innerText === "暂停") {
			pauseButton.$button.children[0].innerText = "继续";
			animationBlender.pause();
		} else {
			carModel.rotation = [90, -90, 0];
			pauseButton.$button.children[0].innerText = "暂停";
			animationBlender.play();
		}
	}

	function stop() {
		if (!animationBlender) {
			return;
		}

		if (stopButton.$button.children[0].innerText === "停止") {
			stopButton.$button.children[0].innerText = "开始";
			pauseButton.disable();
			pickAndDragButton.disable();
			animationBlender.stop();
			carModel.rotation = [90, -160, 0];
		} else {
			reset();
		}
	}

	function reset() {
		if (!animationBlender) {
			return;
		}
		animationBlender.reset();
		carModel.rotation = [90, -90, 0];
		pauseButton.enable();
		pickAndDragButton.enable();
		pauseButton.$button.children[0].innerText = "暂停";
		stopButton.$button.children[0].innerText = "停止";
	}

	function pickAndDragModel() {
		dragModel = true;
		pickAndDragButton.$button.style.backgroundColor = "green";
	}

	function updateSpeed(value) {
		if (!animationBlender) {
			return;
		}
		animationBlender.speed = value;
	}

	let selectModel;
	map.on("mousedown", (e) => {
		if (dragModel) {
			map.cameraController.enableInputs = false;
			const feature = map.getFeatureByGPUPick(e.point);
			if (feature !== undefined) {
				let parent = feature.parent;
				while (parent) {
					parent = parent.parent;
					if (parent.type === "3d-model") {
						selectModel = parent;
						animationBlender.pause();
						modelNameButton.setValue(parent.id);
						break;
					}
				}
			}
		}
	});

	map.on("mouseup", () => {
		if (dragModel) {
			dragModel = false;
			selectModel = undefined;
			if (pauseButton.$button.children[0].innerText === "暂停") {
				animationBlender.play();
			}
			map.cameraController.enableInputs = true;
			modelNameButton.setValue("");
		}

		pickAndDragButton.$button.style.backgroundColor = "";
	});

	map.on("mousemove", function (e) {
		if (dragModel && selectModel !== undefined && animationBlender !== undefined) {
			const point = map.painter.getPositionByGPUPick(e.point);
			const pickPosition = minemap.Math.Vector3.fromDegrees(point.x, point.y, point.z);
			updateModelAnimationByPick(
				selectModel,
				animationBlender,
				pickPosition,
				pickTolerance,
				animationPositions
			);
		}
	});

	// Attention:
	// 1. 所有轨迹点之间的时间间隔都是相同的，动画的速度取决于轨迹点之间的时间间隔

	/**
	 * 更新模型位置和动画运行时间
	 * @param {SceneModel} model 模型对象
	 * @param {AnimationBlender} blender 动画混合器对象
	 * @param {Vector3} pickPosition 鼠标拾取点(世界坐标)
	 * @param {number} tolerance 点吸附线容差
	 * @param {Vector3[]} positions 轨迹点数组(世界坐标)
	 */
	function updateModelAnimationByPick(model, blender, pickPosition, tolerance, positions) {
		if (positions.length >= 2) {
			const duration = blender.duration;
			let minDist = Infinity;
			// 点吸附线信息，包含吸附点索引和吸附点坐标
			let adsorptionInformation = {
				index: undefined,
				point: undefined
			};
			let totalDist = 0;
			let insectPointDist = 0;
			for (let i = 1; i < positions.length; i++) {
				// 计算拾取点到轨迹线段的投影
				const segment = minemap.Math.Vector3.subtract(positions[i], positions[i - 1]);
				const segmentToPoint = minemap.Math.Vector3.subtract(pickPosition, positions[i - 1]);
				const projection =
					minemap.Math.Vector3.dot(segmentToPoint, segment) /
					minemap.Math.Vector3.magnitudeSquared(segment);
				// 若投影在线段上，则计算拾取点到线段投影点的世界坐标
				if (projection >= 0 && projection <= 1) {
					// 计算投影点的世界坐标
					const insectPoint = minemap.Math.Vector3.add(
						positions[i - 1],
						segment.multiplyScalar(projection)
					);
					// 计算拾取点到投影点的距离，若小于容差则吸附到该点
					const dist = minemap.Math.Vector3.distance(pickPosition, insectPoint);
					if (dist < minDist && dist < tolerance) {
						minDist = dist;
						adsorptionInformation.index = i;
						adsorptionInformation.point = insectPoint;
						insectPointDist = dist;
					}
				}
				totalDist += minemap.Math.Vector3.distance(positions[i], positions[i - 1]);
			}

			if (adsorptionInformation.point !== undefined) {
				model.position = adsorptionInformation.point;
				// 计算投影点所对应的动画运行时间
				let currentTime = ((adsorptionInformation.index - 1) / (positions.length - 1)) * duration;
				currentTime +=
					(insectPointDist /
						minemap.Math.Vector3.distance(
							positions[adsorptionInformation.index],
							positions[adsorptionInformation.index - 1]
						) /
						(positions.length - 1)) *
					duration;
				// 设置当前动画运行的时间(动画起止时间差值，单位：秒)
				blender.currentTime = currentTime;
			}
		}
	}

	/**
	 * 更新模型位置和动画运行时间
	 * @param {SceneModel} model 模型对象
	 * @param {AnimationBlender} blender 动画混合器对象
	 * @param {number} currentTime 当前动画运行的时间(动画起止时间差值，单位：秒)
	 * @param {Vector3[]} positions 轨迹点数组(世界坐标)
	 */
	function updateModelAnimationByTime(model, blender, currentTime, positions) {
		const unitInterval = blender.duration / (positions.length - 1); // 计算轨迹段之间的时间间隔
		const index = Math.floor(currentTime / unitInterval); // 计算当前时间所在的轨迹段起点索引
		const periodOfTime = currentTime % unitInterval; // 计算当前时间在当前轨迹某一段轨迹中的时间
		// 计算当前时间在当前轨迹段中的位置，并更新模型位置和设置动画运行时间
		let position;
		if (index < positions.length - 1) {
			const direction = minemap.Math.Vector3.subtract(positions[index + 1], positions[index]).normalize();
			position = positions[index].add(direction.multiplyScalar(periodOfTime));
		} else {
			position = positions[index];
		}

		model.position = position;
		blender.currentTime = currentTime; // 设置当前动画运行的时间(动画起止时间差值，单位：秒)
	}
</script>
