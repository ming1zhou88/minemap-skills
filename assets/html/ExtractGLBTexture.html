<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>提取GLB模型纹理</title>
		<link rel="stylesheet" href="../style/demo.css" />
		<!-- 引入MineMap API插件 -->
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<style>
			html,
			body,
			#map {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
			}
			img {
				z-index: 999;
				position: absolute;
				height: 250px;
				width: 250px;
				top: 20px;
				right: 20px;
				border: #ffce00 3px solid;
			}
			h2 {
				position: absolute;
				top: 120px;
				right: 60px;
				color: #ffce00;
				z-index: 999;
			}
		</style>
	</head>

	<body>
		<div id="map">
			<img id="imgTest" src="../data/image/ponds.jpg" />
			<h2>点击提取GLB模型纹理</h2>
		</div>
		<script>
			minemap.domainUrl = "https://minedata.cn";
			minemap.dataDomainUrl = "https://minedata.cn";
			minemap.serverDomainUrl = "https://minedata.cn";
			minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
			minemap.serviceUrl = "https://minedata.cn/service/";
			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;

			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};

			/**
			 * 初始化地图实例
			 */
			var map = new minemap.Map({
				container: "map",
				// style: 'https://service.minedata.cn/map/solu/style/11001',
				style: style,
				center: [116.463, 39.918],
				zoom: 15.5,
				pitch: 30,
				maxZoom: 20,
				minZoom: 3,
				projection: "MERCATOR",
				minHeightToDemSurface: 1 // 设置碰撞检测距离阈值，默认为5m，支持自行定义
			});

			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23
				});

				//glb 无法读取baseColorTexture
				map.addSceneComponent({
					id: "swglb",
					type: "3d-model",
					data: "../data/swglb/SWTX_ALL.glb", // 要加载的gltf格式数据
					// modelFolder: "../data/buildings/interior/", // 该数据引用图片等资源的文件夹路径
					scale: [5, 5, 5], // 在xyz轴方向上的缩放比例
					rotation: [90, 90, 0], // 绕xyz轴方向上的旋转，单位为度
					position: [116.455, 39.915, 0], // 锚点（模型局部坐标原点）的经纬度位置
					allowPick: true, // 碰撞检测需要开启拾取
					loaded: (model) => {}
				});
			});

			let prePrimitive;
			let preMaterial;
			map.on("click", function (e) {
				const feature = map.getFeatureByGPUPick(e.point);
				if (feature && feature.material) {
					if (feature.material.baseColorMap) {
						const gl = map.painter.context.gl;
						let texture = feature.material.baseColorMap.texture;
						let width = feature.material.baseColorMap.width;
						let height = feature.material.baseColorMap.height;

						let img = minemap.Texture.createImageFromTexture(gl, texture, width, height);
						document.getElementById("imgTest").src = img.src;
					}
				} else {
					console.log("未选中任何要素");
				}
			});
		</script>
	</body>
</html>
