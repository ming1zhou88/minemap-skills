<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>矢量symbol文字在北极显示</title>
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<style>
		html, body, #map {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = 'https://minemap.minedata.cn';
	minemap.dataDomainUrl = 'https://minemap.minedata.cn';
	minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	minemap.serviceUrl = 'https://service.minedata.cn/service';

	minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
	minemap.solution = 11001;

	// 定义空底图样式
	var style = {
		"glyphs": "minemap://fonts/{fontstack}/{range}",
		"sprite": "minemap://sprite/sprite",
		"sources": {},
		"layers": [],
		"version": 8
	};

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: 'map',
		style, /*底图样式*/
		center: [90.0, 90.0], /*地图中心点*/
		zoom: 2, /*地图默认缩放等级*/
		pitch: 0, /*地图俯仰角度*/
		maxZoom: 22, /*地图最大缩放等级*/
		minZoom: 1,  /*地图最小缩放等级*/
		projection: 'MERCATOR',
		skyBox: false
	});

	map.on('load', function () {
		addSources();
		addLayers();
	});

	function addSources() {
		const symbolData = {
			"type": "FeatureCollection",
			"features": [
				{
					"type": "Feature",
					"geometry": {
						"type": "Point",
						"coordinates": [90.0, 90.0]
					},
					"properties": {
						"title": "北极",
						"kind": "school"
					},
				}
			]
		};
		map.addSource("customSource", {
			"type": "geojson",
			"data": symbolData
		});
	}

	function addLayers() {
		map.addLayer({
			"id": "pointLayer",
			"type": "symbol",
			"source": "customSource",
			"layout": {
				"visibility": "visible",
				"text-field": "{title}",
				"text-offset": [0, 0.6],
				"text-anchor": "top",
				"text-size": 25,
				"icon-allow-overlap": true,
				"text-allow-overlap": true,
			},
			"paint": {
				"icon-color": {
					"type": "categorical",
					"property": "kind",
					"stops": [["school", "#ff0000"], ["park", "#00ff00"]],
					"default": "#ff0000"
				},
				"text-color": {
					"type": "categorical",
					"property": "kind",
					"stops": [["school", "#ff0000"], ["park", "#00ff00"]],
					"default": "#ff0000"
				},
				"text-halo-color": "#000000",
				"text-halo-width": 0.5,
			},
			"minzoom": 1,
			"maxzoom": 17.5,
			"filter": ['in', '$type', 'Point']
		});
	}

</script>
</body>
</html>
