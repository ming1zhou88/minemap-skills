<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>Physically Based Rendering Material</title>
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<script src="../js/lil-gui.umd.min.js"></script>
		<style>
			html,
			body,
			#map {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				font-size: 12px;
			}
		</style>
	</head>
	<body>
		<div id="map"></div>
		<script>
			minemap.domainUrl = "https://minedata.cn";
			minemap.serverDomainUrl = "https://minedata.cn";
			minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
			window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";

			const style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};
			const map = new minemap.Map({
				container: "map",
				style: style,
				center: [116.26444, 40.05687],
				pitch: 51.694,
				bearing: -177.317,
				zoom: 16,
				maxZoom: 22,
				minZoom: 1
			});
			map.repaint = true;
			map.on("load", function () {
				initializeGUI();
				addRasterLayer();
				addPrimitive();
			});

			// 开启光影
			map.enableLight();
			map.enableShadow();

			// 材质参数
			const exampleParams = {
				example: "sphere"
			};
			const sunParams = {
				year: 2024,
				month: 6,
				day: 6,
				hours: 10,
				minutes: 0,
				seconds: 0,
				castShadow: true,
				intensity: 1,
				shadowBias: 0,
				shadowNormalBias: 0.5,
				shadowRadius: 3
			};

			map.setSunLightTime(sunParams);
			const sunLight = map.getLights().sunLight;

			sunLight.intensity = sunParams.intensity;
			sunLight.castShadow = sunParams.castShadow;
			sunLight.shadow.bias = sunParams.shadowBias;
			sunLight.shadow.normalBias = sunParams.shadowNormalBias;
			sunLight.shadow.radius = sunParams.shadowRadius;

			const materialParams = {
				baseColor: "#ffffff",
				metallic: 0.0,
				roughness: 1.0,
				emissive: "#000000",
				specularColor: "#ffffff",
				baseColorMap: null,
				roughnessMap: null,
				metallicMap: null,
				emissiveMap: null,
				specularColorMap: null,
				normalMap: null,
				alphaMap: null,
				// aoMap: null,
				// lightMap: null,
				envMap: null,
				emissiveIntensity: 1.0,
				// aoMapIntensity: 1.0,
				// lightMapIntensity: 1.0,
				envMapIntensity: 1.0,
				specularIntensity: 1.0,
				specularIntensityMap: null,
				ior: 1.5,
				sheen: 0.0,
				sheenColor: "#ffffff",
				sheenColorMap: null,
				sheenRoughness: 1.0,
				sheenRoughnessMap: null,
				clearcoat: 0.0,
				clearcoatMap: null,
				clearcoatRoughness: 0.0,
				clearcoatRoughnessMap: null,
				clearcoatNormalMap: null
			};

			const models = {
				sphere: "sphere",
				model: "model"
			};

			const textures = {
				envMap: minemap.TextureLoader.load({
					map,
					texUrl: "../image/envMap2.hdr",
					minFilter: minemap.WebGLConstants.LINEAR,
					magFilter: minemap.WebGLConstants.LINEAR,
					wrapS: minemap.WebGLConstants.CLAMP_TO_EDGE,
					wrapT: minemap.WebGLConstants.CLAMP_TO_EDGE,
					pixelFormat: minemap.WebGLConstants.RGBA,
					pixelDatatype: minemap.WebGLConstants.HALF_FLOAT,
					resourceFormat: "HDR"
				}),
				baseColorMap: minemap.TextureLoader.load({
					map,
					texUrl: "../image/brick_diffuse.jpg",
					minFilter: minemap.WebGLConstants.LINEAR,
					magFilter: minemap.WebGLConstants.LINEAR,
					wrapS: minemap.WebGLConstants.REPEAT,
					wrapT: minemap.WebGLConstants.REPEAT
				}),
				roughnessMap: minemap.TextureLoader.load({
					map,
					texUrl: "../image/brick_roughness.jpg",
					minFilter: minemap.WebGLConstants.LINEAR,
					magFilter: minemap.WebGLConstants.LINEAR,
					wrapS: minemap.WebGLConstants.REPEAT,
					wrapT: minemap.WebGLConstants.REPEAT
				}),
				alphaMap: minemap.TextureLoader.load({
					map,
					texUrl: "../image/alphaMap.jpg",
					minFilter: minemap.WebGLConstants.LINEAR,
					magFilter: minemap.WebGLConstants.LINEAR,
					wrapS: minemap.WebGLConstants.REPEAT,
					wrapT: minemap.WebGLConstants.REPEAT
				}),
				normalMap: minemap.TextureLoader.load({
					map,
					texUrl: "../data/image/Water_1_M_Normal.jpg",
					minFilter: minemap.WebGLConstants.LINEAR,
					magFilter: minemap.WebGLConstants.LINEAR,
					wrapS: minemap.WebGLConstants.REPEAT,
					wrapT: minemap.WebGLConstants.REPEAT
				})
			};
			const maps = {
				none: null
			};
			const baseColorMaps = {
				none: null,
				baseColorMap: "baseColorMap"
			};
			const roughnessMaps = {
				none: null,
				roughnessMap: "roughnessMap"
			};
			const normalMaps = {
				none: null,
				normalMap: "normalMap"
			};
			const alphaMaps = {
				none: null,
				alphaMap: "alphaMap"
			};
			const envMaps = {
				none: null,
				envMap: "envMap"
			};

			let materialSphere, material, model;

			function initializeGUI() {
				const gui = new lil.GUI({ width: 300, closeFolders: true });
				const example = gui.addFolder("Example");
				const materialMenu = gui.addFolder("Material");
				const sun = gui.addFolder("Sun Light");

				materialMenu.open();
				// albedo
				materialMenu.addColor(materialParams, "baseColor").onChange((value) => {
					material.baseColor = minemap.Color.parse(value).toVector4();
				});
				materialMenu.add(materialParams, "baseColorMap", baseColorMaps).onChange((value) => {
					material.baseColorMap = textures[value] ?? null;
				});

				// roughness
				materialMenu
					.add(materialParams, "roughness")
					.min(0.04)
					.max(1)
					.step(0.01)
					.onChange((value) => {
						material.roughness = value;
					});
				materialMenu.add(materialParams, "roughnessMap", roughnessMaps).onChange((value) => {
					material.roughnessMap = textures[value] ?? null;
				});

				// metallic
				materialMenu
					.add(materialParams, "metallic")
					.min(0)
					.max(1)
					.step(0.01)
					.onChange((value) => {
						material.metallic = value;
					});
				materialMenu.add(materialParams, "metallicMap", alphaMaps).onChange((value) => {
					material.metallicMap = textures[value] ?? null;
				});

				// emissive
				materialMenu.addColor(materialParams, "emissive").onChange((value) => {
					material.emissive = minemap.Color.parse(value).toVector3();
				});
				materialMenu.add(materialParams, "emissiveMap", baseColorMaps).onChange((value) => {
					material.emissiveMap = textures[value] ?? null;
				});
				materialMenu
					.add(materialParams, "emissiveIntensity")
					.min(0)
					.max(10)
					.step(0.1)
					.onChange((value) => {
						material.emissiveIntensity = value;
					});

				// specular
				materialMenu.addColor(materialParams, "specularColor").onChange((value) => {
					material.specularColor = minemap.Color.parse(value).toVector3();
				});
				materialMenu.add(materialParams, "specularColorMap", baseColorMaps).onChange((value) => {
					material.specularColorMap = textures[value] ?? null;
				});
				materialMenu
					.add(materialParams, "specularIntensity")
					.min(0)
					.max(1)
					.step(0.01)
					.onChange((value) => {
						material.specularIntensity = value;
					});
				materialMenu.add(materialParams, "specularIntensityMap", alphaMaps).onChange((value) => {
					material.specularIntensityMap = textures[value] ?? null;
				});

				// normal
				materialMenu.add(materialParams, "normalMap", normalMaps).onChange((value) => {
					material.normalMap = textures[value] ?? null;
				});

				// alpha
				materialMenu.add(materialParams, "alphaMap", alphaMaps).onChange((value) => {
					material.alphaMap = textures[value] ?? null;
				});

				// ao 暂时无效
				// materialMenu.add(materialParams, "aoMap", maps).onChange((value) => {
				// 	material.aoMap = textures[value] ?? null;
				// });
				// materialMenu.add(materialParams, "aoMapIntensity").min(0).max(10).step(0.1).onChange((value) => {
				// 	material.aoMapIntensity = value;
				// });

				// lightMap 暂时无效
				// materialMenu.add(materialParams, "lightMap", maps).onChange((value) => {
				// 	material.lightMap = textures[value] ?? null;
				// });
				// materialMenu.add(materialParams, "lightMapIntensity").min(0).max(10).step(0.1).onChange((value) => {
				// 	material.lightMapIntensity = value;
				// });

				// envMap
				materialMenu.add(materialParams, "envMap", envMaps).onChange((value) => {
					material.envMap = textures[value] ?? null;
				});
				materialMenu
					.add(materialParams, "envMapIntensity")
					.min(0)
					.max(10)
					.step(0.1)
					.onChange((value) => {
						material.envMapIntensity = value;
					});

				materialMenu
					.add(materialParams, "ior")
					.min(1.0)
					.max(2.33)
					.step(0.1)
					.onChange((value) => {
						material.ior = value;
					});

				// sheen
				materialMenu
					.add(materialParams, "sheen")
					.min(0)
					.max(1)
					.step(0.01)
					.onChange((value) => {
						material.sheen = value;
					});
				materialMenu.addColor(materialParams, "sheenColor").onChange((value) => {
					material.sheenColor = minemap.Color.parse(value).toVector3();
				});
				materialMenu.add(materialParams, "sheenColorMap", baseColorMaps).onChange((value) => {
					material.sheenColorMap = textures[value] ?? null;
				});
				materialMenu
					.add(materialParams, "sheenRoughness")
					.min(0.04)
					.max(1)
					.step(0.01)
					.onChange((value) => {
						material.sheenRoughness = value;
					});
				materialMenu.add(materialParams, "sheenRoughnessMap", maps).onChange((value) => {
					material.sheenRoughnessMap = textures[value] ?? null;
				});

				// clear cost
				materialMenu
					.add(materialParams, "clearcoat")
					.min(0)
					.max(1)
					.step(0.01)
					.onChange((value) => {
						material.clearcoat = value;
					});
				materialMenu.add(materialParams, "clearcoatMap", maps).onChange((value) => {
					material.clearcoatMap = textures[value] ?? null;
				});
				materialMenu
					.add(materialParams, "clearcoatRoughness")
					.min(0)
					.max(1)
					.step(0.04)
					.onChange((value) => {
						material.clearcoatRoughness = value;
					});
				materialMenu.add(materialParams, "clearcoatRoughnessMap", maps).onChange((value) => {
					material.clearcoatRoughnessMap = textures[value] ?? null;
				});
				materialMenu.add(materialParams, "clearcoatNormalMap", maps).onChange((value) => {
					material.clearcoatNormalMap = textures[value] ?? null;
				});

				example.open();
				example.add(exampleParams, "example", models).onChange((value) => {
					switch (value) {
						case "sphere":
							removeModel();
							addPrimitive();
							break;
						case "model":
							removePrimitive();
							addModel();
							break;
					}
				});

				sun.add(sunParams, "month")
					.min(1)
					.max(12)
					.step(1)
					.onChange((value) => {
						map.setSunLightTime(sunParams);
					});
				sun.add(sunParams, "day")
					.min(1)
					.max(30)
					.step(1)
					.onChange((value) => {
						map.setSunLightTime(sunParams);
					});
				sun.add(sunParams, "hours")
					.min(0)
					.max(23)
					.step(1)
					.onChange((value) => {
						map.setSunLightTime(sunParams);
					});
				sun.add(sunParams, "minutes")
					.min(0)
					.max(59)
					.step(1)
					.onChange((value) => {
						map.setSunLightTime(sunParams);
					});
				sun.add(sunParams, "castShadow").onChange((value) => {
					map.getLights().sunLight.castShadow = value;
				});
				sun.add(sunParams, "intensity")
					.min(0)
					.max(5)
					.step(0.1)
					.onChange((value) => {
						map.getLights().sunLight.intensity = value;
						map.getLights().ambientLight.intensity = value;
					});
				sun.add(sunParams, "shadowBias")
					.min(-0.01)
					.max(0.01)
					.step(0.00001)
					.onChange((value) => {
						map.getLights().sunLight.shadow.bias = value;
					});
				sun.add(sunParams, "shadowNormalBias")
					.min(-1)
					.max(1)
					.step(0.002)
					.onChange((value) => {
						map.getLights().sunLight.shadow.normalBias = value;
					});
				sun.add(sunParams, "shadowRadius")
					.min(1)
					.max(10)
					.step(1)
					.onChange((value) => {
						map.getLights().sunLight.shadow.radius = value;
					});
			}

			function addRasterLayer() {
				map.addSource("IMAGERY_SOURCE", {
					type: "raster",
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"],
					tileSize: 256
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster",
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23
				});
			}

			function addPrimitive() {
				const matrix = minemap.Transforms.cartographicToFixedFrame(
					new minemap.Math.Vector3([116.26531978613971, 40.05753009943292, 100])
				);
				const rotX = new minemap.Math.Matrix4().rotateX(Math.PI);
				matrix.multiplyRight(rotX);

				const geometry = new minemap.Geometries.SphereGeometry({
					radius: 120,
					widthSegments: 100,
					heightSegments: 100
				});
				material = new minemap.PhysicalMaterial(materialParams);
				materialSphere = new minemap.Primitive({
					modelMatrix: matrix,
					geometry,
					material,
					castShadow: true,
					receiveShadow: true
				});
				map.addPrimitive(materialSphere);
			}

			function addModel() {
				model = map.addSceneComponent({
					id: "id",
					type: "3d-model",
					data: "https://minedata.cn/nce-static/support/demo/js-3d-ultra/zh/assets/DamagedHelmet/glTF/DamagedHelmet.gltf",
					modelFolder:
						"https://minedata.cn/nce-static/support/demo/js-3d-ultra/zh/assets/DamagedHelmet/glTF/",
					scale: new minemap.Math.Vector3([100, 100, 100]),
					rotation: new minemap.Math.Vector3([90, 0, 0]),
					translation: new minemap.Math.Vector3([0, 0, 0]),
					position: new minemap.Math.Vector3([116.26531978613971, 40.05753009943292, 100]),
					lightingModel: minemap.LightingModelType.PBR,
					castShadow: true,
					receiveShadow: true,
					loaded() {
						/**
						 * 注意：实际模型加载是不可以通过这种方式取得材质的，这里仅仅是方便展示部分属性的作用
						 */
						material = model.opaqueList[0].material;
					}
				});
			}

			function removeRasterLayer() {
				map.removeLayer("IMAGERY");
				map.removeSource("IMAGERY_SOURCE");
			}

			function removePrimitive() {
				map.removePrimitive(materialSphere);
			}

			function removeModel() {
				map.removeSceneComponent(model.id);
			}
		</script>
	</body>
</html>
