<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>粒子图层</title>
	<link rel="stylesheet" href="../style/demo.css">
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.css">
	<script src="../../dist/minemap-dev.js"></script>
	<script src="https://minemap.minedata.cn/minemapapi/minemap-plugins/template/template.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = 'https://minemap.minedata.cn';
	minemap.dataDomainUrl = 'https://minemap.minedata.cn';
	minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	minemap.serviceUrl = 'https://service.minedata.cn/service';

	minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
	minemap.solution = 11001;

	var style = {
		"glyphs": "minemap://fonts/{fontstack}/{range}",
		"sprite": "minemap://sprite/sprite",
		"sources": {},
		"layers": [],
		"version": 8
	};

	var map = new minemap.Map({
		container: 'map',
		style: style,
		center: [116.46,39.92],
		zoom: 14,
		pitch: 0,
		maxZoom: 22,
		minZoom: 3,
		projection: 'MERCATOR'
	});

	map.repaint = true;

	/**
	 * 创建地图对象后，开始加载地图资源，地图资源加载完成后触发load事件
	 */
	map.on('load', function () {
		/*添加栅格图*/
		map.addSource("IMAGERY_SOURCE", {
			"type": "raster",//数据源类型：栅格数据源
			"tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			"tileSize": 512,//瓦片尺寸
		});

		map.addLayer({
			"id": "IMAGERY",
			"type": "raster", //图层类型为"raster"
			"source": "IMAGERY_SOURCE",
			"minzoom": 1,
			"maxzoom": 23,
		})
		// 增加自定义数据源、自定义图层
		addSources();
		addLayers();
	});

	map.repaint = true;

	function addSources() {
		var center = map.getCenter();
		var route = [[center.lng, center.lat], [center.lng, center.lat + 0.006], [center.lng - 0.008, center.lat + 0.006], [center.lng - 0.008, center.lat], [center.lng, center.lat]];

		/**
		 * 生成动态粒子图层数据
		 * @param data 数据，样例  [[116.38,49.9,3],[116.38,49.9,3]]
		 * @param segDistance 每小段长度,默认值为10
		 * @param speed 粒子速度，可选值为 1，2，3，4，默认为1，速度最快
		 * @returns {{type: string, features: Array}}
		 */
		var jsonData = minemap.Template.util.pointArrayToSpriteGeoJson(route);

		map.addSource('spriteSource', {
			type: 'geojson',
			data: jsonData
		});
	}

	function addLayers() {
		map.addLayer({
			"id": 'spriteLayer',
			"type": "sprite",
			"source": 'spriteSource',
			"layout": {},
			"paint": {
				"sprite-color": "#ff0000",
				"sprite-width": 3,
				"sprite-speed-factor": 1 /* 粒子速度，值域范围为1、2、3、4，需要和pointArrayToSpriteGeoJson方法中的粒子速度匹配 */
			}
		});
	}

</script>
</body>
