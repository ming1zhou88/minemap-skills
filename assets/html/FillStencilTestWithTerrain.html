<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8"/>
	<title>dem矢量问题</title>

	<script src="../../dist/minemap-dev.js"></script>

	<style>
		html,
		body,
		#map {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}

		table {
			position: fixed;
			top: 16px;
			right: 14px;
			z-index: 999;
			background: #fff;
			border: solid 1px #000000;
			border-collapse: collapse;
			padding: 2px 3px;
			text-align: center;
		}

		tbody {
			max-height: 600px;
			max-width: 400px;
			display: block;
			overflow: auto;
		}

		td,
		th {
			border: solid 1px #000000;
			border-collapse: collapse;
			padding: 2px 3px;
			text-align: center;
		}

		th {
			font-weight: bold;
		}
	</style>
</head>

<body>
<div id="map">
	<div id="showTable"></div>
</div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = 'https://minemap.minedata.cn';
	minemap.dataDomainUrl = 'https://minemap.minedata.cn';
	minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	minemap.serviceUrl = 'https://service.minedata.cn/service';

	minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
	minemap.solution = 11001;

	window.minemapCDN = "http://192.168.153.116:18111/minemapapi/minemap-CDN"; // minemapCDN 配置

	// 定义空底图样式
	var style = {
		glyphs: "minemap://fonts/{fontstack}/{range}",
		sprite: "minemap://sprite/sprite",
		sources: {},
		layers: [],
		version: 8,
	};
	/**
	 * 初始化地图实例
	 */

	var map = new minemap.Map({
		container: "map",
		style: style,
		bearing: 0,
		center: [113.99591, 36.63924],
		pitch: 0,
		zoom: 10,
		maxZoom: 24 /*地图最大缩放等级*/,
		minZoom: 1 /*地图最小缩放等级*/,
	});

	map.on("load", function () {
		map.addLayer({
			id: "1047479493537198080",
			paint: {
				"fill-outline-color": "#DD0E35FF",
				"fill-color": "#81CCEE7D",
				"fill-opacity": 1,
				"fill-antialias": true,
			},
			source: {
				maxzoom: 21,
				minzoom: 6,
				tiles: [
					"http://27.188.74.145:30252/service/resource/data/mvt-layer/1047475887887765504/{z}/{x}/{y}",
				],
				type: "vector",
			},
			"source-layer": "1047475887887765504",
			type: "fill",
		});
		map.setTerrain({
			"tiles": ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
			"availabilities": ["https://staticdata-b.minedata.cn:14434/dem/layer.json"], //索引文件是可选项
			"tileSize": 512,  //瓦片大小
			"maxzoom": 14        //dem最高切分zoom，30米一般是14级；12.5米一般是16级
			// bounds: [130, 60, 140, 70],//要显示区域的经纬度外包框，按west，south，east，north填写
		});
	});
</script>
</body>
</html>
