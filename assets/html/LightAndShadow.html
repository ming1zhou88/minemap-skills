<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>Light And Shadow</title>
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<script src="../js/lil-gui.umd.min.js"></script>
		<style>
			html,
			body,
			#map {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<div id="map"></div>
		<script>
			minemap.domainUrl = "https://minedata.cn";
			minemap.serverDomainUrl = "https://minedata.cn";
			minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
			window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";

			const style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};

			const map = new minemap.Map({
				container: "map",
				style: style,
				center: [116.26531978613971, 40.05753009943292],
				pitch: 51.694,
				bearing: -177.317,
				zoom: 14,
				maxZoom: 22,
				minZoom: 1
			});

			map.repaint = true;

			map.on("load", function () {
				initializeGUI();
				addRasterLayer();
				addSceneModel();
				addLight();
			});

			// 开启光影
			map.enableLight();
			map.enableShadow();
			map.setShadowType(minemap.ShadowType.SHADOW_MAP_PCF);

			// 光影参数

			const commonParams = {
				enableLight: true,
				enableShadow: true,
				shadowType: minemap.ShadowType.SHADOW_MAP_PCF
			};
			const sunParams = {
				year: 2024,
				month: 6,
				day: 6,
				hours: 10,
				minutes: 0,
				seconds: 0,
				color: "#ffffff",
				intensity: 1,
				castShadow: true,
				shadowBias: -0.001,
				shadowNormalBias: 0.2,
				shadowRadius: 3
			};
			const ambientParams = {
				intensity: 1,
				color: "#ffffff"
			};
			const directionalParams = {
				intensity: 1,
				color: "#ffffff",
				castShadow: true,
				shadowBias: 0,
				shadowNormalBias: 0.5,
				shadowRadius: 3
			};
			const pointParams = {
				color: "#fc9600",
				intensity: 1,
				distance: 1000,
				decay: 0.01,
				castShadow: false,
				shadowBias: 1e-4,
				shadowNormalBias: 0.5,
				shadowRadius: 3
			};
			const spotParams = {
				color: "#ffffff",
				intensity: 20,
				distance: 1500,
				angle: Math.PI / 4,
				penumbra: 0.5,
				decay: 0.01,
				castShadow: false,
				focus: 1.0,
				shadowBias: 0,
				shadowNormalBias: 0.5,
				shadowRadius: 3
			};

			map.setSunLightTime(sunParams);

			const sunLight = map.getLights().sunLight;

			sunLight.color = sunParams.color;
			sunLight.intensity = sunParams.intensity;
			sunLight.castShadow = sunParams.castShadow;
			sunLight.shadow.bias = sunParams.shadowBias;
			sunLight.shadow.normalBias = sunParams.shadowNormalBias;
			sunLight.shadow.radius = sunParams.shadowRadius;

			let directionalLight, pointLight, spotLight;
			const pointLightPosition = [116.26244236500333, 40.05854296210216, 150];
			const spotLightPosition = [116.27644236500333, 40.05954296210216, 800];
			const spotLightTarget = [116.28244236500333, 40.06754296210216, 0];

			function addLight() {
				addDirectionLight();

				addPointLight();

				addSpotLight();
			}

			function addDirectionLight() {
				const position = minemap.Transforms.cartographicToCartesian3([
					116.28084236500333, 40.07054296210216, 2000
				]);
				const target = minemap.Transforms.cartographicToCartesian3([116.25184236500333, 40.07054296210216, 0]);
				directionalLight = new minemap.DirectionalLight(directionalParams.color, directionalParams.intensity);
				directionalLight.setPosition(new minemap.Math.Vector3(position));
				directionalLight.setTarget(new minemap.Math.Vector3(target));
				directionalLight.castShadow = directionalParams.castShadow;
				directionalLight.shadow.bias = directionalParams.shadowBias;
				directionalLight.shadow.normalBias = directionalParams.shadowNormalBias;
				directionalLight.shadow.radius = directionalParams.shadowRadius;
				map.addLight(directionalLight);
			}

			function addPointLight() {
				pointLight = new minemap.PointLight(
					pointParams.color,
					pointParams.intensity,
					pointParams.distance,
					pointParams.decay
				);
				pointLight.setPosition(
					new minemap.Math.Vector3(minemap.Transforms.cartographicToCartesian3(pointLightPosition))
				);
				pointLight.castShadow = pointParams.castShadow;
				pointLight.shadow.bias = pointParams.shadowBias;
				pointLight.shadow.normalBias = pointParams.shadowNormalBias;
				pointLight.shadow.radius = pointParams.shadowRadius;

				map.addLight(pointLight);

				const primitiveMatrix = minemap.Transforms.cartographicToFixedFrame(pointLightPosition);
				const sphereGeometry = new minemap.Geometries.SphereGeometry({
					radius: 2,
					widthSegments: 100,
					heightSegments: 100
				});
				const lightSphere = new minemap.Primitive({
					modelMatrix: primitiveMatrix,
					geometry: sphereGeometry,
					material: minemap.StandardMaterial.fromType("Color", {
						color: pointParams.color,
						opacity: 1.0,
						doubleSided: false
					})
				});

				map.addPrimitive(lightSphere);

				addPointLightAnimation(pointLight, lightSphere);
			}

			function addPointLightAnimation(light, sphere) {
				const render = () => {
					const timer = Date.now() * 0.00003;

					let x = Math.sin(timer * 14) * 0.0008 + 0.0002;
					let y = Math.cos(timer * 10) * 0.0004;
					let z = Math.sin(timer * 14) * 20;
					let lightPosition = [
						pointLightPosition[0] + x,
						pointLightPosition[1] + y,
						pointLightPosition[2] + z
					];
					sphere.matrixWorld = minemap.Transforms.cartographicToFixedFrame(lightPosition);
					sphere.position = minemap.Transforms.cartographicToCartesian3(lightPosition);
					light.setPosition(
						new minemap.Math.Vector3(minemap.Transforms.cartographicToCartesian3(lightPosition))
					);
					requestAnimationFrame(render);
				};

				render();
			}

			function addSpotLight() {
				spotLight = new minemap.SpotLight(
					spotParams.color,
					spotParams.intensity,
					spotParams.distance,
					spotParams.angle,
					spotParams.penumbra,
					spotParams.decay
				);

				spotLight.setPosition(
					new minemap.Math.Vector3(minemap.Transforms.cartographicToCartesian3(spotLightPosition))
				);
				spotLight.setTarget(
					new minemap.Math.Vector3(minemap.Transforms.cartographicToCartesian3(spotLightTarget))
				);
				const texture = minemap.TextureLoader.load({
					texUrl: "../data/image/uv.jpg",
					map,
					flipY: true
				});
				spotLight.setMap(texture);
				spotLight.castShadow = spotParams.castShadow;
				spotLight.shadow.focus = spotParams.focus;
				spotLight.shadow.bias = spotParams.shadowBias;
				spotLight.shadow.normalBias = spotParams.shadowNormalBias;
				spotLight.shadow.radius = spotParams.shadowRadius;

				map.addLight(spotLight);
			}

			function initializeGUI() {
				const gui = new lil.GUI({ width: 300 });
				const common = gui.addFolder("Common");
				const sun = gui.addFolder("Sun Light");
				const ambient = gui.addFolder("Ambient Light");
				const directional = gui.addFolder("Directional Light");
				const point = gui.addFolder("Point Light");
				const spot = gui.addFolder("Spot Light");

				common.close();
				common.add(commonParams, "enableLight").onChange((value) => {
					if (value) map.enableLight();
					else map.disableLight();
				});
				common.add(commonParams, "enableShadow").onChange((value) => {
					if (value) map.enableShadow();
					else map.disableShadow();
				});
				common
					.add(commonParams, "shadowType")
					.options({
						Basic: minemap.ShadowType.SHADOW_MAP_BASIC,
						PCF: minemap.ShadowType.SHADOW_MAP_PCF
					})
					.onChange((value) => {
						map.setShadowType(value);
					});

				sun.close();
				sun.add(sunParams, "month")
					.min(1)
					.max(12)
					.step(1)
					.onChange((value) => {
						map.setSunLightTime(sunParams);
					});
				sun.add(sunParams, "day")
					.min(1)
					.max(30)
					.step(1)
					.onChange((value) => {
						map.setSunLightTime(sunParams);
					});
				sun.add(sunParams, "hours")
					.min(0)
					.max(23)
					.step(1)
					.onChange((value) => {
						map.setSunLightTime(sunParams);
					});
				sun.add(sunParams, "minutes")
					.min(0)
					.max(59)
					.step(1)
					.onChange((value) => {
						map.setSunLightTime(sunParams);
					});
				sun.add(sunParams, "castShadow").onChange((value) => {
					map.getLights().sunLight.castShadow = value;
				});
				sun.add(sunParams, "intensity")
					.min(0)
					.max(5)
					.step(0.1)
					.onChange((value) => {
						map.getLights().sunLight.intensity = value;
					});

				ambient.close();
				ambient
					.add(ambientParams, "intensity")
					.min(0)
					.max(5)
					.step(0.1)
					.onChange((value) => {
						map.getLights().ambientLight.intensity = value;
					});
				ambient.addColor(ambientParams, "color").onChange((value) => {
					map.getLights().ambientLight.color = value;
				});

				directional.close();
				directional
					.add(directionalParams, "intensity")
					.min(0)
					.max(5)
					.step(0.1)
					.onChange((value) => {
						directionalLight.intensity = value;
					});
				directional.addColor(directionalParams, "color").onChange((value) => {
					directionalLight.color = value;
				});
				directional.add(directionalParams, "castShadow").onChange((value) => {
					directionalLight.castShadow = value;
				});
				directional
					.add(directionalParams, "shadowBias")
					.min(-0.01)
					.max(0.01)
					.step(0.00001)
					.onChange((value) => {
						directionalLight.shadow.bias = value;
					});
				directional
					.add(directionalParams, "shadowNormalBias")
					.min(-0.5)
					.max(0.5)
					.step(0.002)
					.onChange((value) => {
						directionalLight.shadow.normalBias = value;
					});

				point.open();
				point
					.add(pointParams, "intensity")
					.min(0)
					.max(5)
					.step(0.1)
					.onChange((value) => {
						pointLight.intensity = value;
					});
				point.addColor(pointParams, "color").onChange((value) => {
					pointLight.color = value;
				});
				point
					.add(pointParams, "distance")
					.min(0)
					.max(2000)
					.step(1)
					.onChange((value) => {
						pointLight.distance = value;
					});
				point
					.add(pointParams, "decay")
					.min(0)
					.max(1)
					.step(0.001)
					.onChange((value) => {
						pointLight.decay = value;
					});
				point.add(pointParams, "castShadow").onChange((value) => {
					pointLight.castShadow = value;
				});
				point
					.add(pointParams, "shadowBias")
					.min(-1)
					.max(1)
					.step(0.00001)
					.onChange((value) => {
						pointLight.shadow.bias = value;
					});
				point
					.add(pointParams, "shadowNormalBias")
					.min(-5)
					.max(5)
					.step(0.002)
					.onChange((value) => {
						pointLight.shadow.normalBias = value;
					});
				point
					.add(pointParams, "shadowRadius")
					.min(1)
					.max(10)
					.step(1)
					.onChange((value) => {
						pointLight.shadow.radius = value;
					});

				spot.open();
				spot.add(spotParams, "intensity")
					.min(0)
					.max(100)
					.step(0.1)
					.onChange((value) => {
						spotLight.intensity = value;
					});
				spot.addColor(spotParams, "color").onChange((value) => {
					spotLight.color = value;
				});
				spot.add(spotParams, "distance")
					.min(0)
					.max(2000)
					.step(1)
					.onChange((value) => {
						spotLight.distance = value;
					});
				spot.add(spotParams, "angle")
					.min(0)
					.max(Math.PI / 2)
					.step(0.001)
					.onChange((value) => {
						spotLight.angle = value;
					});
				spot.add(spotParams, "penumbra")
					.min(0)
					.max(1.0)
					.step(0.001)
					.onChange((value) => {
						spotLight.penumbra = value;
					});
				spot.add(spotParams, "decay")
					.min(0)
					.max(1)
					.step(0.001)
					.onChange((value) => {
						spotLight.decay = value;
					});
				spot.add(spotParams, "castShadow").onChange((value) => {
					spotLight.castShadow = value;
				});
				spot.add(spotParams, "focus")
					.min(0)
					.max(1)
					.step(0.0001)
					.onChange((value) => {
						spotLight.shadow.focus = value;
					});
				spot.add(spotParams, "shadowBias")
					.min(-1)
					.max(1)
					.step(0.00001)
					.onChange((value) => {
						spotLight.shadow.bias = value;
					});
				spot.add(spotParams, "shadowNormalBias")
					.min(-5)
					.max(5)
					.step(0.002)
					.onChange((value) => {
						spotLight.shadow.normalBias = value;
					});
				spot.add(spotParams, "shadowRadius")
					.min(1)
					.max(10)
					.step(1)
					.onChange((value) => {
						spotLight.shadow.radius = value;
					});
			}

			function addRasterLayer() {
				map.addSource("IMAGERY_SOURCE", {
					type: "raster",
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"],
					tileSize: 256
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster",
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23
				});
			}

			function addSceneModel() {
				map.addSceneComponent({
					id: "modelA",
					type: "3d-model",
					data: "http://192.168.152.123:11187/demo-data/bim/only-building.gltf",
					modelFolder: "http://192.168.152.123:11187/demo-data/bim/",
					scale: new minemap.Math.Vector3([10, 10, 10]),
					rotation: new minemap.Math.Vector3([90, 65, 0]),
					position: new minemap.Math.Vector3([116.22544236500333, 40.03454296210216, 0.0]),
					loaded: () => {},
					castShadow: true,
					receiveShadow: true
				});

				map.addSceneComponent({
					id: "modelB",
					type: "3d-model",
					data: "http://192.168.152.123:11187/demo-data/models/LittlestTokyo.glb",
					modelFolder: "http://192.168.152.123:11187/demo-data/models/",
					scale: new minemap.Math.Vector3([1, 1, 1]),
					rotation: new minemap.Math.Vector3([90, 0, 0]),
					position: new minemap.Math.Vector3([116.28544236500333, 40.06454296210216, 200]),
					castShadow: true,
					receiveShadow: true
				});
			}
		</script>
	</body>
</html>
