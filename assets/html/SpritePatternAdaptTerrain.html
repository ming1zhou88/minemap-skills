<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>路况综合-pattern形式贴地</title>
		<link rel="stylesheet" href="../style/demo.css" />
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<script type="text/javascript" src="../js/lil-gui.umd.min.js"></script>
		<style>
			#map {
				width: 100%;
				height: 100%;
			}
		</style>
	</head>

	<body>
		<div id="map"></div>
		<script>
			const timeInterval = 20000;

			/*全局参数设置*/
			minemap.domainUrl = "https://minemap.minedata.cn";
			minemap.dataDomainUrl = "https://minemap.minedata.cn";
			minemap.serverDomainUrl = "https://sd-data.minedata.cn";
			minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
			minemap.serviceUrl = "https://service.minedata.cn/service";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;

			const trafficLayerIds = [];
			let _interval = null;
			let trafficStatus = true;

			let map;
			minemap.util.getJSON("../data/style/with_symbol_height_p.json", function (err, data) {
				const layers = data.layers;

				for (let i = 0; i < layers.length; i++) {
					const layer = layers[i];
					if (layer.type === "extrusion") {
						layer.layout.visibility = "none";
					}
				}

				map = new minemap.Map({
					container: "map",
					style: data,
					position: [116.45999719510878, 39.91999999999996, 800],
					zoom: 15,
					pitch: 0,
					maxZoom: 20,
					minZoom: 3,
					projection: "MERCATOR"
				});

				map.setTerrain({
					tiles: ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
					tileSize: 512, //瓦片大小
					availabilities: ["https://staticdata-b.minedata.cn:14434/dem/layer.json"], //索引文件是可选项
					maxzoom: 14 //dem最高切分zoom，30米一般是14级；12.5米一般是16级
					// bounds: [130, 60, 140, 70],//要显示区域的经纬度外包框，按west，south，east，north填写
				});

				map.on("load", function () {
					initializeGUI();
					updateTrafficSource();

					trafficLayerIds.push("trafficlines");
					trafficLayerIds.push("road-cond-sprite");

					//定时刷新路况
					if (_interval) {
						clearInterval(_interval);
						_interval = null;
					}
					_interval = setInterval(function () {
						// updateTrafficSource();
					}, timeInterval);
				});

				map.repaint = true;
			});

			const params = {
				显示路况: true,
				路况更新时间: ""
			};

			let updateTimeButton;
			function initializeGUI() {
				const gui = new lil.GUI({ width: 300 });
				gui.onChange((event) => {
					params[event.property] = event.value;
				});

				gui.add(params, "显示路况").onChange(() => {
					controlTraffic();
				});

				updateTimeButton = gui.add(params, "路况更新时间");
				updateTimeButton.disable();
			}

			function updateTrafficSource() {
				let source = map.getSource("TrafficSprite");
				if (source) {
					//无闪屏刷新数据
					source._eventedParent.reload(true);
				}

				source = map.getSource("Traffic");
				if (source) {
					//无闪屏刷新数据
					source._eventedParent.reload(true);
				}

				const date = new Date();
				if (!map.getSource("Traffic")) {
					map.addSource("Traffic", {
						type: "vector",
						tiles: [
							"https://minedata.cn/service/data/dynamic-traffic/ertic?servicetype=0&z={z}&x={x}&y={y}&key=0c6ac62182404e5ebc7a789981f6db72&solu=12878"
						],
						adaptTerrain: true
					});

					map.addSource("TrafficSprite", {
						type: "vector",
						tiles: [
							"https://minedata.cn/service/data/dynamic-traffic/ertic?servicetype=1&z={z}&x={x}&y={y}&key=0c6ac62182404e5ebc7a789981f6db72&solu=12878"
						],
						adaptTerrain: true
					});

					//如果底图没有配置路况图层，需要自己手动增加
					// addLayer();
					addLayersParticleEffect2();
				}

				updateTimeButton.setValue(
					(date.getHours() < 10 ? "0" + date.getHours() : date.getHours()) +
						":" +
						(date.getMinutes() < 10 ? "0" + date.getMinutes() : date.getMinutes()) +
						":" +
						(date.getSeconds() < 10 ? "0" + date.getSeconds() : date.getSeconds()) +
						"." +
						date.getMilliseconds()
				);
			}

			function addLayersParticleEffect2() {
				map.addLayer({
					id: "road-cond-sprite",
					type: "sprite",
					source: "Traffic",
					"source-layer": "Trafficrtic",
					layout: {
						"sprite-cap": "round",
						visibility: "visible",
						"sprite-join": "round"
					},
					paint: {
						"sprite-width": 5,
						"sprite-pattern": {
							property: "status",
							stops: [
								[0, "sprite-gray"],
								[1, "sprite-green"],
								[2, "sprite-orange"],
								[3, "sprite-red"],
								[4, "sprite-deepRed"],
								[7, "sprite-gray"] // 新增，表示未开通
							],
							type: "categorical"
						},
						"sprite-speed": {
							property: "status",
							stops: [
								[0, 0.01],
								[1, 1.8],
								[2, 0.4],
								[3, 0.2],
								[4, 0.1],
								[7, 0.01]
							],
							type: "categorical"
						}
					},
					minzoom: 8,
					maxzoom: 20
				});
			}

			function addLayer() {
				map.addLayer({
					id: "trafficlines",
					type: "line",
					source: "Traffic",
					"source-layer": "Trafficrtic",
					layout: {
						"line-join": "round",
						"line-cap": "round"
					},
					paint: {
						"line-color": {
							property: "status",
							stops: [
								[0, "#999999"],
								[1, "#66cc00"],
								[2, "#ff9900"],
								[3, "#cc0000"],
								[4, "#9d0404"],
								[7, "#999999"]
							]
						},
						"line-width": {
							stops: [
								[5, 1],
								[18, 3]
							],
							base: 1.2
						}
					},
					minzoom: 8,
					maxzoom: 15
				});
			}

			function updateTrafficLayerVisibility(v) {
				trafficLayerIds.forEach(function (id) {
					if (map.getLayer(id)) {
						map.setLayoutProperty(id, "visibility", v);
					} else {
						addLayer();
					}
				});
			}

			function controlTraffic() {
				if (trafficStatus) {
					trafficStatus = false;
					if (_interval) {
						clearInterval(_interval);
						_interval = null;
					}
					updateTrafficLayerVisibility("none");
				} else {
					trafficStatus = true;
					if (_interval) {
						clearInterval(_interval);
						_interval = null;
					}
					updateTrafficSource();
					_interval = setInterval(function () {
						updateTrafficSource();
					}, timeInterval);
					updateTrafficLayerVisibility("visible");
				}
			}
		</script>
	</body>
</html>
