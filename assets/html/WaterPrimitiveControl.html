<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>水体效果反射与折射控制示例</title>
    <!-- 引入必要的依赖 -->
    <script src="../js/lil-gui.umd.min.js"></script>
    <link rel="stylesheet" href="../../dist/minemap.css"/>
    <script src="../../dist/minemap-dev.js"></script>
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    /**
     * 工具函数
     */

    /**
     * 将十六进制颜色转换为RGB数组 [0-1]范围
     * @param {string} hex - 十六进制颜色值
     * @returns {Array<number>} RGB数组，每个分量范围为0-1
     */
    function hexToRGB(hex) {
        hex = hex.replace("#", "");
        const bigint = parseInt(hex, 16);
        const r = ((bigint >> 16) & 255) / 255;
        const g = ((bigint >> 8) & 255) / 255;
        const b = (bigint & 255) / 255;
        return [r, g, b];
    }

    /**
     * 将RGB值转换为十六进制颜色
     * @param {number} r - 红色分量 [0-1]
     * @param {number} g - 绿色分量 [0-1]
     * @param {number} b - 蓝色分量 [0-1]
     * @returns {string} 十六进制颜色值
     */
    function rgbToHex(r, g, b) {
        const toHex = c => {
            const v = Math.round(c * 255);
            return v.toString(16).padStart(2, "0");
        };
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    /**
     * 默认配置参数
     */
    const CONFIG = {
        // 水体颜色默认值
        defaultShallow: [0.3, 0.7, 0.6], // 浅水区域颜色
        defaultDeep: [0.1, 0.2, 0.3],    // 深水区域颜色

        // 地图服务配置
        MAP_CONFIG: {
            domainUrl: "http://192.168.152.123",
            dataDomainUrl: "https://minemap.minedata.cn",
            serverDomainUrl: "https://sd-data.minedata.cn",
            spriteUrl: "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite",
            serviceUrl: "https://service.minedata.cn/service",
            key: "0c6ac62182404e5ebc7a789981f6db72",
            solution: 11001
        },

        // 地形服务地址
        TERRAIN_URL: "https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain",

        // 卫星影像服务地址
        IMAGERY_URL: "https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"
    };

    /**
     * 初始化地图配置
     */
    Object.entries(CONFIG.MAP_CONFIG).forEach(([key, value]) => {
        minemap[key] = value;
    });
    window.minemapCDN = "http://192.168.152.123/minemap-engine/minemap-CDN/";

    /**
     * 地图样式配置
     */
    const mapStyle = {
        glyphs: "minemap://fonts/{fontstack}/{range}",
        sprite: "minemap://sprite/sprite",
        sources: {},
        layers: [],
        version: 8
    };

    /**
     * 水体材质参数配置
     */
    const materialParams = {
        depth: 512,
        reflectivity: 3,
        flowSpeed: 7,
        flowScale: 16,
        fresnelScale: 0.4,
        fresnelPower: 0.8,
        waterAbsorptionCoeff: [0.006, 0.004, 0.015],
        scatteringScale: 0.3,
        shallowScatterColor: rgbToHex(...CONFIG.defaultShallow),
        deepScatterColor: rgbToHex(...CONFIG.defaultDeep)
    };

    // 初始化地图实例
    const map = new minemap.Map({
        container: "map",
        style: mapStyle,
        position: [115.96239101001868, 39.72314306386325, 937.1661325683931],
        pitch: 78.66,
        bearing: -103.96,
        maxZoom: 22,
        minZoom: 1,
        logDepth: true,
        waterRenderingMode: 'normal' // 添加水面渲染模式配置
    });

    map.repaint = true;
    map.enableLight();

    // 初始化天空大气效果
    const skyAtmosphere = map.getSky();
    skyAtmosphere.useAerialPerspective = true;

    // 水体材质实例
    let waterMaterial;

    /**
     * 地图加载完成后的初始化
     */
    map.on("load", () => {
        initializeGUI();
        addTerrain();
        addRasterLayer();
        addWater();
        addPrimitive();
    });

    /**
     * 创建水面几何体和材质
     */
    function addWater() {
        // 创建水面多边形几何体
        const geometry = new minemap.Geometries.PolygonGeometry({
            polygonHierarchy: {
                positions: minemap.Math.Vector3.fromDegreesArrayHeights([
                    115.75699, 39.92121, 500,
                    116.25699, 39.42121, 500,
                    116.75699, 39.92121, 500,
                    117.25699, 39.42121, 500,
                    116.75699, 38.92121, 500,
                    116.25699, 39.22121, 500,
                    115.75699, 38.92121, 500,
                    115.25699, 39.42121, 500
                ])
            },
            perPositionHeight: true,
            arcType: minemap.ARCTYPE.GEODESIC
        });

        // 创建水体材质
        waterMaterial = new minemap.WaterMaterial({
            normalMapA: loadTexture("../data/image/Water_1_M_Normal.jpg"),
            normalMapB: loadTexture("../data/image/Water_2_M_Normal.jpg"),
            flowMap: loadTexture("../data/image/Flowmap_Example.png"),
            depth: materialParams.depth,
            reflectivity: materialParams.reflectivity,
            flowSpeed: materialParams.flowSpeed,
            flowScale: materialParams.flowScale,
            shallowScatterColor: new minemap.Math.Vector3(...hexToRGB(materialParams.shallowScatterColor)),
            deepScatterColor: new minemap.Math.Vector3(...hexToRGB(materialParams.deepScatterColor))
        });

        // 创建水面图元并添加到地图
        const water = new minemap.Primitive({geometry, material: waterMaterial, id: 'waterPrimitive'});
        map.addPrimitive(water);
    }

    /**
     * 加载纹理工具函数
     * @param {string} url - 纹理图片URL
     * @returns {Object} 纹理对象
     */
    function loadTexture(url) {
        return minemap.TextureLoader.load({
            map,
            texUrl: url,
            minFilter: minemap.WebGLConstants.LINEAR,
            magFilter: minemap.WebGLConstants.LINEAR
        });
    }

    /**
     * 添加3D模型
     */
    map.addSceneComponent({
        id: "modelId",
        type: "3d-model",
        data: "../data/test-gltf/harbor.glb",
        modelFolder: "",
        scale: [1, 1, 1],
        rotation: [90, 22, 0],
        position: new minemap.Math.Vector3(115.96258093564309, 39.72279049432414, 440),
        loaded: () => {
            console.log("3D模型加载完成");
        },
        allowWaterRefract: true
    });

    /**
     * 初始化GUI控制面板
     */
    function initializeGUI() {
        const gui = new lil.GUI({width: 300});

        // === 折射控制组 ===
        const refractionFolder = gui.addFolder("折射控制");
        const refractionParams = {
            primitive: false,
            model: true,
            terrain: true,
            vector: true
        };

        refractionFolder.add(refractionParams, "primitive").name("primitive折射").onChange(v => {
            // TODO: 实现primitive折射控制
			const primitive = map.getPrimitiveById("spherePrimitive");
			if (primitive) {
				primitive.material.allowWaterRefract = v;
			}
        });
        refractionFolder.add(refractionParams, "model").name("模型折射").onChange(v => {
            // TODO: 实现模型折射控制
			const model = map.getSceneComponent("modelId");
			if (model) {
				model.allowWaterRefract = v;
			}
        });
        // refractionFolder.add(refractionParams, "terrain").name("地形折射").onChange(v => {
        //     // TODO: 实现地形折射控制
		// 	const layer = map.getLayer("IMAGERY");
		// 	if (layer) {
		// 		layer.allowWaterRefract = v;
		// 	}
        // });
        // refractionFolder.add(refractionParams, "vector").name("矢量折射").onChange(v => {
        //     // TODO: 实现矢量折射控制
        // });

        // === 反射控制组 ===
        const reflectionFolder = gui.addFolder("反射控制");
        const reflectionParams = {
            primitive: false,
            model: false,
            terrain: true,
            vector: true
        };

        reflectionFolder.add(reflectionParams, "primitive").name("primitive反射").onChange(v => {
            // TODO: 实现primitive反射控制
			const primitive = map.getPrimitiveById("spherePrimitive");
			if (primitive) {
				primitive.material.allowWaterReflect = v;
			}
        });
        reflectionFolder.add(reflectionParams, "model").name("模型反射").onChange(v => {
            // TODO: 实现模型反射控制
			const model = map.getSceneComponent("modelId");
			if (model) {
				model.allowWaterReflect = v;
			}
        });
        reflectionFolder.add(reflectionParams, "terrain").name("地形反射").onChange(v => {
            // TODO: 实现地形反射控制
			const layer = map.getLayer("IMAGERY");
			if (layer) {
				layer.allowWaterReflect = v;
			}
        });
        // reflectionFolder.add(reflectionParams, "vector").name("矢量反射").onChange(v => {
        //     // TODO: 实现矢量反射控制
        // });

        // === SSR 参数组 ===
        const ssrFolder = gui.addFolder("SSR 参数");
        const ssrParams = {
            ssrOpacity: 1.0,
            ssrMaxDistance: 10,
            ssrThickness: 0.018,
            ssrDelta: 1.0,
            ssrSigma: 2.0,
            ssrStepSize: 1.0
        };

        // 添加SSR参数控制
        addSSRControls(ssrFolder, ssrParams);

        // === 水体材质参数组 ===
        const materialFolder = gui.addFolder("水材质参数");
        addMaterialControls(materialFolder);

        // === 水面渲染模式控制组 ===
        const waterRenderingFolder = gui.addFolder("水面渲染模式");
        const waterRenderingParams = {
            mode: 'normal'
        };

        waterRenderingFolder.add(waterRenderingParams, "mode", ['normal', 'simplified']).name("渲染模式").onChange(v => {
            map.waterRenderingMode = v;
            console.log('水面渲染模式已切换为:', v);
        });

        // === 天空/太阳时间控制组 ===
        const skyFolder = gui.addFolder("天空/太阳时间");
        addSkyControls(skyFolder);
    }

    /**
     * 添加SSR参数控制
     */
    function addSSRControls(folder, params) {
        folder.add(params, "ssrOpacity", 0, 1, 0.01).name("SSR不透明度").onChange(v => {
            map.painter.ssrPass.ssrOpacity = v;
        });
        folder.add(params, "ssrMaxDistance", 0, 20000, 1).name("最大距离").onChange(v => {
            map.painter.ssrPass.ssrMaxDistance = v;
        });
        folder.add(params, "ssrThickness", 0, 10, 0.001).name("厚度").onChange(v => {
            map.painter.ssrPass.ssrThickness = v;
        });
        folder.add(params, "ssrDelta", 0, 4, 0.1).name("Delta").onChange(v => {
            map.painter.ssrPass.ssrDelta = v;
        });
        folder.add(params, "ssrSigma", 0, 4, 0.1).name("Sigma").onChange(v => {
            map.painter.ssrPass.ssrSigma = v;
        });
        folder.add(params, "ssrStepSize", 1, 4, 0.1).name("步长").onChange(v => {
            map.painter.ssrPass.ssrStepSize = v;
        });
    }

    /**
     * 添加材质参数控制
     */
    function addMaterialControls(folder) {
        folder.add(materialParams, "depth", 1, 512).name("深度").onChange(v => waterMaterial.depth = v);
        folder.add(materialParams, "reflectivity", 0, 10).name("反射率").onChange(v => waterMaterial.reflectivity = v);
        folder.add(materialParams, "flowSpeed", 0, 100).name("流速").onChange(v => waterMaterial.flowSpeed = v);
        folder.add(materialParams, "flowScale", 0.001, 50).name("流动比例").onChange(v => waterMaterial.flowScale = v);
        folder.add(materialParams, "fresnelPower", 0, 10).name("菲涅尔强度").onChange(v => waterMaterial.fresnelPower = v);
        folder.add(materialParams, "fresnelScale", 0, 10).name("菲涅尔比例").onChange(v => waterMaterial.fresnelScale = v);

        // 水体吸收系数控制
        folder.add(materialParams.waterAbsorptionCoeff, "0", 0, 0.2).name("红色吸收").onChange(() => {
            waterMaterial.waterAbsorptionCoeff = materialParams.waterAbsorptionCoeff;
        });
        folder.add(materialParams.waterAbsorptionCoeff, "1", 0, 0.2).name("绿色吸收").onChange(() => {
            waterMaterial.waterAbsorptionCoeff = materialParams.waterAbsorptionCoeff;
        });
        folder.add(materialParams.waterAbsorptionCoeff, "2", 0, 0.2).name("蓝色吸收").onChange(() => {
            waterMaterial.waterAbsorptionCoeff = materialParams.waterAbsorptionCoeff;
        });

        folder.add(materialParams, "scatteringScale", 0.0, 1).name("散射比例").onChange(v => waterMaterial.scatteringScale = v);

        // 水体颜色控制
        folder.addColor(materialParams, "shallowScatterColor").name("浅层散射颜色").onChange(v => {
            waterMaterial.shallowScatterColor = new minemap.Math.Vector3(...hexToRGB(v));
        });
        folder.addColor(materialParams, "deepScatterColor").name("深层散射颜色").onChange(v => {
            waterMaterial.deepScatterColor = new minemap.Math.Vector3(...hexToRGB(v));
        });
    }

    /**
     * 添加天空控制
     */
    function addSkyControls(folder) {
        const sunParams = {
            year: 2025,
            month: 6,
            day: 30,
            hours: 8,
            minutes: 0,
            seconds: 0
        };

        folder.add(sunParams, "hours", 0, 23, 1).name("小时").onChange(() => {
            map.setSunLightTime(sunParams);
        });
        folder.add(sunParams, "minutes", 0, 59, 1).name("分钟").onChange(() => {
            map.setSunLightTime(sunParams);
        });
        folder.add(sunParams, "seconds", 0, 59, 1).name("秒").onChange(() => {
            map.setSunLightTime(sunParams);
        });
    }

    /**
     * 添加地形
     */
    function addTerrain() {
        map.setTerrain({
            tiles: [CONFIG.TERRAIN_URL],
            tileSize: 512,
            maxzoom: 14
        });
    }

    /**
     * 添加卫星影像图层
     */
    function addRasterLayer() {
        map.addSource("IMAGERY_SOURCE", {
            type: "raster",
            tiles: [CONFIG.IMAGERY_URL],
            tileSize: 256
        });

        map.addLayer({
            id: "IMAGERY",
            type: "raster",
            source: "IMAGERY_SOURCE",
            minzoom: 1,
            maxzoom: 23
        });
    }

    /**
     * 添加示例Primitive
     */
    function addPrimitive() {
        const matrix = minemap.Transforms.cartographicToFixedFrame(
            new minemap.Math.Vector3([115.75699396984743, 39.22121320248471, 800])
        );
        const rotX = new minemap.Math.Matrix4().rotateX(Math.PI / 2);
        matrix.multiplyRight(rotX);

        const geometry = new minemap.SphereGeometry({
            radius: 500,
            widthSegments: 100,
            heightSegments: 100
        });
        const material = new minemap.PhysicalMaterial();
        const materialSphere = new minemap.Primitive({
            modelMatrix: matrix,
            geometry,
            material,
			id: 'spherePrimitive'
        });
        map.addPrimitive(materialSphere);
    }

    /**
     * 点击事件处理
     */
    map.on("click", (e) => {
        const picked = map.getPositionByGPUPick(e.point);
        console.log("点击位置坐标:", picked);
    });
</script>
</body>
</html>
