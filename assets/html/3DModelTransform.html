<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>3D模型变换</title>
		<!-- demo样式文件 -->
		<link rel="stylesheet" href="../style/demo.css" />
		<!-- 引入MineMap API插件 -->
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<script src="../js/lil-gui.umd.min.js"></script>
		<style>
			#map {
				width: 100%;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<div id="map"></div>
		<script>
			/**
			 * 全局参数设置
			 */
			minemap.domainUrl = "https://minedata.cn";
			minemap.dataDomainUrl = "https://minedata.cn";
			minemap.serverDomainUrl = "https://minedata.cn";
			minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
			minemap.serviceUrl = "https://mineservice.minedata.cn/service/";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;

			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};
			/**
			 * 初始化地图实例
			 */
			var map = new minemap.Map({
				container: "map",
				style: style /*球面矢量底图样式*/,
				center: [116.23307172184752, 40.0688014408867] /*地图中心点*/,
				bearing: -30,
				zoom: 11 /*地图默认缩放等级*/,
				pitch: 0 /*地图俯仰角度*/,
				maxZoom: 22 /*地图最大缩放等级*/,
				minZoom: 1 /*地图最小缩放等级*/,
				projection: "MERCATOR",
				logDepth: true
			});
			map.repaint = true;
			map.enableLight();


			let sceneModel;

			// 模型变换参数
			const transformParams = {
				// 位置参数 (经纬度偏移，单位：度)
				positionX: 116.24433782743151,
				positionY: 40.07330251849555,
				positionZ: 0,
				// 旋转参数 (单位：度)
				rotationX: 90,
				rotationY: 0,
				rotationZ: 0,
				// 缩放参数
				scaleX: 1,
				scaleY: 1,
				scaleZ: 1,
				// 边界框显示控制
				showBoundingBox: true
			};

			// 更新模型变换的函数
			function updateModelTransform() {
				if (!sceneModel) return;

				// 更新位置
				const lngLatHeight = new minemap.Math.Vector3(transformParams.positionX, transformParams.positionY, transformParams.positionZ);
				sceneModel.position = minemap.Transforms.cartographicToCartesian3(lngLatHeight);

				// 更新旋转
				sceneModel.rotation = [transformParams.rotationX, transformParams.rotationY, transformParams.rotationZ];

				// 更新缩放
				sceneModel.scale = [transformParams.scaleX, transformParams.scaleY, transformParams.scaleZ];

				map.repaint = true;
			}

			// 控制边界框显隐的函数
			function toggleBoundingBox(show) {
				if (!sceneModel) return;

				if (show) {
					sceneModel.showBoundingBox();
				} else {
					sceneModel.hideBoundingBox();
				}
			}

			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23
				});

				// 添加glb模型
				sceneModel = map.addSceneComponent({
					id: "glbModel",
					type: "3d-model", // 数据类型为"3d-model"
					data: "http://192.168.152.123:11187/demo-data/models/house.glb", // 要加载的gltf格式数据
					modelFolder: "http://192.168.152.123:11187/demo-data/models/maps/", // 该数据引用图片等资源的文件夹路径
					scale: [transformParams.scaleX, transformParams.scaleY, transformParams.scaleZ], // 在xyz轴方向上的缩放比例
					rotation: [transformParams.rotationX, transformParams.rotationY, transformParams.rotationZ], // 绕xyz轴方向上的旋转，单位为度
					position: [transformParams.positionX, transformParams.positionY, transformParams.positionZ], // 锚点（模型局部坐标原点）的经纬度位置
				});
			});

			//添加gui控制面板
			const gui = new lil.GUI({ title: "模型变换控制" });

			// 位置控制
			const positionFolder = gui.addFolder('位置控制');
			positionFolder.add(transformParams, 'positionX', 116.2, 116.3, 0.001).name('经度').onChange(updateModelTransform);
			positionFolder.add(transformParams, 'positionY', 40.0, 40.1, 0.001).name('纬度').onChange(updateModelTransform);
			positionFolder.add(transformParams, 'positionZ', -100, 100, 1).name('高度(m)').onChange(updateModelTransform);

			// 旋转控制
			const rotationFolder = gui.addFolder('旋转控制');
			rotationFolder.add(transformParams, 'rotationX', -180, 180, 1).name('X轴旋转(度)').onChange(updateModelTransform);
			rotationFolder.add(transformParams, 'rotationY', -180, 180, 1).name('Y轴旋转(度)').onChange(updateModelTransform);
			rotationFolder.add(transformParams, 'rotationZ', -180, 180, 1).name('Z轴旋转(度)').onChange(updateModelTransform);

			// 缩放控制
			const scaleFolder = gui.addFolder('缩放控制');
			scaleFolder.add(transformParams, 'scaleX', 0.1, 5, 0.1).name('X轴缩放').onChange(updateModelTransform);
			scaleFolder.add(transformParams, 'scaleY', 0.1, 5, 0.1).name('Y轴缩放').onChange(updateModelTransform);
			scaleFolder.add(transformParams, 'scaleZ', 0.1, 5, 0.1).name('Z轴缩放').onChange(updateModelTransform);

			// 边界框控制
			const boundingBoxFolder = gui.addFolder('边界框控制');
			boundingBoxFolder.add(transformParams, 'showBoundingBox').name('显示边界框').onChange(toggleBoundingBox);

			// 展开所有文件夹
			positionFolder.open();
			rotationFolder.open();
			scaleFolder.open();
			boundingBoxFolder.open();
		</script>
	</body>
</html>
