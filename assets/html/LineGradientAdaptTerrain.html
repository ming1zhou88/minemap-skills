<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>渐变线贴地</title>
		<!-- demo样式文件 -->
		<link
			rel="stylesheet"
			href="../style/demo.css"
		/>
		<!-- 引入MineMap API插件 -->
		<link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<style>
			#map {
				width: 100%;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<div id="map"></div>
		<script>
			/**
			 * 全局参数设置
			 */
			minemap.domainUrl = "https://minemap.minedata.cn";
			minemap.dataDomainUrl = "https://minemap.minedata.cn";
			minemap.serverDomainUrl = "https://sd-data.minedata.cn";
			minemap.spriteUrl = "https://minemap.minedata.cn/minemapapi/v3.4.0/sprite/sprite";
			minemap.serviceUrl = "https://service.minedata.cn/service";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;

			var center = [115.87, 39.93];

			var map = new minemap.Map({
				container: "map",
				style: '../data/style/with_symbol_height_p.json',
				center,
				zoom: 10,
				pitch: 0,
				maxZoom: 17,
				minZoom: 3,
				projection: "MERCATOR"
			});

			map.setTerrain({
				"tiles": ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
				"tileSize": 512,  //瓦片大小
				"availabilities": ["https://staticdata-b.minedata.cn:14434/dem/layer.json"], //索引文件是可选项
				"maxzoom": 14        //dem最高切分zoom，30米一般是14级；12.5米一般是16级
				// bounds: [130, 60, 140, 70],//要显示区域的经纬度外包框，按west，south，east，north填写
			});

			map.on("load", () => {
				// 实现线渐变的数据源必须满足两点：
				// 1. type: 'geojson'
				// 2. lineMetrics: true
				map.addSource("lineSource", {
					type: "geojson",
					data: {
						type: "FeatureCollection",
						features: [
							{
								type: "Feature",
								geometry: {
									type: "LineString",
									coordinates: [
										[center[0] - 0.1, center[1] - 0.1],
										[center[0] + 0.1, center[1] + 0.1]
									]
								},
								properties: {
									title: "路线一",
									kind: 1
								}
							}
						]
					},
					lineMetrics: true, // 数据源必须加这个参数
					adaptTerrain: true
				});

				map.addLayer({
					id: "lineLayer",
					type: "line",
					source: "lineSource",
					layout: {
						"line-join": "round",
						"line-cap": "round"
					},
					paint: {
						"line-width": 12,
						//添加渐变线属性line-gradient.下面设置色带根据色带进行渲染
						"line-gradient": [
							"interpolate",
							["linear"],
							["line-progress"],
							0,
							"rgba(0, 0, 255, 0)",
							0.1,
							"royalblue",
							0.3,
							"cyan",
							0.5,
							"lime",
							0.7,
							"yellow",
							1,
							"red"
						]
					},
					minzoom: 7,
					maxzoom: 17.5
				});
			});
		</script>
	</body>
</html>
