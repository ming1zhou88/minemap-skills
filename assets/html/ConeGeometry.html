<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>圆锥</title>
	<!-- demo样式文件 -->
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<style>
		#map,
		html,
		body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>

<body>
	<div id="map"></div>
	<script>
		/**
		 * 全局参数设置
		 */
		minemap.domainUrl = "https://minedata.cn";
		minemap.dataDomainUrl = "https://minedata.cn";
		minemap.serverDomainUrl = "https://minedata.cn";
		minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
		minemap.serviceUrl = "https://minedata.cn/service/";

		minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
		minemap.solution = 11001;
		window.minemapCDN = 'https://minemap.minedata.cn/minemapapi/minemap-CDN';

		// 定义空底图样式
		var style = {
			glyphs: "minemap://fonts/{fontstack}/{range}",
			sprite: "minemap://sprite/sprite",
			sources: {},
			layers: [],
			version: 8
		};

		/**
		 * 初始化地图实例
		 */
		var map = new minemap.Map({
			container: "map",
			style: style,
			/*球面矢量底图样式*/
			center: [116.245, 40.071],
			/*地图中心点*/
			bearing: 0,
			zoom: 17,
			/*地图默认缩放等级*/
			pitch: 0,
			/*地图俯仰角度*/
			maxZoom: 22,
			/*地图最大缩放等级*/
			minZoom: 1,
			/*地图最小缩放等级*/
			projection: "MERCATOR"
		});
		map.repaint = true;

		map.on("load", function () {
			/*添加栅格图*/
			map.addSource("IMAGERY_SOURCE", {
				type: "raster", //数据源类型：栅格数据源
				tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
				tileSize: 512 //瓦片尺寸
			});

			map.addLayer({
				id: "IMAGERY",
				type: "raster", //图层类型为"raster"
				source: "IMAGERY_SOURCE",
				minzoom: 1,
				maxzoom: 23,
				paint: {
					"raster-opacity": 1
				}
			});

			const cartographic = new minemap.Math.Vector3([116.245, 40.072, 0]);
			const matrix = minemap.Transforms.cartographicToFixedFrame(cartographic);

			const rotX = new minemap.Math.Matrix4().rotateX(Math.PI / 2);
			matrix.multiplyRight(rotX);

			var geometry = new minemap.Geometries.ConeGeometry({
				radiusBottom: 60,
				height: 150,
				radialSegments: 36,
				heightSegments: 1,
				openEnded: false,
				thetaStart: 0,
				thetaLength: Math.PI * 2
			});
			map.addPrimitive(
				new minemap.Primitive({
					modelMatrix: matrix,
					geometry: geometry,
					material: minemap.StandardMaterial.fromType("Color", {
						color: "rgba(255,0,0,0.8)",
						opacity: 1.0,
						doubleSided: false
					})
				})
			);

			setTimeout(() => {
				geometry.setData({
					radiusBottom: 60,
					height: 250,
					radialSegments: 36,
					heightSegments: 1,
					openEnded: false,
					thetaStart: 0,
					thetaLength: Math.PI * 2
				});
			}, 5000);
		});
	</script>
</body>

</html>
