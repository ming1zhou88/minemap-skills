<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>城市生长动画</title>
	<link rel="stylesheet" href="../style/demo.css">
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v3.4.0/minemap.css">
	<script src="../../dist/minemap-dev.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>

<body>
	<div id="map"></div>
	<script>
		/*全局参数设置*/
		minemap.domainUrl = "https://minedata.cn";
		minemap.dataDomainUrl = "https://minedata.cn";
		minemap.serverDomainUrl = "https://minedata.cn";
		minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
		minemap.serviceUrl = "https://minedata.cn/service/";
		minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
		minemap.solution = 11001;
		window.minemapCDN = "http://192.168.152.123/minemap-engine/minemap-CDN/"; // minemapCDN 配置 http://192.168.152.123/

		// 定义空底图样式
		var style = {
			"glyphs": "minemap://fonts/{fontstack}/{range}",
			"sprite": "minemap://sprite/sprite",
			"sources": {},
			"layers": [],
			"version": 8
		};
		/*初始化地图实例*/
		var map = new minemap.Map({
			container: 'map',
			style: style,
			position: [115.85943079980925, 28.658172634989192, 2050.581346930936], //建筑物中心点经纬度
			pitch: 60, //地图俯仰角度
			maxZoom: 22, //地图最大缩放等级
			minZoom: 1,  //地图最小缩放等级
			logarithmicDepthBuffer: false,
			projection: "MERCATOR"
		});

		map.repaint = true;
		/*添加基本球体图层，包括球体表面、天空盒*/
		map.on('load', function () {
			/*添加栅格图*/
			map.addSource("IMAGERY_SOURCE", {
				"type": "raster", //数据源类型：栅格数据源
				"tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
				"tileSize": 512, //瓦片尺寸
			});

			map.addLayer({
				"id": "IMAGERY",
				"type": "raster", //图层类型为"raster"
				"source": "IMAGERY_SOURCE",
				"minzoom": 1,
				"maxzoom": 23,
				"paint": {
					"raster-opacity": 1
				},
			});

			// 增加自定义数据源、自定义图层
			addSourcesGeo();
			addLayersGeoBlue();


			const content = {
				"id": "fillSource-2", // sourceID
				"type": "extrusion", // 矢量类型
				"loop": "repeat", // 循环设置
				"times": {
					"start": "2023-05-12T08:55:53.313Z", // 起始时间
					"end": "2023-05-12T08:55:56.313Z" // 终止时间
				},
				"autoPlay": true // 自动播放，默认:false
			}
			const cityGrown = {
				"document": "Animation", // 固定字段，必须要写
				"contents": [ // 动画内容
					content
				]
			}

			/**
			 * 三种添加方式：
			 * 1.添加完整构造json文件(多动画组合);
			 * 2.添加json文件的单个content(单个动画);
			 * 3.请求json文件，并解析加载;
			 */

			const animation = map.animationManager.add(cityGrown);
			// map.animationManager.add(content);
			// const animation = map.animationManager.add("../data/animation/cityGrown.json");
			animation.then((value) => {
				console.log(value);
				setTimeout(() => {
					map.animationManager.remove(value[0]);  // 移除动画
				}, 5000)
			})
		})

		function addSourcesGeo() {
			var center = map.getCenter();
			var jsonData = {
				type: "FeatureCollection",
				features: [
					{
						type: "Feature",
						geometry: {
							type: "Polygon",
							coordinates: [
								[
									[115.86008, 28.68788],
									[115.86008, 28.69788],
									[115.84008, 28.69788],
									[115.84008, 28.68788],
									[115.86008, 28.68788]
								]
							]
						},
						properties: {
							animations: {
								positionKeyframeTrack: { times: [0, 2], targetValues: [0, 1000] }
							}
						}
					},
					{
						type: "Feature",
						geometry: {
							type: "Polygon",
							coordinates: [
								[
									[115.86008, 28.68788],
									[115.86008, 28.67788],
									[115.88008, 28.67788],
									[115.88008, 28.68788],
									[115.86008, 28.68788]
								]
							]
						},
						properties: {
							animations: {
								positionKeyframeTrack: { times: [0, 2], targetValues: [200, 600] },
							}
						}
					}
				]
			};

			map.addSource("fillSource-2", {
				type: "geojson",
				data: jsonData,
				maxzoom: 24,
				buffer: 0
			});
		}

		function addLayersGeoBlue(params) {
			map.addLayer({
				id: "buildingLayer-3",
				type: "extrusion",
				source: "fillSource-2",
				minzoom: 1,
				maxzoom: 24,
				layout: {
					visibility: "visible"
				},
				paint: {
					"extrusion-color": "#3a5054" /*颜色*/,
					"extrusion-opacity": 0.8 /*不透明度(%)*/
				}
			});
		}
	</script>
</body>
