		if (delay === 0) {
			const id = requestAnimationFrame(callback);
			animationFrameIds.add(id);
			return id;
		}

		const startTime = performance.now();

			if (currentTime - startTime >= delay) {

			} else {

				animationFrameIds.add(id);
			}
		}

	// 【核心函数】地理坐标转屏幕坐标 - 实现地图与ECharts的坐标同步
	function convertGeoToScreen(geoCoords) {
		var container = document.getElementById("echarts-container");
		var containerHeight = container ? container.clientHeight : map.getContainer().clientHeight;
		var containerWidth = container ? container.clientWidth : map.getContainer().clientWidth;

		return geoCoords.map(function (coord) {
			var screenCoord = map.project(coord);

			return [screenCoord.x, containerHeight - screenCoord.y];
		});
	}

	// 4. 修改legend来改变图例显示
	function getEChartsOption() {
		// 按类别分组航线数据
		var mainLines = migrationData.filter(function (item) {
			return item.category === '主干线';
		});
		var branchLines = migrationData.filter(function (item) {
			return item.category === '支线';
		});

		// 转换主干线坐标
		var convertedMainLines = mainLines.map(function (item) {
			return {
				name: item.name,
				coords: convertGeoToScreen(item.coords),
				value: item.value
			};
		});

		// 转换支线坐标
		var convertedBranchLines = branchLines.map(function (item) {
			return {
				name: item.name,
				coords: convertGeoToScreen(item.coords),
				value: item.value
			};
		});

		// 按城市类别分组
		var tier1Cities = cityData.filter(function (item) {
			return item.category === '一线';
		});
		var newTier1Cities = cityData.filter(function (item) {
			return item.category === '新一线';
		});
		var tier2Cities = cityData.filter(function (item) {
			return item.category === '二线';
		});

		// 转换城市点坐标
		function convertCityData(cities) {
			return cities.map(function (item) {
				var echartsContainer = document.getElementById("echarts-container");
				var containerHeight = echartsContainer ? echartsContainer.clientHeight : map.getContainer().clientHeight;
				var screenCoord = map.project(item.coord);
				return {
					name: item.name,
					value: [screenCoord.x, containerHeight - screenCoord.y, item.value],
					category: item.category
				};
			});
		}

		var convertedTier1Cities = convertCityData(tier1Cities);
		var convertedNewTier1Cities = convertCityData(newTier1Cities);
		var convertedTier2Cities = convertCityData(tier2Cities);

		// 【配置说明】ECharts主配置对象 - 可根据需求调整
		return {
			backgroundColor: 'transparent',
			// 性能优化配置
			animation: false, // 禁用动画以提高性能和减少拖尾
			animationDuration: 0,
			animationEasing: 'linear',
			// 启用渲染优化
			useUTC: true,
			//这个配置很重要，否则可能会造成地图移动时产生偏移
			grid: {
				left: 0,
				top: 0,
				right: 0,
				bottom: 0,
				containLabel: false
			},
			// 坐标轴配置（隐藏，用于坐标映射）
			xAxis: {
				type: "value",
				show: false,
				min: 0,
				max: map.getContainer().clientWidth,
			},
			yAxis: {
				type: "value",
				show: false,
				min: 0,
				max: map.getContainer().clientHeight,
			},
			// 【重点配置】图表系列配置 - 这里定义了所有的可视化元素
			// 【自定义提示】您可以：
			// - 修改type来改变图表类型（lines/scatter/bar等）
			// - 调整lineStyle来改变线条样式
			// - 修改itemStyle来改变点的样式
			// - 自定义label来改变标签显示
			series: [
				// 【系列1】主干线航线配置
				{
					name: "主干航线",
					type: "lines",
					coordinateSystem: "cartesian2d",
					zlevel: 3,
					data: convertedMainLines,
					lineStyle: {
						color: {
							type: "linear",
							x: 0,
							y: 0,
							x2: 1,
							y2: 1,
							colorStops: [
								{offset: 0, color: "rgba(255, 107, 104, 0.1)"},
								{offset: 0.3, color: "rgba(255, 107, 104, 0.6)"},
								{offset: 0.7, color: "rgba(255, 193, 7, 0.8)"},
								{offset: 1, color: "rgba(255, 235, 59, 1)"},
							],
							global: false,
						},
						width: function (params) {
							return Math.max(params.data.value / 15, 3);
						},
						opacity: 0.8,
						shadowBlur: 15,
						shadowColor: "rgba(255, 193, 7, 0.6)",
					},

				},
				// 【系列2】支线航线配置
				{
					name: "支线航线",
					type: "lines",
					coordinateSystem: "cartesian2d",
					zlevel: 2,
					data: convertedBranchLines,
					lineStyle: {
						color: {
							type: "linear",
							x: 0,
							y: 0,
							x2: 1,
							y2: 1,
							colorStops: [
								{offset: 0, color: "rgba(33, 150, 243, 0.1)"},
								{offset: 0.5, color: "rgba(33, 150, 243, 0.5)"},
								{offset: 1, color: "rgba(0, 188, 212, 0.8)"},
							],
							global: false,
						},
						width: function (params) {
							return Math.max(params.data.value / 25, 2);
						},
						opacity: 0.6,
						shadowBlur: 8,
						shadowColor: "rgba(33, 150, 243, 0.4)",
					},

				},
				// 【系列3】一线城市标记
				{
					name: "一线城市",
					type: "scatter",
					coordinateSystem: "cartesian2d",
					zlevel: 5,
					data: convertedTier1Cities,
					symbolSize: function (val) {
						return Math.max(val[2] / 4, 20);
					},
					itemStyle: {
						color: {
							type: 'radial',
							x: 0.5,
							y: 0.5,
							r: 0.5,
							colorStops: [
								{offset: 0, color: '#FF6B68'},
								{offset: 0.7, color: '#FF8E53'},
								{offset: 1, color: '#FF6B68'}
							]
						},
						shadowBlur: 20,
						shadowColor: "#FF6B68",
						borderColor: '#fff',
						borderWidth: 2
					},
					label: {
						show: true,
						position: "top",
						formatter: "{b}",
						color: "#fff",
						fontSize: 14,
						fontWeight: "bold",
						textBorderColor: '#000',
						textBorderWidth: 1
					},
				},
				// 【系列4】新一线城市标记
				{
					name: "新一线城市",
					type: "scatter",
					coordinateSystem: "cartesian2d",
					zlevel: 4,
					data: convertedNewTier1Cities,
					symbolSize: function (val) {
						return Math.max(val[2] / 5, 16);
					},
					itemStyle: {
						color: {
							type: 'radial',
							x: 0.5,
							y: 0.5,
							r: 0.5,
							colorStops: [
								{offset: 0, color: '#4CAF50'},
								{offset: 0.7, color: '#8BC34A'},
								{offset: 1, color: '#4CAF50'}
							]
						},
						shadowBlur: 15,
						shadowColor: "#4CAF50",
						borderColor: '#fff',
						borderWidth: 1
					},
					label: {
						show: true,
						position: "right",
						formatter: "{b}",
						color: "#fff",
						fontSize: 12,
						fontWeight: "bold",
						textBorderColor: '#000',
						textBorderWidth: 1
					},
				},
				// 【系列5】二线城市标记
				{
					name: "二线城市",
					type: "scatter",
					coordinateSystem: "cartesian2d",
					zlevel: 3,
					data: convertedTier2Cities,
					symbolSize: function (val) {
						return Math.max(val[2] / 6, 12);
					},
					itemStyle: {
						color: {
							type: 'radial',
							x: 0.5,
							y: 0.5,
							r: 0.5,
							colorStops: [
								{offset: 0, color: '#2196F3'},
								{offset: 0.7, color: '#03A9F4'},
								{offset: 1, color: '#2196F3'}
							]
						},
						shadowBlur: 10,
						shadowColor: "#2196F3",
						borderColor: '#fff',
						borderWidth: 1
					},
					label: {
						show: true,
						position: "bottom",
						formatter: "{b}",
						color: "#fff",
						fontSize: 10,
						fontWeight: "normal",
						textBorderColor: '#000',
						textBorderWidth: 1
					},
				},
			],
			// 【配置项】图例配置 - 可自定义图例样式和位置
			legend: {
				show: true,
				orient: 'vertical',
				right: 20,
				top: 20,
				backgroundColor: 'rgba(0,0,0,0.8)',
				borderColor: '#ccc',
				borderWidth: 1,
				borderRadius: 5,
				padding: [10, 15],
				textStyle: {
					color: '#fff',
					fontSize: 12
				},
				data: [
					{name: '主干航线', icon: 'line'},
					{name: '支线航线', icon: 'line'},
					{name: '一线城市', icon: 'circle'},
					{name: '新一线城市', icon: 'circle'},
					{name: '二线城市', icon: 'circle'}
				]
			},
			// 【配置项】悬浮提示配置 - 可自定义提示内容和样式
			tooltip: {
				trigger: 'item',
				backgroundColor: 'rgba(0,0,0,0.8)',
				borderColor: '#ccc',
				borderWidth: 1,
				textStyle: {
					color: '#fff'
				},
				formatter: function (params) {
					if (params.seriesType === 'lines') {
						return params.data.name + '<br/>航线等级: ' + params.seriesName + '<br/>流量: ' + params.data.value;
					} else if (params.seriesType === 'scatter') {
						return params.data.name + '<br/>城市等级: ' + params.seriesName + '<br/>重要度: ' + params.data.value[2];
					}
				}
			}
		};
	}

	// ==================== 5. ECharts实例管理 ====================
	// 【管理函数】清理ECharts实例 - 防止内存泄漏
	function disposeECharts() {
		clearAllAnimationFrames(); // 清除所有动画帧
		if (echartsChart) {
			echartsChart.dispose();
			echartsChart = null;
		}
		// 移除动态创建的容器
		var container = document.getElementById("echarts-container");
		if (container && container.parentNode) {
			container.parentNode.removeChild(container);
		}
	}

	// 【管理函数】初始化ECharts实例 - 创建图表容器
	function initECharts() {
		// 先清理之前的实例
		disposeECharts();

		// 动态创建echarts容器并添加到minemap的canvas容器中
		const mapCanvasContainer = map.getCanvasContainer();
		const container = document.createElement("div");
		container.id = "echarts-container";
		mapCanvasContainer.appendChild(container);

		// 创建新实例，启用性能优化选项
		echartsChart = echarts.init(container, null, {
			renderer: 'canvas', // 使用canvas渲染器以获得更好的性能
			useDirtyRect: true, // 启用脏矩形优化
			useCoarsePointer: true // 启用粗指针优化
		});

		// 延迟更新，确保容器已完全初始化
		requestAnimationFrameWithDelay(function () {
			updateECharts();
		}, 10);
	}

	// 【管理函数】更新ECharts配置 - 响应地图变化
	function updateECharts() {
		if (!echartsChart || isUpdating) return;

		isUpdating = true;

		try {
			var option = getEChartsOption();
			// 使用notMerge: true 和 lazyUpdate: true 来优化性能
			echartsChart.setOption(option, {
				notMerge: true,
				lazyUpdate: true,
				silent: true
			});
		} catch (error) {
			console.error("ECharts更新失败:", error);
		} finally {
			isUpdating = false;
		}
	}

	// ==================== 6. 性能优化工具 ====================
	// 【优化函数】防抖函数 - 减少频繁更新，提升性能
	function debounce(func, delay) {
		var frameId = null;
		return function () {
			var context = this;
			var args = arguments;
			if (frameId) {
				cancelAnimationFrame(frameId);
				animationFrameIds.delete(frameId);
			}
			frameId = requestAnimationFrameWithDelay(function () {
				func.apply(context, args);
				animationFrameIds.delete(frameId);
			}, delay);
		};
	}

	// 【优化函数】节流函数 - 控制更新频率，保证流畅性
	function throttle(func, delay) {
		var frameId = null;
		var lastExecTime = 0;
		return function () {
			var context = this;
			var args = arguments;
			var currentTime = performance.now();

			if (currentTime - lastExecTime > delay) {
				func.apply(context, args);
				lastExecTime = currentTime;
			} else {
				if (frameId) {
					cancelAnimationFrame(frameId);
					animationFrameIds.delete(frameId);
				}
				frameId = requestAnimationFrameWithDelay(function () {
					func.apply(context, args);
					lastExecTime = performance.now();
					animationFrameIds.delete(frameId);
				}, delay - (currentTime - lastExecTime));
			}
		};
	}

	// 创建优化的更新函数
	var throttledUpdate = throttle(updateECharts, 16); // 约60fps
	var debouncedUpdate = debounce(updateECharts, 100); // 停止后100ms更新

	// ==================== 7. 事件监听与初始化 ====================
	// 【初始化】地图加载完成后初始化ECharts
	map.on("load", function () {
		console.log("地图加载完成，初始化ECharts");
		initECharts();

		// 监听地图移动事件 - 使用节流函数减少更新频率
		map.on("move", throttledUpdate);
		map.on("zoom", throttledUpdate);
		map.on("rotate", throttledUpdate);
		map.on("pitch", throttledUpdate);

		// 监听地图移动结束事件 - 使用防抖函数确保最终精确更新
		map.on("moveend", debouncedUpdate);
		map.on("zoomend", debouncedUpdate);
		map.on("rotateend", debouncedUpdate);
		map.on("pitchend", debouncedUpdate);

		// 【事件监听】窗口大小变化处理
		window.addEventListener("resize", function () {
			if (echartsChart) {
				echartsChart.resize();
				// 窗口大小变化后延迟更新，确保容器尺寸已更新
				requestAnimationFrameWithDelay(function () {
					updateECharts();
				}, 50);
			}
		});
	});

	// ==================== 9. 交互控制函数 ====================
	// 【控制变量】图层显示状态
	var showMigrationLines = true;
	var showCityPoints = true;

	// 【控制函数】切换航线显示
	function toggleMigrationLines() {
		showMigrationLines = !showMigrationLines;
		if (echartsChart) {
			echartsChart.dispatchAction({
				type: "legendToggleSelect",
				name: "迁徙线",
			});
		}
	}

	// 【控制函数】切换城市点显示
	function toggleCityPoints() {
		showCityPoints = !showCityPoints;
		if (echartsChart) {
			echartsChart.dispatchAction({
				type: "legendToggleSelect",
				name: "城市点",
			});
		}
	}

	// 【控制函数】重置地图视角
	function resetView() {
		map.flyTo({
			center: [121.461311, 37.444808],
			zoom: 12,
			pitch: 0,
			bearing: 0,
		});
	}

	// ==================== 8. 资源管理与清理 ====================
	// 【资源管理】页面卸载时清理资源
	window.addEventListener('beforeunload', function () {
		disposeECharts();
	});

	// 页面隐藏时暂停更新
	document.addEventListener('visibilitychange', function () {
		if (document.hidden) {
			// 页面隐藏时停止更新
			isUpdating = true;
		} else {
			// 页面显示时恢复更新
			isUpdating = false;
			if (echartsChart) {
				requestAnimationFrameWithDelay(updateECharts, 100);
			}
		}
	});

</script>
