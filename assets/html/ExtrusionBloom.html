<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>Extrusion建筑物高光效果</title>
		<!-- demo样式文件 -->
		<link rel="stylesheet" href="../style/demo.css" />
		<!-- 引入MineMap API插件 -->
		<link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<style>
			#map {
				width: 100%;
				height: 100%;
			}
		</style>
	</head>

	<body>
		<div id="map"></div>
		<script>
			/**
			 * 全局参数设置
			 */
			minemap.domainUrl = "https://minemap.minedata.cn";
			minemap.dataDomainUrl = "https://minemap.minedata.cn";
			minemap.serverDomainUrl = "https://sd-data.minedata.cn";
			minemap.spriteUrl = "https://minemap.minedata.cn/minemapapi/v3.4.0/sprite/sprite";
			minemap.serviceUrl = "https://service.minedata.cn/service";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 15004;
			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};

			let map;
			minemap.util.getJSON("https://service.minedata.cn/map/solu/style/15004", function (err, data) {
				const layers = data.layers;
				//处理图层
				for (let i = 0; i < layers.length; i++) {
					const layer = layers[i];
					if (layer.type === "extrusion") {
						layer.layout.visibility = "none";
					}
				}

				map = new minemap.Map({
					container: "map",
					style: data /*球面矢量底图样式*/,
					center: [114.04254237790797, 22.552380010224734] /*地图中心点*/,
					zoom: 15.8 /*地图默认缩放等级*/,
					pitch: 50 /*地图俯仰角度*/,
					bearing: 0 /*地图旋转角度*/,
					maxZoom: 22 /*地图最大缩放等级*/,
					minZoom: 1 /*地图最小缩放等级*/,
					projection: "MERCATOR"
				});

				// 设置高光效果
				map.bloom = true;

				/**
				 * 添加基本球体图层，包括球体表面、天空盒、大气层
				 *
				 */
				map.on("load", function () {
					// 增加自定义数据源、自定义图层
					const urls = ["../image/extrusion-wall.png"];
					map.loadImages(urls, (error, images) => {
						if (error) throw error;
						map.addImage("extrusion-wall", images[urls[0]], { repeat: true });

						/*添加建筑物数据*/
						map.addSource("ROUGHBUILDING_SOURCE", {
							type: "geojson",
							data: "http://192.168.152.123:11187/demo-data/3d-ultra/assets/extrusion/building.geojson",
							tileUsage: "sphere", // 瓦片用途
							maxzoom: 22
						});

						map.addLayer({
							id: "ROUGHBUILDING",
							type: "extrusion", //图层类型为"extrusion"
							source: "ROUGHBUILDING_SOURCE",
							minzoom: 1,
							maxzoom: 22,
							layout: {
								visibility: "visible"
							},
							paint: {
								"extrusion-pattern": "extrusion-wall", //纹理,如果需要贴图，加入此行参数
								"extrusion-height": { property: "levels", type: "identity" }, //高度
								"extrusion-color": "#D9D9D9", //设置高光颜色
								"extrusion-base": 0, //基础高度
								"extrusion-opacity": 0.8, //透明度
								"extrusion-translate-anchor": "viewport", //建筑物偏移锚点：值域map-正北，viewport--视野
								"extrusion-translate": [0, 0] //建筑物偏移
							}
						});
					});
				});
			});
		</script>
	</body>
</html>
