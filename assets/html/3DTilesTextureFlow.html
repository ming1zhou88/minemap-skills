<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>3DTiles流动纹理（点击更改流动纹理属性）</title>
		<!-- 引入MineMap API插件 -->
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<style>
			html,
			body,
			#map {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
			}

			.toolContainer {
				position: absolute;
				top: 0;
				left: 0;
				z-index: 999;
				background-color: white;
			}
		</style>
	</head>
	<div id="toolContainer" class="toolContainer">
		<label>拾取模型:</label>
		<select id="modifyModelSelect" onchange="modifyModelSelectOperation(this)"></select>
	</div>
	<body>
		<div id="map"></div>
		<script>
			minemap.domainUrl = "https://minedata.cn";
			minemap.dataDomainUrl = "https://minedata.cn";
			minemap.serverDomainUrl = "https://minedata.cn";
			minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
			minemap.serviceUrl = "https://minedata.cn/service/";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;
			window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN"; // minemapCDN 配置
			// window.minemapCDN = "http://192.168.152.123/minemap-engine/minemap-CDN/"; // minemapCDN 配置 http://192.168.152.123/

			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};
			/**
			 * 初始化地图实例
			 */

			var map = new minemap.Map({
				container: "map",
				style: style,
				// style: "https://mineservice.minedata.cn/map/solu/style/11001" /*底图样式*/ /*球面矢量底图样式*/,
				bearing: -95.39987624195602,
				center: [109.93130288410366, 27.448984101415498],
				pitch: 36.00219578182874,
				zoom: 20.99395706138911,
				maxZoom: 22 /*地图最大缩放等级*/,
				minZoom: 1 /*地图最小缩放等级*/,
			});
			map.repaint = true;

			let flowOptions = {};
			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23,
					"depth-test": true
				});

				// TextureLoader只支持加载长宽均为2的n次方的图片
				const arrowTexture = minemap.TextureLoader.load({
					map,
					texUrl: "../image/arrow2.png"
				});

				flowOptions = {
					flowTexture: arrowTexture,
					speed: 10, // 速度取值范围：1-10, 值越大，流动速度越快
					direction: "right", // 纹理流动方向，取值：left,right,up,down
					rotation: 0, // 纹理旋转角度，取值范围：0-360
					texOffset: [0, 0.5], // 横纵纹理偏移量，取值范围：0-1
					texRepeat: [0, 2], // 横纵纹理重复次数。设置lengthAttribute后仅第二个值，即纵向纹理重复次数生效
					texUnit: 2, // 横向纹理单元长度，以length/texUnit确定横向纹理重复的次数
					lengthAttribute: "GXCD" // 横向要素长度字段名称，与texUnit配合使用。如果不设置或读取不到对应属性，则横向纹理重复次数生效
				};

				const tileset = map.addSceneComponent({
					id: "serve",
					type: "3d-tiles",
					show: true,
					translation: new minemap.Math.Vector3(0, 0, 10), //在enu坐标系下的位置移动距离，顺序为[east, north, height]，单位为m，并且只用于3dtiles图层
					url: "../data/中方市政3D_tiles/tileset.json",
					flowOptions: flowOptions,
					skipLevelOfDetail: false, //跨层调度
					maximumScreenSpaceError: 8,
					/**
					 * 飞行选择
					 * index: 指定飞行目标(优先)
					 * combine: 合并bounds为飞行目标
					 */
					geoBoundsOptions: {
						index: 1,
						combine: true
					},
					allowPick: true,
					lightingModel: minemap.LightingModelType.NONE
				});
				window.tileset = tileset;
			});

			const modifyModelSelectOptionMode = ["修改箭头纹理", "修改箭头速度", "修改模型颜色"];
			const modifyModelSelect = document.getElementById("modifyModelSelect");
			for (let i = 0; i < modifyModelSelectOptionMode.length; i++) {
				modifyModelSelect.options.add(
					new Option(modifyModelSelectOptionMode[i], modifyModelSelectOptionMode[i])
				);
			}
			modifyModelSelect.selectedIndex = 0;

			const ModefyType = {
				TEXTURE: 0,
				SPEED: 1,
				COLOR: 2
			};
			let modelType = 0;
			function modifyModelSelectOperation(selectObject) {
				let showSpeedValue = false;
				let showColorInput = false;
				if (selectObject.value === "修改箭头纹理") {
					modelType = 0;
				} else if (selectObject.value === "修改箭头速度") {
					modelType = 1;
					showSpeedValue = true;
				} else {
					modelType = 2;
					showColorInput = true;
				}

				showSpeedTable(showSpeedValue);
				showColorTable(showColorInput);
			}

			let speedTable;
			function showSpeedTable(value) {
				if (value) {
					speedTable = document.createElement("input");
					speedTable.value = 5.0;
					speedTable.id = "speedInput";
					document.getElementById("toolContainer").appendChild(speedTable);
				} else {
					if (speedTable !== undefined) {
						document.getElementById("toolContainer").removeChild(speedTable);
						speedTable = undefined;
					}
				}
			}

			let colorTable;
			function showColorTable(value) {
				if (value) {
					if (colorTable !== undefined) {
						return;
					}
					colorTable = document.createElement("input");
					colorTable.type = "color";
					colorTable.id = "colorInput";
					document.getElementById("toolContainer").appendChild(colorTable);
				} else {
					if (colorTable !== undefined) {
						document.getElementById("toolContainer").removeChild(colorTable);
						colorTable = undefined;
					}
				}
			}

			const newTexture = minemap.TextureLoader.load({
				map,
				texUrl: "../image/arrow.png"
			});
			const newFlowOptions = {
				speed: 1, // 速度取值范围：1-10, 值越大，流动速度越快
				direction: "right", // 纹理流动方向，取值：left,right,up,down
				rotation: 180, // 纹理旋转角度，取值范围：0-360
				texOffset: [0, 0.5], // 横纵纹理偏移量，取值范围：0-1
				texRepeat: [0, 2], // 横纵纹理重复次数。设置lengthAttribute后仅第二个值，即纵向纹理重复次数生效
				texUnit: 4, // 横向纹理单元长度，以length/texUnit确定横向纹理重复的次数
				flowTexture: newTexture
			};

			map.on("click", function (e) {
				const feature = map.getFeatureByGPUPick(e.point);
				if (feature) {
					switch (modelType) {
						case ModefyType.TEXTURE:
							const primitive = feature.getParentPrimitive(map);
							if (primitive) {
								primitive.material.flowTexture(newFlowOptions);
							}
							break;
						case ModefyType.SPEED:
							const speed = parseFloat(document.getElementById("speedInput").value);
							feature.speed = speed;
							break;
						default:
							feature.color = document.getElementById("colorInput").value;
							break;
					}
				}
			});
		</script>
	</body>
</html>
