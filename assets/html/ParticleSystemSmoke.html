<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>粒子系统-烟雾</title>
	<link
		rel="stylesheet"
		href="../style/demo.css"
	/>
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = "https://minedata.cn";
	minemap.dataDomainUrl = "https://minedata.cn";
	minemap.serverDomainUrl = "https://minedata.cn";
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	minemap.serviceUrl = "https://minedata.cn/service/";

	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
	minemap.solution = 11001;
	window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

	// 定义空底图样式
	var style = {
		glyphs: "minemap://fonts/{fontstack}/{range}",
		sprite: "minemap://sprite/sprite",
		sources: {},
		layers: [],
		version: 8
	};

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: "map",
		style: style,
		/*球面矢量底图样式*/
		position: [108.96210030559139, 34.21740914255333, 13.67295348190717],
		/*地图中心点*/
		bearing: -57.45438505387203,
		/*地图默认缩放等级*/
		pitch: 88.52920819467812,
		/*地图俯仰角度*/
		maxZoom: 22,
		/*地图最大缩放等级*/
		minZoom: 1,
		/*地图最小缩放等级*/
		projection: "MERCATOR"
	});
	map.repaint = true;

	map.on("load", function () {
		/*添加栅格图*/
		map.addSource("IMAGERY_SOURCE", {
			type: "raster", //数据源类型：栅格数据源
			tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			tileSize: 512 //瓦片尺寸
		});

		map.addLayer({
			id: "IMAGERY",
			type: "raster", //图层类型为"raster"
			source: "IMAGERY_SOURCE",
			minzoom: 1,
			maxzoom: 23,
			paint: {
				"raster-opacity": 1
			},
			"depth-test": true
		});

		const texture = minemap.TextureLoader.load({ map, texUrl: "../data/image/texture1.png", flipY: true });
		const modelMatrix = minemap.Transforms.cartographicToFixedFrame(new minemap.Math.Vector3([108.9605960470355, 34.21830728693849, 0]));
		// 构建粒子系统-烟雾
		const grey = new minemap.Math.Vector4(.5, .5, .5, 1);
		const smoke = new minemap.ParticleSystem({
			modelMatrix,
			duration: 5,
			looping: true,
			startLife: new minemap.ParticleFunctions.IntervalValue(1.5, 3),
			startSpeed: new minemap.ParticleFunctions.IntervalValue(20, 30),
			startSize: new minemap.ParticleFunctions.IntervalValue(10, 15),
			startColor: new minemap.ParticleFunctions.ConstantColor(grey),
			worldSpace: true,

			emissionOverTime: new minemap.ParticleFunctions.ConstantValue(20),
			shape: new minemap.ConeEmitter({
				radius: 10,
				thickness: 1,
				angle: 0.2
			}),
			material: new minemap.BasicMaterial({
				baseColorMap: texture,
				transparent: true,
				doubleSided: true,
				renderState: {
					cull: {
						enabled: true
					},
					depthTest: {
						enabled: true,
						func: minemap.WebGLConstants.LEQUAL
					},
					depthMask: false
				}
			}),
			startTileIndex: new minemap.ParticleFunctions.ConstantValue(2),
			uTileCount: 10,
			vTileCount: 10,
			renderMode: minemap.RenderMode.BillBoard,
			renderOrder: 2,
		});
		//gatherParticles.addBehavior(new SizeOverLife(new PiecewiseBezier([[new Bezier(1, 0.25, 0.05, 0), 0]])));
		smoke.addBehavior(new minemap.ParticleBehaviors.ColorOverLife(new minemap.ParticleFunctions.ColorRange(new minemap.Math.Vector4(1, 1, 1, 1), new minemap.Math.Vector4(.8, .8, .8, 0))));
		smoke.addBehavior(new minemap.ParticleBehaviors.SizeOverLife(new minemap.ParticleFunctions.PiecewiseBezier([[new minemap.ParticleFunctions.Bezier(0.2, 1, 1, 1), 0]])));
		smoke.emitter.name = 'smoke';
		smoke.emitter.rotation.x = -Math.PI / 2;
		// 添加粒子系统到地图
		map.addParticleSystem(smoke);
	});

</script>
</body>
</html>
