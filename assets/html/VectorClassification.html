<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>terrain地形数据加载于模式切换</title>
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css">
	<script src="../../dist/minemap-dev.js"></script>
	<style>
		html, body, #map {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = 'https://minemap.minedata.cn';
	minemap.dataDomainUrl = 'https://minemap.minedata.cn';
	minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	minemap.serviceUrl = 'https://service.minedata.cn/service';

	/**
	 * token、solution设置
	 */
	minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
	minemap.solution = 11001;

	// 定义空底图样式
	var style = {
		"glyphs": "minemap://fonts/{fontstack}/{range}",
		"sprite": "minemap://sprite/sprite",
		"sources": {},
		"layers": [{
			"id": "background",
			"type": "background",
			"source": "",
			"paint": {
				"background-color": "#005100"
			}
		}],
		"version": 8
	};

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: 'map',
		style: style, /*球面矢量底图样式*/
		center: [116.46,39.92], /*地图中心点*/
		zoom: 12, /*地图默认缩放等级*/
		pitch: 60, /*地图俯仰角度*/
		bearing: 60,/*地图旋转角度*/
		maxZoom: 22, /*地图最大缩放等级*/
		minZoom: 1,  /*地图最小缩放等级*/
	});

	map.setTerrain({
		"tiles": ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
		"tileSize": 512,  //瓦片大小
		"maxzoom": 14        //dem最高切分zoom，30米一般是14级；12.5米一般是16级
	});

	var lngLat;

	/**
	 * 添加基本球体图层，包括球体表面、天空盒、大气层
	 *
	 */
	map.on('load', function () {
		/*添加DEM数字高程模型数据*/
		map.addSource("3D_SOURCE", {
			"type": "raster",//DEM的数据类型为"raster"
			"tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			"tileSize": 512,  //瓦片大小

		});
		map.addLayer({
			"type": "raster",//DEM的图层类型为"raster"
			"id": "3d-layer",
			"source": "3D_SOURCE",
			"minzoom": 1,
			"maxzoom": 20,
			"layout": {}
		})

		lngLat = map.getCenter();
		const exData = {
			type: 'FeatureCollection',
			features: [
				{
					type: 'Feature',
					geometry: {
						type: 'LineString',
						coordinates: [
							[lngLat.lng - 1, lngLat.lat],
							[lngLat.lng + 1, lngLat.lat],
						]
					},
					properties: {
						title: '路线一',
						kind: 1
					}
				},
			]
		};
		map.addSource('fillSource1', {
			"type": 'geojson',
			"data": exData,
			"minzoom": 1,
			"maxzoom": 23,
			"buffer": 0
		});

		/*
		 * ClassificationType 贴合底面数据类型,支持设置
		 * ClassificationType.NONE 默认值，不叠加任何数据
		 * ClassificationType.MINEMAP_3D_TILE 叠加3DTiles数据
		 * ClassificationType.TERRAIN 叠加地形数据
		 * ClassificationType.BOTH 同时叠加地形和3DTiles数据
		 * ClassificationType.ALL 同时叠加地形、3DTiles、栅格影响图层
		 */
		map.addLayer({
			"id": 'lineLayer2',
			"type": 'line',
			"source": 'fillSource1',
			"classificationType": minemap.ClassificationType.ALL,
			"layout": {
				"line-join": "round",//线拐角样式
				"line-cap": "round",//线帽样式
				'border-visibility': 'none' //是否开启线边框，开启visiable
			},
			paint: {
				'line-width': 10,//设置线
				'line-color': '#ff0000',//设置线颜色
				"line-border-width": 3, //设置线边框宽度
				"line-opacity": 0.5, //设置线边框透明度
				"line-border-color": "blue" //设置线边框颜色
			},
			minzoom: 1,
			maxzoom: 23
		});

	})


</script>
</body>

</html>
