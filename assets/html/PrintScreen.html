<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>截屏功能</title>
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		html,
		#map,
		body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 说明：
	 * 截屏功能的核心是map.printScreen(range, download)，它第一个参数接收一个像素坐标的列表（具体数据类型请查看文档）。
	 * 此示例使用了引擎的事件以及其他功能来获取这个像素坐标列表，这在某些情况下或许不足以满足开发要求，但是开发者在使用时并不一定要像示例中这样做。
	 * 因为我们的目标是得到一个像素坐标列表来调用上面提到的接口，获取像素坐标列表的手段是自由的。
	 */
	minemap.domainUrl = "https://minedata.cn";
	minemap.serverDomainUrl = "https://minedata.cn";
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";
	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";

	const style = {
		glyphs: "minemap://fonts/{fontstack}/{range}",
		sprite: "minemap://sprite/sprite",
		sources: {},
		layers: [],
		version: 8
	};
	window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN"; // minemapCDN 配置

	const map = new minemap.Map({
		container: "map",
		style: style,
		center: [108.94733550459136, 34.30940496948484],
		pitch: 51.694,
		bearing: -177.317,
		zoom: 14,
		maxZoom: 22,
		minZoom: 1
	});
	map.repaint = true;

	map.on("load", function () {
		addRasterLayer();
		addGUI();

		// 3dtiles
		const tileset = map.addSceneComponent({
			id: "serve",
			type: "3d-tiles",
			show: true,
			translation: new minemap.Math.Vector3(0, 0, 0), //在enu坐标系下的位置移动距离，顺序为[east, north, height]，单位为m，并且只用于3dtiles图层
			minzoom: 1, //3d-tiles加载显示的最小层级
			maxzoom: 22, //3d-tiles加载显示的最大层级
			url: "https://staticdata-b.minedata.cn:14434/oblique/tileset.json",
			skipLevelOfDetail: false, //跨层调度
			maximumScreenSpaceError: 8,
			sourceLoaded: (tileset) => {
				// map.flyTo({
				// 	target: tileset,
				// 	bearing: 0,
				// 	pitch: 0,
				// 	duration: 2000,
				// 	range: 1000
				// });
			},
			/**
			 * 飞行选择
			 * index: 指定飞行目标(优先)
			 * combine: 合并bounds为飞行目标
			 */
			geoBoundsOptions: {
				index: 1,
				combine: true
			},
			allowPick: true
		});
		window.tileset = tileset;
	});

	let geometry,
		primitive,
		startDraw = false,
		positions = [],
		tempPoint = [],
		pixels = [];
	const drawPolygon = () => {
		positions = [];
		pixels = [];
		startDraw = true;
		geometry = new minemap.Geometries.PolygonGeometry({
			polygonHierarchy: {
				positions: function () {
					const results = positions.concat(tempPoint);
					if (
						results.length > 3 &&
						minemap.Geometries.PolygonGeometry.isSelfIntersection(results, true)
					) {
						return positions;
					} else {
						return results;
					}
				}
			},
			perPositionHeight: true
		});

		const material = new minemap.PhysicalMaterial({
			doubleSided:  true,
			roughness: 0.5,
			metallic: 0.0,
			baseColor: [1.0, 0.5, 0.0, 0.5]
		});

		primitive = new minemap.Primitive({
			geometry: geometry,
			material: material
		});

		map.addPrimitive(primitive);
	}

	map.on("click", function (e) {
		if (startDraw) {
			const point = map.painter.getPositionByGPUPick(e.point);
			pixels.push([e.point.x, e.point.y]);
			positions.push(minemap.Math.Vector3.fromDegrees(point.x, point.y, point.z));
		}
	});

	map.on("mousemove", function (e) {
		if (startDraw) {
			tempPoint = [];
			const point = map.painter.getPositionByGPUPick(e.point);
			tempPoint.push(minemap.Math.Vector3.fromDegrees(point.x, point.y, point.z));
		}
	});

	map.on("contextmenu", function (e) {
		if (startDraw) {
			pixels.push([e.point.x, e.point.y]);
			startDraw = false;
			map.removePrimitive(primitive);

			map.printScreen(pixels, true).then((result) => {
				console.log(result);
			});
		}
	});

	function addRasterLayer() {
		map.addSource("IMAGERY_SOURCE", {
			type: "raster",
			tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"],
			tileSize: 512
		});

		map.addLayer({
			id: "IMAGERY",
			type: "raster",
			source: "IMAGERY_SOURCE",
			minzoom: 1,
			maxzoom: 23
		});
	}

	function addGUI() {
		const GUIOptions = {
			drawPolygon: drawPolygon
		};
		const gui = new lil.GUI({ title: "截屏功能" });
		gui.add(GUIOptions, "drawPolygon").name("绘制截屏区域");
	}
</script>
</body>
</html>
