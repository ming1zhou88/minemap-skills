<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Fbx通用模型属性挂接</title>
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../style/demo.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<script type="text/javascript" src="../js/lil-gui.umd.min.js"></script>
	<style>
		html,
		body,
		#map {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}

		table {
			position: fixed;
			top: 53px;
			right: 14px;
			z-index: 999;
			background: #fff;
			border: solid 1px #000000;
			border-collapse: collapse;
			padding: 2px 3px;
			text-align: center;
		}

		tbody {
			max-height: 600px;
			max-width: 400px;
			display: block;
			overflow: auto;
		}

		td,
		th {
			border: solid 1px #000000;
			border-collapse: collapse;
			padding: 2px 3px;
			text-align: center;
		}

		th {
			font-weight: bold;
		}
	</style>
</head>

<body>
	<div id="map">
		<div id="showTable"></div>
	</div>
	<script>
		/**
		 * 全局参数设置
		 */
		minemap.domainUrl = "https://minedata.cn";
		minemap.dataDomainUrl = "https://minedata.cn";
		minemap.serverDomainUrl = "https://minedata.cn";
		minemap.spriteUrl = "https://minedata.cn/minemapapi/sprite/latest/sprite";
		minemap.serviceUrl = "https://minedata.cn/service/";

		minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
		minemap.solution = 11001;
		// window.minemapCDN = 'https://minedata.cn/minemapapi/minemap-CDN'; // minemapCDN 配置
		window.minemapCDN = "http://192.168.152.123/minemap-engine/minemap-CDN/"; // minemapCDN 配置 http://192.168.152.123/

		// 定义空底图样式
		var style = {
			glyphs: "minemap://fonts/{fontstack}/{range}",
			sprite: "minemap://sprite/sprite",
			sources: {},
			layers: [],
			version: 8
		};
		/**
		 * 初始化地图实例
		 */

		var map = new minemap.Map({
			container: "map",
			style: style,
			// style: "https://mineservice.minedata.cn/map/solu/style/11001" /*底图样式*/ /*球面矢量底图样式*/,
			bearing: 0,
			center: [116.3918209754059, 39.90984826212655],
			pitch: 45,
			zoom: 17,
			maxZoom: 22 /*地图最大缩放等级*/,
			minZoom: 1 /*地图最小缩放等级*/,
			OIT: true, // 开启OIT才能让被遮挡的地下物体显示出来
			MSAASamples: 4, // 抗锯齿选项，默认为1，即不开启
			enableUnderGround: true
		});
		map.repaint = true;
		map.enableLight();

		map.on("load", function () {
			/*添加栅格图*/
			map.addSource("IMAGERY_SOURCE", {
				type: "raster", //数据源类型：栅格数据源
				tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
				tileSize: 512 //瓦片尺寸
			});

			map.addLayer({
				id: "IMAGERY",
				type: "raster", //图层类型为"raster"
				source: "IMAGERY_SOURCE",
				minzoom: 1,
				maxzoom: 23,
				"depth-test": true,
				paint: {
					"raster-opacity": 0.7
				}
			});

			const tileset = map.addSceneComponent({
				id: "serve",
				type: "3d-tiles",
				show: true,
				translation: new minemap.Math.Vector3(0, 0, 0),
				url: "http://192.168.152.123/minemap-engine/EngineCanaryDemo/data/3dtile-prop-fbx/tileset.json",
				skipLevelOfDetail: true, //跨层调度
				maximumScreenSpaceError: 8,
				lightingModel: minemap.LightingModelType.PBR,
				sourceLoaded: (tileset) => {
					map.flyTo({
						target: tileset,
						bearing: 0,
						pitch: 0,
						duration: 2000,
						range: 1000
					});
				},
				/**
				 * 飞行选择
				 * index: 指定飞行目标(优先)
				 * combine: 合并bounds为飞行目标
				 */
				geoBoundsOptions: {
					index: 0,
					combine: false
				}
			});
			window.tileset = tileset;

			initializeGUI();
		});

		let timeStart,
			async = false;
		map.on("click", function (e) {
			if (async) {
				timeStart = Date.now();
				map.getFeatureByGPUPickAsync(e.point).then((feature) => {
					console.log(`异步查询用时${Date.now() - timeStart}ms`);
					updateUI(feature);
				});
			} else {
				timeStart = Date.now();
				const feature = map.getFeatureByGPUPick(e.point);
				console.log(`同步查询用时${Date.now() - timeStart}ms`);
				updateUI(feature);
			}
		});

		let prePrimitive;
		let preColor;
		function updateUI(feature) {

			console.log(feature)

			// 包含json文件时才解析
			if (feature && feature._content && feature._content.json) {
				if (prePrimitive) {
					prePrimitive.color = [0, 0, 0, 0];
				}

				prePrimitive = feature;
				preColor = feature.color;

				feature.color = [1.0, 1.0, 0.0, 1.0]; //选中部分，设置高亮颜色

				// Create table.
				const table = document.createElement("table");

				// Create table header row using the extracted headers above.
				let tr = table.insertRow(-1); // table row.
				let th = document.createElement("th");
				th.innerHTML = "BatchID";
				tr.appendChild(th);
				th = document.createElement("th");
				th.innerHTML = feature._batchId;
				tr.appendChild(th);

				const json = feature._content.json;
				const map = new Map(Object.entries(json));
				// 遍历所有key值
				for (let key of map.keys()) {
					tr = table.insertRow(-1);
					// 利用featureTable类型自带getProperty()函数得到属性
					let value = feature.getProperty(key);
					let tabCell = tr.insertCell(-1);
					tabCell.innerHTML = key;
					tabCell = tr.insertCell(-1);
					tabCell.innerHTML = value;
				}

				const divShowData = document.getElementById("showTable");
				divShowData.innerHTML = "";
				divShowData.appendChild(table);
			} else {
				if (prePrimitive) {
					prePrimitive.color = [0, 0, 0, 0];
				}
				// preColor = null;
				const divShowData = document.getElementById("showTable");
				divShowData.innerHTML = "";
				console.log("未选中任何要素");
			}
		}

		const params = {
			异步查询: false
		};
		function initializeGUI() {
			const gui = new lil.GUI({ width: 300 });
			gui.onChange((event) => {
				params[event.property] = event.value;
			});

			gui.add(params, "异步查询").onChange((value) => {
				async = value;
			});
		}
	</script>
</body>

</html>
