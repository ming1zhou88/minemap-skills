<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>球体地图的初始化</title>
  <!-- 引入MineMap API插件 -->
  <link rel="stylesheet" href="../../dist/minemap.css" />
  <script src="../../dist/minemap-dev.js"></script>
  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  /**
   * 全局参数设置
   */
  minemap.domainUrl = 'https://minemap.minedata.cn';
  minemap.dataDomainUrl = 'https://minemap.minedata.cn';
  minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
  minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
  minemap.serviceUrl = 'https://service.minedata.cn/service';

  minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
  minemap.solution = 11001;

  // 定义空底图样式
  var style = {
    "glyphs": "minemap://fonts/{fontstack}/{range}",
    "sprite": "minemap://sprite/sprite",
    "sources": {},
    "layers": [],
    "version": 8
  };

  /**
   * 初始化地图实例
   */
  var map = new minemap.Map({
    container: 'map',
    style: style, /*底图样式*/
    center: [-116.24544236500333, 40.07254296210216], /*地图中心点*/
    zoom: 1.5, /*地图默认缩放等级*/
    pitch: 0, /*地图俯仰角度*/
    maxZoom: 22, /*地图最大缩放等级*/
    minZoom: 1,  /*地图最小缩放等级*/
    projection: 'MERCATOR'
  });
  map.repaint = true;

  map.on('load', function () {

	  map.addSource("IMAGERY_SOURCE", {
		  "type": "raster",//数据源类型：栅格数据源
		  "tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
		  "tileSize": 512,//瓦片尺寸
		  // "bounds": [-104, 37, -100, 41],
	  });

	  map.addLayer({
		  "id": "IMAGERY",
		  "type": "raster", //图层类型为"raster"
		  "source": "IMAGERY_SOURCE",
		  "minzoom": 1,
		  "maxzoom": 23,
	  });

	  // 给定GetCapabilities的链接
	  minemap.util.getString('https://mrdata.usgs.gov/mapcache/wmts?request=GetCapabilities&service=wmts', function (error, data) {
		  if (!error) {
			  const parser = new minemap.WMTSCapabilities();
			  const capabilities = parser.read(data);
			  // 此处可以在控制台打印capabilities, 查看所有图层信息
			  // console.log(capabilities)
			  const result = minemap.optionsFromCapabilities(capabilities,
				  {
					  requestEncoding: 'REST', // 目前必须指定为REST todo: 需解决编码格式为KVP时，无法生成对应的url的bug
					  layer: 'sgmc2', // 图层Identifier, 不是Title
					  matrixSet: 'GoogleMapsCompatible', // 指定图层指向的TileMatrixSet的名称
					  // format: 'image/png' // 可选, 指定栅格的格式, 不输入则默认选择ResoureURL里的第一个url
				  }
			  );

			  map.addSource("IMAGERY_SOURCE2", {
				  "type": "raster",//数据源类型：栅格数据源
				  "tiles": result.urls, //瓦片服务地址
				  "service": "WMTS", //以后可以扩展为WMS等服务
				  "capabilities": result,//服务配置信息 todo: 考虑是否直接写入xml的访问链接, 在内部解析
				  "tileSize": 512,
				  // "bounds": [-104, 37, -100, 41],
			  });
			  map.addLayer({
				  "id": "IMAGERY2",
				  "type": "raster", //图层类型为"raster"
				  "source": "IMAGERY_SOURCE2",
				  "minzoom": 1,
				  "maxzoom": 24,
			  });
		  } else {
			  console.log(error);
		  }

	  });
  });

</script>
</body>
</html>
