<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>粒子系统-电离球</title>
	<link
		rel="stylesheet"
		href="../style/demo.css"
	/>
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = "https://minedata.cn";
	minemap.dataDomainUrl = "https://minedata.cn";
	minemap.serverDomainUrl = "https://minedata.cn";
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	minemap.serviceUrl = "https://minedata.cn/service/";

	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
	minemap.solution = 11001;
	window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

	// 定义空底图样式
	var style = {
		glyphs: "minemap://fonts/{fontstack}/{range}",
		sprite: "minemap://sprite/sprite",
		sources: {},
		layers: [],
		version: 8
	};

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: "map",
		style: style,
		/*球面矢量底图样式*/
		position: [108.9607594956354, 34.21819059315598, 10.283513220452917],
		/*地图中心点*/
		bearing: -51.85538546707883,
		/*地图默认缩放等级*/
		pitch: 77.66770894469668,
		/*地图俯仰角度*/
		maxZoom: 22,
		/*地图最大缩放等级*/
		minZoom: 1,
		/*地图最小缩放等级*/
		projection: "MERCATOR"
	});
	map.repaint = true;
	// map.enableLight();
	map.setSunLightTime({
		year: 2023,
		month: 10,
		day: 1,
		hour: 12,
		minute: 34,
		seconds: 0
	})

	map.on("load", function () {
		/*添加栅格图*/
		map.addSource("IMAGERY_SOURCE", {
			type: "raster", //数据源类型：栅格数据源
			tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			tileSize: 512 //瓦片尺寸
		});

		map.addLayer({
			id: "IMAGERY",
			type: "raster", //图层类型为"raster"
			source: "IMAGERY_SOURCE",
			minzoom: 1,
			maxzoom: 23,
			paint: {
				"raster-opacity": 1
			}
		});

		const texture = minemap.TextureLoader.load({ map, texUrl: "../data/image/texture1.png", flipY: true });
		const modelMatrix = minemap.Transforms.cartographicToFixedFrame(new minemap.Math.Vector3([108.9605960470355, 34.21830728693849, 10]));
		const material = new minemap.BasicMaterial({
			baseColorMap: texture,
			transparent: true,
			doubleSided: true,
			renderState: {
				cull: {
					enabled: true
				},
				depthTest: {
					enabled: true,
					func: minemap.WebGLConstants.LEQUAL
				},
				depthMask: false
			}
		});
		// 构建粒子系统
		const beam = new minemap.ParticleSystem({
			modelMatrix: modelMatrix, // 模型矩阵
			duration: 1,
			looping: true,
			startLife: new minemap.ParticleFunctions.ConstantValue(1.0),
			startSpeed: new minemap.ParticleFunctions.ConstantValue(0),
			startSize: new minemap.ParticleFunctions.ConstantValue(15.0),
			startColor: new minemap.ParticleFunctions.ConstantColor(new minemap.Math.Vector4(0.5220588 * 0.772549, 0.6440161 * 0.772549, 1 * 0.772549, 0.772549)),
			worldSpace: false,

			emissionOverTime: new minemap.ParticleFunctions.ConstantValue(1),
			emissionBursts: [],
			shape: new minemap.PointEmitter(),
			material,
			startTileIndex: new minemap.ParticleFunctions.ConstantValue(1),
			uTileCount: 10,
			vTileCount: 10,
			renderOrder: 0,
		});
		beam.emitter.name = 'beam';
		// 添加粒子系统到地图
		map.addParticleSystem(beam);

		const beamWorld = new minemap.ParticleSystem({
			modelMatrix: modelMatrix, // 模型矩阵
			duration: 1,
			looping: true,
			startLife: new minemap.ParticleFunctions.IntervalValue(0.1, 0.4),
			startSpeed: new minemap.ParticleFunctions.ConstantValue(0),
			startSize: new minemap.ParticleFunctions.IntervalValue(7.5, 15),
			startColor: new minemap.ParticleFunctions.RandomColor(new minemap.Math.Vector4(0.1397059 * 0.8, 0.3592291 * 0.8, 1 * 0.8, 1), new minemap.Math.Vector4(1 * 0.8, 0.9275356 * 0.8, 0.1029412 * 0.8, 1)),
			worldSpace: true,


			emissionOverTime: new minemap.ParticleFunctions.IntervalValue(5, 10),
			emissionBursts: [],
			shape: new minemap.SphereEmitter({
				radius: 0.01,
				thickness: 1,
				arc: Math.PI * 2
			}),
			material,
			startTileIndex: new minemap.ParticleFunctions.ConstantValue(1),
			uTileCount: 10,
			vTileCount: 10,
			renderOrder: 0,
		});
		beamWorld.emitter.name = 'beamWorld';
		beamWorld.addBehavior(new minemap.ParticleBehaviors.ColorOverLife(new minemap.ParticleFunctions.ColorRange(new minemap.Math.Vector4(1.0, 1.0, 1.0, 1.0), new minemap.Math.Vector4(0.0, 0.0, 0.0, 1.0))));
		// 添加粒子系统到地图
		map.addParticleSystem(beamWorld);

		const electricity = new minemap.ParticleSystem({
			modelMatrix: modelMatrix, // 模型矩阵
			duration: 0.5,
			looping: true,

			startLife: new minemap.ParticleFunctions.IntervalValue(0.2, 0.3),
			startSpeed: new minemap.ParticleFunctions.ConstantValue(0),
			startSize: new minemap.ParticleFunctions.IntervalValue(3, 6),
			startRotation: new minemap.ParticleFunctions.IntervalValue(-Math.PI, Math.PI),
			startColor: new minemap.ParticleFunctions.RandomColor(new minemap.Math.Vector4(0.1397059, 0.3592291, 1, 1), new minemap.Math.Vector4(1, 0.9275356, 0.1029412, 1)),
			worldSpace: true,

			emissionOverTime: new minemap.ParticleFunctions.IntervalValue(5, 10),
			emissionBursts: [],

			shape: new minemap.PointEmitter(),
			material,
			startTileIndex: new minemap.ParticleFunctions.ConstantValue(0),
			uTileCount: 10,
			vTileCount: 10,
			renderOrder: 2,
		});
		//electricity.addBehavior(new ColorOverLife(([[new Bezier(61, 64, 67, 70), 0]])));
		electricity.addBehavior(new minemap.ParticleBehaviors.FrameOverLife(new minemap.ParticleFunctions.PiecewiseBezier([[new minemap.ParticleFunctions.Bezier(53, 56, 59, 62), 0]])));
		electricity.addBehavior(new minemap.ParticleBehaviors.SizeOverLife(new minemap.ParticleFunctions.PiecewiseBezier([[new minemap.ParticleFunctions.Bezier(1.0, 1.0, 0.75, 0), 0]])));
		electricity.emitter.name = 'electricity';
		// 添加粒子系统到地图
		map.addParticleSystem(electricity);

		const electricBall = new minemap.ParticleSystem({
			modelMatrix: modelMatrix, // 模型矩阵
			duration: 0.4,
			looping: true,

			startLife: new minemap.ParticleFunctions.IntervalValue(0.2, 0.4),
			startSpeed: new minemap.ParticleFunctions.ConstantValue(0),
			startSize: new minemap.ParticleFunctions.IntervalValue(5, 10),
			startRotation: new minemap.ParticleFunctions.IntervalValue(-Math.PI, Math.PI),
			startColor: new minemap.ParticleFunctions.RandomColor(new minemap.Math.Vector4(0.1397059, 0.3592291, 1, 1), new minemap.Math.Vector4(1, 0.9275356, 0.1029412, 1)),
			worldSpace: false,


			emissionOverTime: new minemap.ParticleFunctions.ConstantValue(3),
			emissionBursts: [],

			shape: new minemap.PointEmitter(),
			material,
			startTileIndex: new minemap.ParticleFunctions.ConstantValue(0),
			uTileCount: 10,
			vTileCount: 10,
			renderOrder: 1,
		});
		electricBall.addBehavior(new minemap.ParticleBehaviors.FrameOverLife(new minemap.ParticleFunctions.PiecewiseBezier([[new minemap.ParticleFunctions.Bezier(62, 65, 68, 71), 0]])));
		electricBall.emitter.name = 'electricBall';
		// 添加粒子系统到地图
		map.addParticleSystem(electricBall);
	});

</script>
</body>
</html>
