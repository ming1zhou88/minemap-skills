<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta
            name="viewport"
            content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <link
            rel="stylesheet"
            href="../style/demo.css"
    />

    <title>map remove event未移除</title>
    <!-- <script src="http://192.168.153.116:18111/minemapapi/v4.0.0/minemap.js"></script> -->
    <script src="../../dist/minemap-dev.js"></script>

    <!-- <script src="http://127.0.0.1:4000/dist/minemap-dev.js"></script> -->

    <style>
        #map {
            width: 100%;
            height: 100%;
        }

        #text {
            position: absolute;
            z-index: 999;
            top: 16px;
            right: 14px;
            background: #fff;
            border-radius: 1px;
        }

        .text-content {
            line-height: 38px;
            padding: 0 16px 0 12px;
        }

        .minemap-popup-content {
            font-size: 12px !important;
            font-weight: 400;
            position: relative;
            padding: 0 !important;
            background-color: transparent !important;
        }

        .minemap-popup-anchor-top-left .minemap-popup-tip {
            border-bottom-color: rgba(255, 255, 255, 0) !important;
        }

        .minemap-popup-diy-jw {
            line-height: 28px;
            text-align: center;
            height: 28px;
            border-radius: 2px;
            color: #e5f0ff;
            display: inline-block;
            background: rgba(43, 43, 51, 0.8);
            padding: 0 10px;
        }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    /**
     * 全局参数设置
     */
    minemap.domainUrl = "https://minemap.minedata.cn";
    minemap.dataDomainUrl = "https://minemap.minedata.cn";
    minemap.serverDomainUrl = "https://sd-data.minedata.cn";
    minemap.spriteUrl =
        "https://minemap.minedata.cn/minemapapi/v3.4.0/sprite/sprite";
    minemap.serviceUrl = "https://service.minedata.cn/service";

    /**
     * token、solution设置
     */
    minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
    minemap.solution = 11001;

    // 定义空底图样式
    var style = {
        glyphs: "minemap://fonts/{fontstack}/{range}",
        sprite: "minemap://sprite/sprite",
        sources: {},
        layers: [
            {
                id: "background",
                type: "background",
                source: "",
                paint: {
                    "background-color": "#005100",
                },
            },
        ],
        version: 8,
    };

    /**
     * 初始化地图实例
     */
    var map = new minemap.Map({
        container: "map",
        style: style /*球面矢量底图样式*/,
        center: [120.38350045826306, 36.09331460005243] /*地图中心点*/,
        zoom: 15 /*地图默认缩放等级*/,
        pitch: 0 /*地图俯仰角度*/,
        bearing: 0 /*地图旋转角度*/,
        maxZoom: 22 /*地图最大缩放等级*/,
        minZoom: 1 /*地图最小缩放等级*/,
        projection: "MERCATOR",
    });

    map.on("load", function () {
        /*添加DEM数字高程模型数据*/
        map.addSource("3D_SOURCE", {
            type: "raster", //DEM的数据类型为"raster"
            tiles: [
                "https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg",
            ], //瓦片服务地址
        });
        map.addLayer({
            type: "raster", //DEM的图层类型为"raster"
            id: "3d-layer",
            source: "3D_SOURCE",
            minzoom: 1,
            maxzoom: 20,
            layout: {},
        });

        const mousemoveHandler = () => {
            console.log(111);
        };
        map.on("mousemove", "3d-layer", mousemoveHandler);
        setTimeout(() => {
            map.remove();
            alert("地图已经销毁");
        }, 5000);
    });
</script>
</body>
</html>
