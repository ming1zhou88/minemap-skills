<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>卷帘交互</title>
    <!-- demo样式文件 -->
    <link rel="stylesheet" href="../style/demo.css">
    <!-- 引入MineMap API插件 -->
    <link rel="stylesheet" href="../../dist/minemap.css">
	<script src="../../dist/minemap-dev.js"></script>
    <script src="http://192.168.152.123/minemapapi/minemap-plugins/compare/minemap-compare.js"></script>
    <link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/minemap-plugins/compare/minemap-compare.css">
    <style>
        body {
            overflow: hidden;
        }
        #map, #mapCompare {
            width: 100%;
            height: 100%;
            position: absolute;
            /*使用卷帘时，注意添加该样式。交互更平滑*/
            user-select: none;
        }
    </style>
</head>
<body>
<div id="mapCompare"></div>
<div id="map"></div>
<script>

    /**
     * 全局参数设置
     */
    minemap.domainUrl = 'https://minemap.minedata.cn';
	minemap.dataDomainUrl = 'https://minemap.minedata.cn';
	minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
	minemap.spriteUrl = 'https://minemap.minedata.cn/minemapapi/v3.4.0/sprite/sprite';
	minemap.serviceUrl = 'https://service.minedata.cn/service';

    minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
    minemap.solution = 11001;

    // 定义空底图样式
    var style = {
        "glyphs": "minemap://fonts/{fontstack}/{range}",
        "sprite": "minemap://sprite/sprite",
        "sources": {},
        "layers": [],
        "version": 8
    };

    /**
     * 初始化地图实例
     */
    var map = new minemap.Map({
        container: 'map',
        style: style, /*球面矢量底图样式*/
        center: [116.46,39.92], /*地图中心点*/
        zoom: 1, /*地图默认缩放等级*/
        pitch: 0, /*地图俯仰角度*/
        maxZoom: 22, /*地图最大缩放等级*/
        minZoom: 1,  /*地图最小缩放等级*/
        projection: 'MERCATOR'
    });

    /**
     * 添加基本球体图层，包括球体表面、天空盒、大气层
     *
     */
    map.on('load', function() {
        map.addSource('sphere-image-globe', {
            url: "https://minemap.minedata.cn/minemapapi/v3.4.0/assets/Earth_Diffuse22.png",
            radius: minemap.R,
            type: 'sphere-image',
            renderInner: false,
            gridSamples: 9,
            debug: false,
            renderAtmosphere: true
        });
        map.addSource('sphere-image-skybox', {
            url: "https://minemap.minedata.cn/minemapapi/v3.4.0/assets/sky13m.jpg",
            dayTextureUrl: "https://minemap.minedata.cn/minemapapi/v3.4.0/assets/back.jpg",
            radius: 1,
            type: 'sphere-image',
            renderInner: true,
            gridSamples: 9,
            debug: false,
        });

        /*添加栅格图*/
        map.addSource("IMAGERY_SOURCE", {
            "type": "raster",//数据源类型：栅格数据源
            "tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
            "tileSize": 512,//瓦片尺寸
        });

        map.addLayer({
            "id": "IMAGERY",
            "type": "raster", //图层类型为"raster"
            "source": "IMAGERY_SOURCE",
            "minzoom": 1,
            "maxzoom": 23,
            // "depth-test": true,
            "paint": {
                "raster-opacity": 1
            }
        });
    })

    var mapCompare = new minemap.Map({
        container: 'mapCompare',
        style: style,
        center: [116.46,39.92],
        zoom: 1,
        pitch: map.getPitch(),
        bearing: map.getBearing(),
        maxZoom: 22,    // 地图最大缩放级别限制
        minZoom: 1,     // 地图最小缩放级别限制
    });
    mapCompare.on("load",function() {
        mapCompare.addSource('sphere-image-globe', {
            url: "https://minemap.minedata.cn/minemapapi/v3.4.0/assets/Earth_Diffuse22.png",
            radius: minemap.R,
            type: 'sphere-image',
            renderInner: false,
            gridSamples: 9,
            debug: false
        });
        mapCompare.addSource('sphere-image-skybox', {
            url: "https://minemap.minedata.cn/minemapapi/v3.4.0/assets/sky13m.jpg",
            dayTextureUrl: "https://minemap.minedata.cn/minemapapi/v3.4.0/assets/back.jpg",
            radius: 1,
            type: 'sphere-image',
            renderInner: true,
            gridSamples: 9,
            debug: false,
        });
    })
    /**
     * {params}
     * {map} MapA 地图对象A
     * {map} MapB 地图对象B
     * {isHorizontal} boolean 屏蔽方向。true：屏蔽左右；false:屏蔽上下
     * {options} 配置项
     * {direction} boolean false表示显示MapA上侧或左侧，MapB下侧或右侧；true则反之
     */
    compare = new Compare(mapCompare, map, false, {}, false);

    function destroyCompare() {
        map.getContainer().style.clip = "rect(0, 999rem, 999em, 0px)";
        var ele = document.getElementsByClassName("minemap-compare-vertical");
        for (var i = 0; i < ele.length; i++) {
            ele[i].remove();
        }
        var ele2 = document.getElementsByClassName("minemap-compare-horizontal");
        for (var i = 0; i < ele2.length; i++) {
            ele2[i].remove();
        }
    }
    //以下为销毁卷帘的方法

    // setTimeout(()=>{
    //     mapCompare.getContainer().innerHTML = "";
    //     mapCompare = null;
    //     destroyCompare();
    // }, 3000)
</script>
</body>
