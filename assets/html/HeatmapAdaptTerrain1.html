<!DOCTYPE html>
<html lang="zh">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>热力图贴三维</title>
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		body {
			margin: 0;
			padding: 0;
			height: 100vh;
		}

		#map {
			width: 100%;
			height: 100%;
			position: relative;
		}



		#changeColor {
			position: absolute;
			top: 16px;
			left: 14px;
			z-index: 999;
			border: solid 2px #ffffff;
			padding: 2px 3px;
			text-align: center;
		}

		button {
			margin: 5px;
		}
	</style>
</head>

<body>
	<div id="map">
		<button id="changeColor" onclick="changeColor()">改变热力图颜色</button>
	</div>

	<script>
		// 初始化配置
		minemap.domainUrl = "https://minedata.cn";
		minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
		minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
		minemap.key = '0c6ac62182404e5ebc7a789981f6db72';

		window.minemapCDN = 'https://minemap.minedata.cn/minemapapi/minemap-CDN'; // minemapCDN 配置


		// 创建地图实例
		const map = new minemap.Map({
			container: 'map',
			style: {
				"glyphs": "minemap://fonts/{fontstack}/{range}",
				"sprite": "minemap://sprite/sprite",
				"sources": {},
				"layers": [],
				"version": 8
			},
			center: [120.38015010295995, 36.08784061685526],
			zoom: 11.481887761027616,
			pitch: 60.1350842175374,
			bearing: -1.0177774980683254e-13,
			maxZoom: 22,
			minZoom: 10,
			projection: 'MERCATOR'
		});

		// 全局状态管理
		const state = {
			layers: {
				"POI-Circle": true,
				"POI-Symbol": true,
				"HeatmapLayer": true,
				FunctionArea: true,
				Oblique: true,
				Terrain: true
			},
			viewshed: {
				active: false,
				component: null
			}
		};

		// 初始化GUI
		const gui = new lil.GUI({});

		// 设置地形
		map.setTerrain({
			tiles: ['https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain'],
			tileSize: 512
		});

		function addImage(url, name) {
			return new Promise((resolve, reject) => {
				map.loadImage(url, (err, images) => {
					if (err) throw err;
					// 添加自定义图标
					map.addImage(name, images);
					resolve(name);
				});
			})
		}

		// 主加载函数
		map.on('load', async () => {
			// 加载影像底图
			map.addSource('imagery', {
				type: 'raster',
				tiles: ['https://dom-data.minedata.cn/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg'],
				tileSize: 512
			});
			map.addLayer({
				id: 'imagery-layer',
				type: 'raster',
				source: 'imagery'
			});

			Promise.all([
				addImage("https://minedata.cn/nce-static/support/demo/js-3d-ultra/zh/images/symbol-hospital-icon.png", "hospital-icon"),
				addImage("https://minedata.cn/nce-static/support/demo/js-3d-ultra/zh/images/symbol-park-icon.png", "park-icon"),
				addImage("https://minedata.cn/nce-static/support/demo/js-3d-ultra/zh/images/symbol-university-icon.png", "university-icon")]
			).then((res) => {
				setTimeout(function () {
					// 加载POI数据
					map.addSource('poi', {
						type: 'geojson',
						data: '../data/heatmap/POIqingdao.geojson',
						adaptTerrain: true
					});
					map.addLayer({
						id: 'poi-layer',
						type: 'circle',
						source: 'poi',
						paint: {
							'circle-color': '#4287f5',
							'circle-radius': 4
						}
					});


					map.addLayer({
						"id": "symbolLayer2",
						"type": "symbol",//图层类型为"symbol"
						"source": "poi",
						"layout": {
							"icon-image": "park-icon",
							"text-field": "{name}",
							"text-size": 14,
							"visibility": "visible",
							"icon-pitch-alignment": "viewport",
							"text-pitch-alignment": "viewport",
							"icon-anchor": "bottom",
							"icon-size": 0.6,
						},
						"paint": {
							"icon-color": "#00f",
							"text-color": "#f0f"
						},

						hiddenType: minemap.SymbolHiddenType.SCENE, // 开启按场景遮挡
						"auto-height": true, // 开启自动赋高
						"auto-height-offset": 20, // 开启自动赋高后，在计算出的高度的基础上进行上下偏移的距离
						classificationType: minemap.ClassificationType.FORCE_VECTOR_OVER_MODEL,

					});



					// 加载功能面数据
					map.addSource('function', {
						type: 'geojson',
						data: '../data/heatmap/gongnengmian.geojson',
						adaptTerrain: true
					});
					map.addLayer({
						id: 'function-layer',
						type: 'fill',
						source: 'function',
						paint: {
							'fill-color': '#475AFF',
							'fill-opacity': 0.5
						}
					});
				}, 1000)


			})


			//添加数据源,该热力图效果，数据源类型支持geojson或vector两种形式
			map.addSource("heatmapSource", {
				type: "geojson",
				data: "../data/heatmap/POIqingdao.geojson",
				adaptTerrain: true,
			});

			map.addLayer({
				"id": "heatmapLayer",
				"type": "heatmap",
				"source": "heatmapSource",
				"layout": {
					"visibility": "visible"
				},
				"paint": {
					// 一个热力图数据点的模糊范围，单位是像素，默认值30；要求：值大于等于1，可根据zoom level进行插值设置
					"heatmap-radius": 50,
					//一个热力图单个数据点的热力程度，默认值为1；要求：值大于等于0，支持使用property中某个的热力值
					"heatmap-weight": {
						"property": "mag",
						"stops": [[0, 0], [10, 1]]
					},
					// 用于统一控制热力值的强度，默认值1；要求：值大于等于0，可根据zoom level进行插值设置
					"heatmap-intensity": 1,
					// 表示热力图颜色阶梯，阶梯的值域范围为0-1，默认值为["interpolate",["linear"],["heatmap-density"],0,"rgba(0, 0, 255, 0)",0.1,"royalblue",0.3,"cyan",0.5,"lime",0.7,"yellow",1,"red"]
					"heatmap-color": [
						"interpolate",
						["linear"],
						["heatmap-density"],
						0, "rgba(0, 0, 255, 0)", 0.1, "royalblue", 0.3, "cyan", 0.5, "lime", 0.7, "yellow", 1, "red"
					],
					// 表示热力图的不透明度，默认值1；值域范围0-1，可根据zoom level进行插值设置
					"heatmap-opacity": 1,
				}
			});


			// 加载倾斜摄影
			window.tileset = map.addSceneComponent({
				id: 'oblique',
				type: '3d-tiles',
				url: 'https://staticdata-b.minedata.cn:14434/oblique/tileset.json',
				translation: new minemap.Math.Vector3(0, 0, 120)
			});



			// 飞行定位
			map.flyTo({
				center: [120.40679756635005, 36.105051127625856],
				zoom: 14,
				pitch: 60,
				duration: 3000
			});

			// 初始化控制面板
			initControls();

			// 实现功能
			// implementFeatures();
		});
		// 点击修改热力图颜色
		function changeColor() {
			map.setPaintProperty("heatmapLayer", "heatmap-color",
				["interpolate",
					["linear"],
					["heatmap-density"],
					0,
					'rgba(33,102,172,0)',
					0.2,
					'rgb(103,169,207)',
					0.4,
					'rgb(209,229,240)',
					0.6,
					'rgb(253,219,199)',
					0.8,
					'rgb(239,138,98)',
					1,
					'rgb(178,24,43)']
			)
		}
		// 控制面板初始化
		function initControls() {
			// 图层控制
			gui.add(state.layers, 'POI-Circle').name('显示POI圆点').onChange(v => {
				map.setLayoutProperty('poi-layer', 'visibility', v ? 'visible' : 'none');
			});

			gui.add(state.layers, 'POI-Symbol').name('显示POI符号').onChange(v => {
				map.setLayoutProperty('symbolLayer2', 'visibility', v ? 'visible' : 'none');
			});

			gui.add(state.layers, 'FunctionArea').name('显示功能面').onChange(v => {
				map.setLayoutProperty('function-layer', 'visibility', v ? 'visible' : 'none');
			});
			gui.add(state.layers, 'Oblique').name('显示倾斜摄影').onChange(v => {
				// v ? map.addSceneComponent('oblique') : map.removeSceneComponent('oblique');
				window.tileset.show = v;
			});
			gui.add(state.layers, 'Terrain').name('地形显示').onChange(v => {
				v ? map.setTerrain({ tiles: ['https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain'] })
					: map.setTerrain(null);
			});
			gui.add(state.layers, 'HeatmapLayer').name('显示热力图').onChange(v => {
				map.setLayoutProperty('heatmapLayer', 'visibility', v ? 'visible' : 'none');
			});


			// // 可视域分析开关
			// gui.add({ '可视域分析': false }).onChange(v => {
			//     state.viewshed.active = v;
			//     if (!v && state.viewshed.component) {
			//         map.removeSceneComponent(state.viewshed.component);
			//     }
			// });
		}

		// 核心功能实现
		function implementFeatures() {
			// 功能1：可视域分析
			map.on('click', async (e) => {
				if (!state.viewshed.active) return;

				if (state.viewshed.component) {
					map.removeSceneComponent(state.viewshed.component);
				}

				state.viewshed.component = await map.addSceneComponent({
					id: 'viewshed-' + Date.now(),
					type: 'viewshed',
					position: [e.lngLat.lng, e.lngLat.lat, 200],
					horizontalAngle: 90,
					verticalAngle: 60,
					distance: 1000,
					color: '#00FF00'
				});
			});

			// 功能2：POI统计
			const poiCount = map.querySourceFeatures('poi').length;
			document.getElementById('poiCount').textContent = poiCount;

			// 功能3：POI空间分析
			const functionFeatures = map.querySourceFeatures('function');
			map.setPaintProperty('poi-layer', 'circle-color', [
				'case',
				...functionFeatures.flatMap(feature => [
					['within', ['geometry'], feature.geometry],
					'#ff0000'
				]),
				'#4287f5'
			]);
		}
	</script>
</body>

</html>
