<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>地下模式</title>
		<!-- demo样式文件 -->
		<link rel="stylesheet" href="../style/demo.css" />
		<!-- 引入MineMap API插件 -->
		<link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<style>
			#vconsole {
				display: none !important;
			}

			#map {
				width: 100%;
				height: 100%;
			}
		</style>
	</head>
	<div id="toolContainer" class="toolContainer"></div>

	<body>
		<div id="map"></div>
		<script>
			minemap.domainUrl = "https://minedata.cn";
			minemap.dataDomainUrl = "https://minedata.cn";
			minemap.serverDomainUrl = "https://minedata.cn";
			minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
			minemap.serviceUrl = "https://minedata.cn/service/";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;
			window.minemapCDN = "http://192.168.152.123/minemap-engine/minemap-CDN/"; // minemapCDN 配置 http://192.168.152.123/
			// window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};

			/**
			 * 初始化地图实例
			 */
			var map = new minemap.Map({
				container: "map",
				style: style,
				/*球面矢量底图样式*/
				position: [108.9634252962591, 34.218453299061366, 338.59745830002976],
				/*地图中心点*/
				bearing: 90,
				/*地图默认缩放等级*/
				pitch: 90,
				roll: 0,
				/*地图俯仰角度*/
				maxZoom: 100, //地下模式要尽量大于24，不然有可能报错！！！！
				/*地图最大缩放等级*/
				minZoom: 1,
				/*地图最小缩放等级*/
				projection: "MERCATOR",
				logDepth: true
			});
			map.enableLight();

			//设置地形数据
			map.setTerrain({
				tiles: ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
				tileSize: 512, //瓦片大小
				maxzoom: 14 //dem最高切分zoom，30米一般是14级；12.5米一般是16级
			});
			/**
			 * 开启地下模式
			 */
			map.enableUnderGround = true;
			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23,
					"depth-test": false,
					paint: {
						"raster-opacity": 1
					}
				});

				map.addSceneComponent({
					id: "pipeline",
					type: "3d-model",
					data: "http://192.168.152.123:11187/demo-data/UndergroundTube/pipeline.gltf",
					modelFolder: "http://192.168.152.123:11187/demo-data/UndergroundTube/",
					rotation: [90, 0, 0],
					position: [108.9652522927147, 34.218349962339516, 360]
				});
			});
		</script>
	</body>
</html>
