<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>带边框的立方体盒子更新</title>
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<script src="../js/lil-gui.umd.min.js"></script>
		<style>
			.removeButton {
				position: absolute;
				z-index: 10000;
				right: 20px;
				top: 20px;
			}

			html,
			body,
			#map {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
			}
		</style>
	</head>

	<body>
		<div id="map"></div>
		<script>
			/**
			 * 全局参数设置
			 */
			minemap.domainUrl = "https://minemap.minedata.cn";
			minemap.dataDomainUrl = "https://minemap.minedata.cn";
			minemap.serverDomainUrl = "https://sd-data.minedata.cn";
			minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
			minemap.serviceUrl = "https://service.minedata.cn/service";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;

			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};

			/**
			 * 初始化地图实例
			 */
			var map = new minemap.Map({
				container: "map",
				style: style /*底图样式*/,
				center: [116.2406265312553, 40.07125895667365] /*地图中心点*/,
				zoom: 14 /*地图默认缩放等级*/,
				pitch: 40 /*地图俯仰角度*/,
				maxZoom: 22 /*地图最大缩放等级*/,
				minZoom: 1 /*地图最小缩放等级*/,
				projection: "MERCATOR"
			});

			map.repaint = true;

			var greenBoxPrimitive = null;
			var redBoxOutlinePrimitive = null;
			var redBoxPrimitive = null;
			var blackOutlinePrimitive = null;
			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23,
					paint: {
						"raster-opacity": 1
					}
				});

				const cartographicForGreen = new minemap.Math.Vector3([116.24544236500333, 40.07254296210216, 0]);
				const cartographicForRed = new minemap.Math.Vector3([116.23544236500333, 40.07254296210216, 0]);
				const matrixForGreen = minemap.Transforms.cartographicToFixedFrame(cartographicForGreen);
				const matrixForRed = minemap.Transforms.cartographicToFixedFrame(cartographicForRed);
				const rotX = new minemap.Math.Matrix4().rotateX(Math.PI / 2);
				matrixForGreen.multiplyRight(rotX);

				const texDefault = minemap.TextureLoader.load({ map, texUrl: "../data/image/uv.jpg" });
				const stdTexMaterial = minemap.StandardMaterial.fromType("Texture", {
					baseColorMap: texDefault,
					opacity: 1.0,
					doubleSided: false
				});
				greenBoxPrimitive = new minemap.Primitive({
					modelMatrix: matrixForGreen,
					geometry: new minemap.Geometries.BoxGeometry({
						width: 500,
						height: 500,
						depth: 500
					}),
					material: minemap.StandardMaterial.fromType("Color", {
						color: "green",
						opacity: 0.5,
						doubleSided: false
					})
				});
				map.addPrimitive(greenBoxPrimitive);

				// 添加 立方体轮廓
				redBoxOutlinePrimitive = new minemap.Primitive({
					modelMatrix: matrixForGreen,
					geometry: new minemap.Geometries.BoxOutlineGeometry({
						// 长宽高
						width: 500,
						height: 500,
						depth: 500
					}),
					material: minemap.StandardMaterial.fromType("Color", {
						color: "red",
						opacity: 1.0,
						doubleSided: false
					})
				});
				map.addPrimitive(redBoxOutlinePrimitive);

				redBoxPrimitive = new minemap.Primitive({
					modelMatrix: matrixForRed,
					geometry: new minemap.Geometries.BoxGeometry({
						width: 500,
						height: 500,
						depth: 500
					}),
					material: minemap.StandardMaterial.fromType("Color", {
						color: "red",
						opacity: 1.0,
						doubleSided: false
					})
				});
				redBoxPrimitive.material.isTranslucent = false;
				map.addPrimitive(redBoxPrimitive);

				// 添加 立方体轮廓
				blackOutlinePrimitive = new minemap.Primitive({
					modelMatrix: matrixForRed,
					geometry: new minemap.Geometries.BoxOutlineGeometry({
						// 长宽高
						width: 500,
						height: 500,
						depth: 500
					}),
					material: minemap.StandardMaterial.fromType("Color", {
						color: "black",
						opacity: 1.0,
						doubleSided: true
					})
				});
				map.addPrimitive(blackOutlinePrimitive);

				let eventObj = {
					// 全屏事件
					remove: remove
				};
				const gui = new lil.GUI({ title: "参数调节面板" });
				gui.add(eventObj, "remove").name("删除primitive");
			});

			setTimeout(() => {
				greenBoxPrimitive.geometry.setData({
					width: 1000,
					height: 1000,
					depth: 1000
				});

				redBoxOutlinePrimitive.geometry.setData({
					width: 1000,
					height: 1000,
					depth: 1000
				});
			}, 3000);

			// 删除primitive
			function remove() {
				if (greenBoxPrimitive) {
					map.removePrimitive(greenBoxPrimitive);
				}
				if (redBoxOutlinePrimitive) {
					map.removePrimitive(redBoxOutlinePrimitive);
				}
				if (redBoxPrimitive) {
					map.removePrimitive(redBoxPrimitive);
				}
				if (blackOutlinePrimitive) {
					map.removePrimitive(blackOutlinePrimitive);
				}
			}
		</script>
	</body>
</html>
