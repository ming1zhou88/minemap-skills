<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>primitive裁剪</title>
		<link rel="stylesheet" href="../style/demo.css" />
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<script src="../lib/jquery-2.0.3.min.js"></script>
		<script src="../js/lil-gui.umd.min.js"></script>
		<style>
			#map {
				width: 100%;
				height: 100%;
			}
		</style>
	</head>

	<body>
		<div id="map"></div>
		<script>
			/**
			 * 全局参数设置
			 */
			minemap.domainUrl = "https://minemap.minedata.cn";
			minemap.dataDomainUrl = "https://minemap.minedata.cn";
			minemap.serverDomainUrl = "https://sd-data.minedata.cn";
			minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
			minemap.serviceUrl = "https://service.minedata.cn/service";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;

			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};

			var center = [116.46, 39.92];

			/**
			 * 初始化地图实例
			 */
			var map = new minemap.Map({
				container: "map",
				style: style /*底图样式*/,
				center /*地图中心点*/,
				zoom: 15 /*地图默认缩放等级*/,
				pitch: 25 /*地图俯仰角度*/,
				maxZoom: 22 /*地图最大缩放等级*/,
				minZoom: 1 /*地图最小缩放等级*/,
				projection: "MERCATOR",
				logDepth: true
			});
			map.repaint = true;
			let modelMatrix;
			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster",
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster",
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23,
					paint: {
						"raster-opacity": 1
					},
					"depth-test": true
				});
				add();
			});
			let cylinderPrimitive;
			let clippingPlaneCollection;
			let clippingPlane;
			function add() {
				const clippingPlanesEnabled = true;
				const cartographicForRed = new minemap.Math.Vector3([center[0], center[1], 100]);
				modelMatrix = minemap.Transforms.cartographicToFixedFrame(cartographicForRed);
				clippingPlane = new minemap.ClippingPlane({
					position: minemap.Math.Vector3.fromDegrees(center[0], center[1], 100),
					normal: new minemap.Math.Vector3(0.0, 0.0, -1.0),
					distance: 0
				});
				clippingPlaneCollection = new minemap.ClippingPlaneCollection({
					modelMatrix: modelMatrix,
					edgeColor: new minemap.Color(1, 0, 0, 1),
					edgeWidth: 1.0,
					enabled: clippingPlanesEnabled,
					unionClippingRegions: false,
					planes: [clippingPlane]
				});
				const cartographic = new minemap.Math.Vector3([center[0], center[1], 0]);
				const matrix = minemap.Transforms.cartographicToFixedFrame(cartographic);

				const rotX = new minemap.Math.Matrix4().rotateX(Math.PI / 2);
				matrix.multiplyRight(rotX);
				cylinderPrimitive = new minemap.Primitive({
					modelMatrix: matrix,
					id: "test",
					geometry: new minemap.Geometries.CylinderGeometry({
						radiusTop: 60,
						radiusBottom: 60,
						height: 2000,
						radialSegments: 36,
						heightSegments: 1,
						openEnded: false,
						thetaStart: 0,
						thetaLength: Math.PI * 2
					}),
					//使用颜色类型的StandardMaterial
					material: minemap.StandardMaterial.fromType("Color", {
						color: "green",
						opacity: 1.0,
						doubleSided: true,
						clippingPlanes: clippingPlaneCollection
					})
				});

				map.addPrimitive(cylinderPrimitive);
			}

			function changeClipHeight(data) {
				clippingPlane.distance = myObj.reverse ? -data : data;
			}

			function enableClip(e) {
				if (e) {
					cylinderPrimitive.material.clippingPlanes = clippingPlaneCollection;
				} else {
					cylinderPrimitive.material.clippingPlanes = undefined;
				}
			}

			function reverseClip() {
				clippingPlane.normal = clippingPlane.normal.multiplyScalar(-1);
				clippingPlane.distance = -clippingPlane.distance;
			}

			const myObj = {
				height: 100,
				enable: true,
				reverse: false
			};
			const gui = new lil.GUI({ title: "参数控制" });
			gui.add(myObj, "height", 0, 1000).name("裁剪高度").onChange(changeClipHeight);
			gui.add(myObj, "enable").name("是否裁剪").onChange(enableClip);
			gui.add(myObj, "reverse").name("反向裁剪").onChange(reverseClip);
		</script>
	</body>
</html>
