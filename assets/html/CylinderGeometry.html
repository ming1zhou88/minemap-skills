<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>圆柱标准材质更换颜色或纹理</title>
		<!-- 引入MineMap API插件 -->
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<script type="text/javascript" src="../js/lil-gui.umd.min.js"></script>
		<style>
			html,
			body,
			#map {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
			}
		</style>
	</head>

	<body>
		<div id="map"></div>
		<script>
			/**
			 * 全局参数设置
			 */
			minemap.domainUrl = "https://minedata.cn";
			minemap.dataDomainUrl = "https://minedata.cn";
			minemap.serverDomainUrl = "https://minedata.cn";
			minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
			minemap.serviceUrl = "https://minedata.cn/service/";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;

			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};

			/**
			 * 初始化地图实例
			 */
			var map = new minemap.Map({
				container: "map",
				style: style /*底图样式*/,
				center: [116.24578817496112, 40.072866389620614] /*地图中心点*/,
				zoom: 15.5 /*地图默认缩放等级*/,
				pitch: 40 /*地图俯仰角度*/,
				maxZoom: 22 /*地图最大缩放等级*/,
				minZoom: 1 /*地图最小缩放等级*/,
				projection: "MERCATOR"
			});
			map.repaint = true;

			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23,
					paint: {
						"raster-opacity": 1
					}
				});
				addCylinderPrimitive();
				initializeGUI();
			});

			map.enableLight();
			map.enableShadow();

			let stdColorMaterial, stdTexMaterial, texMRDefault, cylinderPrimitive;
			const metalUrl = "../image/Default_metalRoughness.jpg";
			const uvUrl = "../data/image/uv.jpg";
			function addCylinderPrimitive() {
				const cartographic = new minemap.Math.Vector3([116.24544236500333, 40.07254296210216, 0]);
				const matrix = minemap.Transforms.cartographicToFixedFrame(cartographic);

				const rotX = new minemap.Math.Matrix4().rotateX(Math.PI / 2);
				matrix.multiplyRight(rotX);

				const texDefault = minemap.TextureLoader.load({ map, texUrl: uvUrl });

				//先设置原来的，原来是初始化设置，先看下接口
				stdColorMaterial = minemap.StandardMaterial.fromType("Color", {
					color: "#0000FF",
					opacity: 1.0,
					doubleSided: false
				});

				stdTexMaterial = minemap.StandardMaterial.fromType("Texture", {
					baseColorMap: texDefault,
					opacity: 1.0,
					doubleSided: false
				});

				cylinderPrimitive = map.addPrimitive(
					new minemap.Primitive({
						modelMatrix: matrix,
						geometry: new minemap.Geometries.CylinderGeometry({
							radiusTop: 60,
							radiusBottom: 60,
							height: 100,
							radialSegments: 36,
							heightSegments: 1,
							openEnded: false,
							thetaStart: 0,
							thetaLength: Math.PI * 2
						}),
						material: stdTexMaterial,
						castShadow: true,
						receiveShadow: true
					})
				);
			}

			const params = {
				材质类型: "纹理",
				纹理: "uv",
				颜色: "#00FF00"
			};
			let textureFolder, colorFolder;
			function initializeGUI() {
				const gui = new lil.GUI({ title: "更新纹理或颜色", width: 300 });
				gui.onChange((event) => {
					params[event.property] = event.value;
				});

				gui.add(params, "材质类型")
					.options(["纹理", "颜色"])
					.onChange(function (value) {
						if (value === "纹理") {
							colorFolder.hide();
							textureFolder.show();
							cylinderPrimitive.material = stdTexMaterial;
						} else {
							colorFolder.show();
							textureFolder.hide();
							cylinderPrimitive.material = stdColorMaterial;
						}
					});

				textureFolder = gui
					.add(params, "纹理")
					.options(["Default_metalRoughness", "uv"])
					.onChange(function (value) {
						if (value === "Default_metalRoughness") {
							texMRDefault = minemap.TextureLoader.load({
								map,
								texUrl: metalUrl
							});
							stdTexMaterial.updateProperty({ baseColorMap: texMRDefault });
						} else if (value === "color") {
							cylinderPrimitive.material = stdColorMaterial;
						} else {
							texMRDefault = minemap.TextureLoader.load({
								map,
								texUrl: uvUrl
							});
							stdTexMaterial.updateProperty({ baseColorMap: texMRDefault });
						}
					});

				colorFolder = gui.addColor(params, "颜色").onChange((value) => {
					stdColorMaterial.updateProperty({ color: value });
					cylinderPrimitive.material = stdColorMaterial;
				});
				colorFolder.hide();
			}
		</script>
	</body>
</html>
