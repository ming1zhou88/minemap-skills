<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<title>雾</title>
		<link rel="stylesheet" href="../style/demo.css" />
		<link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<script src="../js/lil-gui.umd.min.js"></script>
		<style>
			#map {
				width: 100%;
				height: 100%;
			}
		</style>
	</head>

	<body>
		<div id="map"></div>
		<script>
			/*全局参数设置*/
			minemap.domainUrl = "https://minemap.minedata.cn";
			minemap.dataDomainUrl = "https://minemap.minedata.cn";
			minemap.serverDomainUrl = "https://sd-data.minedata.cn";
			minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
			minemap.serviceUrl = "https://service.minedata.cn/service";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;
			window.minemapCDN = "https://minemap.minedata.cn/minemapapi/minemap-CDN"; // minemapCDN 配置

			/*定义空底图样式*/
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};
			/*初始化地图实例*/
			var map = new minemap.Map({
				container: "map",
				style: style,
				position: [108.81984429167112, 34.68715050568903, 568.4670915089708],
				bearing: -10,
				pitch: 90, //地图俯仰角度
				maxZoom: 22, //地图最大缩放等级
				minZoom: 1 //地图最小缩放等级
			});

			//设置地形数据
			map.setTerrain({
				tiles: ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
				tileSize: 512, //瓦片大小
				maxzoom: 14 //dem最高切分zoom，30米一般是14级；12.5米一般是16级
			});

			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23,
					paint: {
						"raster-opacity": 1
					}
				});

				initializeGUI();
				createFogPostProcess();
			});
			map.repaint = true;

			const fogParams = {
				enabled: true,
				color: "#FFFFFF",
				nearDistance: 10,
				farDistance: 5000
			};

			function initializeGUI() {
				const gui = new lil.GUI({ width: 300 });
				const fogGUI = gui.addFolder("Fog");

				fogGUI.open();
				fogGUI.add({ enabled: true }, "enabled").onChange((value) => {
					fogPostProcess.enabled = value;
				});

				fogGUI.addColor(fogParams, "color").onChange((value) => {
					fogPostProcess.color = value;
				});
				fogGUI
					.add(fogParams, "nearDistance")
					.min(1)
					.max(1000)
					.step(1)
					.onChange((value) => {
						fogPostProcess.nearDistance = value;
					});
				fogGUI
					.add(fogParams, "farDistance")
					.min(1)
					.max(10000)
					.step(1)
					.onChange((value) => {
						fogPostProcess.farDistance = value;
					});
			}

			let fogPostProcess;
			function createFogPostProcess() {
				// 创建后处理雾效果
				fogPostProcess = minemap.PostProcessStageLibrary.createFogEffect({
					enabled: fogParams.enabled, //是否开启雾效
					fogColor: fogParams.color, //雾颜色，通常设置黑或白
					nearDistance: fogParams.nearDistance, //雾开始距离
					farDistance: fogParams.farDistance //雾结束距离
				});
				map.postProcessStages.add(fogPostProcess);
			}
		</script>
	</body>
</html>
