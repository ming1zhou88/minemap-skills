		heartPattern[i] = new minemap.Math.Vector3(heartPattern[i]);
	}
	const polyline = new minemap.LocalPolylineGeometry({
		positions: heartPattern,
		width: 20
	});

	const material = minemap.PolylineMaterial.fromType("Color", {
		color: "red"
	});

	const redPolylinePrimitive = new minemap.Primitive({
		geometry: polyline,
		material: material,
		name: "polyline",
		modelMatrix: minemap.Transforms.cartographicToFixedFrame([116.3988671572592, 39.934457935565295, 10]),
		allowPick: true
	});

	map.addPrimitive(redPolylinePrimitive);


	// 添加虚线

	map.on("load", function () {
		/*添加栅格图*/
		map.addSource("IMAGERY_SOURCE", {
			type: "raster", //数据源类型：栅格数据源
			tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			tileSize: 512 //瓦片尺寸
		});

		map.addLayer({
			id: "IMAGERY",
			type: "raster", //图层类型为"raster"
			source: "IMAGERY_SOURCE",
			minzoom: 1,
			maxzoom: 23,
			paint: {
