<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>栅格图+矢量+DEM</title>
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css">
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		html, body, #map {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = "https://minemap.minedata.cn";
	minemap.dataDomainUrl = "https://minemap.minedata.cn";
	minemap.serverDomainUrl = "https://sd-data.minedata.cn";
	minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
	minemap.serviceUrl = "https://service.minedata.cn/service";

	minemap.key = "ca78282dfff148e3be5390ce027068f5";
	minemap.solution = 11001;
	window.minemapCDN = "http://192.168.152.123/minemapapi/minemap-CDN";

	const fillIds = [];
	const lineIds = [];

	let map;

	minemap.util.getJSON("../data/style/with_symbol_height_p.json", function(err, data) {

		const layers = data.layers;

		for (let i = 0; i < layers.length; i++) {
			const layer = layers[i];

			if (layer.type == "line") {
				lineIds.push(layer.id);
			} else if (layer.type == "fill") {
				fillIds.push(layer.id);
				layer.layout.visibility = "none";
			} else if (layer.type == "extrusion") {
				layer.layout.visibility = "none";
			}

		}

		map = new minemap.Map({
			container: "map",
			style: data, /*底图样式*/
			position: [108.94713078195123, 34.28515867259755, 381.9596489983513],
			pitch: 76.4931265435773,
			bearing: 0.41703881651761304,
			maxZoom: 24, /*地图最大缩放等级*/
			minZoom: 0,  /*地图最小缩放等级*/
			projection: "MERCATOR"
		});

		map.repaint = true;
		// map.showDebugBoundingBox = true;

		map.setTerrain({
			"tiles": ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
			"tileSize": 512,  //瓦片大小
			"availabilities": ["https://staticdata-b.minedata.cn:14434/dem/layer.json"], //索引文件是可选项
			"maxzoom": 14        //dem最高切分zoom，30米一般是14级；12.5米一般是16级
			// bounds: [130, 60, 140, 70],//要显示区域的经纬度外包框，按west，south，east，north填写
		});

		/**
		 * 添加基本球体图层，包括球体表面、天空盒、大气层
		 *
		 */
		map.on("load", function() {

			map.addSource("3D_SOURCE", {
				type: "raster", //数据源类型：栅格数据源
				tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
				tileSize: 512, //瓦片尺寸
				maxzoom: 17
			});

			map.addLayer(
				{
					"type": "raster",//DEM的图层类型为"raster"
					"id": "3d-layer",
					"source": "3D_SOURCE",
					"minzoom": 1,
					"maxzoom": 24,
					"depth-test": true,
					"layout": {}
				}
			);

			// 3dtiles
			const tileset = map.addSceneComponent({
				id: "serve",
				type: "3d-tiles",
				show: true,
				translation: new minemap.Math.Vector3(0, 0, 0), //在enu坐标系下的位置移动距离，顺序为[east, north, height]，单位为m，并且只用于3dtiles图层
				minzoom: 12, //3d-tiles加载显示的最小层级
				maxzoom: 22, //3d-tiles加载显示的最大层级
				url: "https://staticdata-b.minedata.cn:14434/oblique/tileset.json",
				skipLevelOfDetail: false, //跨层调度
				maximumScreenSpaceError: 8,
				sourceLoaded: (tileset) => {
					// map.flyTo({
					// 	target: tileset,
					// 	bearing: 0,
					// 	pitch: 0,
					// 	duration: 2000,
					// 	range: 1000
					// });
				},
				/**
				 * 飞行选择
				 * index: 指定飞行目标(优先)
				 * combine: 合并bounds为飞行目标
				 */
				geoBoundsOptions: {
					index: 1,
					combine: true
				},
				allowPick: true
			});
		});

	});

	//gui控制界面
	const gui = new lil.GUI({ title: "控制面板" });

	const eventObj = {
		lineOn: true,
		fillOn: false
	};

	gui.add(eventObj, "lineOn").name("线贴地").onChange(value => {
		if (lineIds.length === 0) return;

		for (let i = 0; i < lineIds.length; i++) {
			map.setLayoutProperty(lineIds[i], "visibility", value ? "visible" : "none");
		}
	});
	gui.add(eventObj, "fillOn").name("面贴地").onChange(value => {
		if (fillIds.length === 0) return;

		for (let i = 0; i < fillIds.length; i++) {
			map.setLayoutProperty(fillIds[i], "visibility", value ? "visible" : "none");
		}
	});

</script>
</body>
