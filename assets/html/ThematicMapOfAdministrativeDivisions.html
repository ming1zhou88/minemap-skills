<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>行政区划专题图</title>
	<!-- demo样式文件 -->
	<link rel="stylesheet" href="https://minedata.cn/nce-static/support/demo/js-3d-ultra/zh/css/demo.css" />
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.css" />
	<script src="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.js"></script>
	<script src="../data/provincePositions.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = "https://minemap.minedata.cn";
	minemap.dataDomainUrl = "https://minemap.minedata.cn";
	minemap.serverDomainUrl = "https://sd-data.minedata.cn";
	minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
	minemap.serviceUrl = "https://service.minedata.cn/service";

	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
	minemap.solution = 11001;

	// 定义空底图样式
	const style = {
		glyphs: "minemap://fonts/{fontstack}/{range}",
		sprite: "minemap://sprite/sprite",
		sources: {},
		layers: [],
		version: 8
	};

	/**
	 * 初始化地图实例
	 */
	const map = new minemap.Map({
		container: "map",
		style: style /*底图样式*/,
		position: [118.71933264458775, 27.561623528732866, 302532.64162381104],
		pitch: 51.273482537106545 /*地图俯仰角度*/,
		bearing: -16.26059616469067,
		maxZoom: 22 /*地图最大缩放等级*/,
		minZoom: 1 /*地图最小缩放等级*/,
		projection: "MERCATOR"
	});
	map.repaint = true;

	map.on("load", function () {
		map.addSource("IMAGERY_SOURCE", {
			type: "raster",
			tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"],
			tileSize: 256
		});

		map.addLayer({
			id: "IMAGERY",
			type: "raster",
			source: "IMAGERY_SOURCE",
			minzoom: 1,
			maxzoom: 23,
			paint: {
				"raster-opacity": 1
			}
		});
		addPolygon();
	});

	function addPolygon() {
		const layer = map.getLayer("IMAGERY");
		if (layer) {
			layer.maskingEnabled = true;
			layer.maskingPolygonHierarchy = {
				positions: minemap.Math.Vector3.fromDegreesArray(provincePositions)
			};
		}

		const wallGeometry = minemap.Geometries.WallGeometry.fromConstantHeights({
			positions: minemap.Math.Vector3.fromDegreesArray(provincePositions),
			maximumHeight: 0.0,
			minimumHeight: -2000.0
		});

		map.addPrimitive(
			new minemap.Primitive({
				geometry: wallGeometry,
				material: minemap.StandardMaterial.fromType("Color", {
					color: new minemap.Color(1.0, 0.0, 0.0, 0.6),
					opacity: 0.4,
					doubleSided: true
				})
			})
		);
	}
</script>
</body>
</html>
