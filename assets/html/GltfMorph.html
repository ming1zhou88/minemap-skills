<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>gltf模型变形动画</title>
    <!-- demo样式文件 -->
    <link rel="stylesheet" href="../style/demo.css" />
    <!-- 引入MineMap API插件 -->
    <link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.css">
    <script src='../../dist/minemap-dev.js'></script>
    <style>
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
		minemap.domainUrl = "https://minedata.cn";
		minemap.dataDomainUrl = "https://minedata.cn";
		minemap.serverDomainUrl = "https://minedata.cn";
		minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
		minemap.serviceUrl = "https://minedata.cn/service/";

		minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
		minemap.solution = 11001;
		window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

		// 定义空底图样式
		var style = {
			glyphs: "minemap://fonts/{fontstack}/{range}",
			sprite: "minemap://sprite/sprite",
			sources: {},
			layers: [],
			version: 8
		};

        /**
         * 初始化地图实例
         */
        var map = new minemap.Map({
            container: "map",
            style: style,
            /*球面矢量底图样式*/
            center: [120.24805053680325, 29.715189931766076],
            /*地图中心点*/
            bearing: 0,
            zoom: 17.7,
            /*地图默认缩放等级*/
            // pitch: 70,
            /*地图俯仰角度*/
            maxZoom: 22,
            /*地图最大缩放等级*/
            minZoom: 1,
            /*地图最小缩放等级*/
            projection: "MERCATOR"
        });
        map.repaint = true;
		map.enableLight();

        map.on("load", function () {
			/*添加栅格图*/
			map.addSource("IMAGERY_SOURCE", {
				type: "raster", //数据源类型：栅格数据源
				tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
				tileSize: 512 //瓦片尺寸
			});

			map.addLayer({
                id: "IMAGERY",
                type: "raster", //图层类型为"raster"
                source: "IMAGERY_SOURCE",
                minzoom: 1,
                maxzoom: 23,
                "depth-test": true,
                paint: {
                    "raster-opacity": 1
                }
            });

            // 添加glb
            const model = map.addSceneComponent({
                id: "glbModel",
                type: "3d-model", // 数据类型为“3d-model”
                data: "http://192.168.152.123:11187/demo-data/3d-ultra/assets/models/animation/morph/AnimatedMorphSphere.gltf", // 要加载的gltf格式数据
                modelFolder: "http://192.168.152.123:11187/demo-data/3d-ultra/assets/models/animation/morph", // 该数据引用图片等资源的文件夹路径
                scale: [1, 1, 1], // 在xyz轴方向上的缩放比例
                rotation: [90, 0, 0], // 绕xyz轴方向上的旋转，单位为度
                position: new minemap.Math.Vector3(120.24805053680325, 29.715189931766076, 10),
                activeAnimation: true,
                loaded: function (sceneModel) {
                    map.flyTo({
                        target: sceneModel,
                        bearing: 0,
                        pitch: 0,
                        duration: 2000,
                        range: 50
                    });
                }
            });
        })

    </script>
</body>

</html>
