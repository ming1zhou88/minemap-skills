<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>线流动纹理和贴地</title>
		<script src="../../dist/minemap-dev.js"></script>
		<script src="../js/lil-gui.umd.min.js"></script>
		<style>
			html,
			#map,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
			}
			.toolContainer {
				position: absolute;
				top: 0;
				left: 0;
				z-index: 999;
			}
		</style>
	</head>
	<body>
		<div id="map"></div>
		<script>
			minemap.domainUrl = "https://minedata.cn";
			minemap.dataDomainUrl = "https://minedata.cn";
			minemap.serverDomainUrl = "https://minedata.cn";
			minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
			minemap.serviceUrl = "https://minedata.cn/service/";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;
			window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";
			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};

			/**
			 * 初始化地图实例
			 */
			var map = new minemap.Map({
				container: "map",
				style: style,
				/*球面矢量底图样式*/
				center: [116.3988671572592, 39.934457935565295],
				// center: [102.38653416841908, 38.83632088061965],
				/*地图中心点*/
				bearing: 0,
				zoom: 16,
				/*地图默认缩放等级*/
				pitch: 0,
				/*地图俯仰角度*/
				maxZoom: 22,
				/*地图最大缩放等级*/
				minZoom: 1,
				/*地图最小缩放等级*/
				projection: "MERCATOR"
			});
			map.repaint = true;
			window.map = map;

			//开启大气透视
			const skyAtmosphere = map.getSky();
			skyAtmosphere.useAerialPerspective = true;

			const height = 50;
			const polyline = new minemap.Geometries.PolylineGeometry({
				positions: minemap.Math.Vector3.fromDegreesArrayHeights([
					116.39842671572592,
					39.935657935565295,
					height,
					116.39884471586343,
					39.9333134036087,
					height,
					116.40045910599054,
					39.934738844865834,
					height
				]),
				width: 20,
				arcType: minemap.ARCTYPE.GEODESIC
			});

			const arrowTexture = minemap.TextureLoader.load({ map, texUrl: "http://192.168.152.123/minemapapi/v4.0.0/assets/arrow.png" });
			// const arrowTexture = minemap.TextureLoader.load({ map, texUrl: "../image/arrow.png" });
			const material = minemap.PolylineMaterial.fromType("TextureFlow", {
				baseColorMap: arrowTexture,
				repeat: [6, 1],
				speed: 2
			});

			const redPolylinePrimitive = new minemap.Primitive({
				geometry: polyline,
				material: material,
				name: "polyline",
				adaptTerrain: true,
				allowPick: true,
			});

			map.addPrimitive(redPolylinePrimitive);

			const polyline2 = new minemap.Geometries.PolylineGeometry({
				positions: minemap.Math.Vector3.fromDegreesArrayHeights([
					116.39642671572592,
					39.932657935565295,
					height,
					116.39884471586343,
					39.9323134036087,
					height,
					116.40045910599054,
					39.932738844865834,
					height
				]),
				width: 20
			});

			const arrowTexture1 = minemap.TextureLoader.load({ map, texUrl: "http://192.168.152.123/minemapapi/v4.0.0/assets/arrow1.png" });

			const material1 = minemap.PolylineMaterial.fromType("TextureFlow", {
				baseColorMap: arrowTexture1,
				repeat: [5, 1],
				speed: 1
			});

			const bluePolylinePrimitive = new minemap.Primitive({
				geometry: polyline2,
				material: material1,
				name: "polyline2",
				adaptTerrain: true,
				allowPick: true,
			});

			map.addPrimitive(bluePolylinePrimitive);

			// 添加虚线

			map.on("load", function () {
				map.setTerrain({
					"tiles": ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
					"tileSize": 512,  //瓦片大小
					"maxzoom": 14        //dem最高切分zoom，30米一般是14级；12.5米一般是16级
				});
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23,
					paint: {
						"raster-opacity": 1
					},
					"depth-test": true
				});

				let eventObj = {
					adaptTerrain: adaptTerrain,
					changeWidth: changeWidth
				}
				const gui = new lil.GUI({title: "参数调节面板"});
				gui.add(eventObj,"adaptTerrain").name("悬浮/贴地")
				gui.add(eventObj,"changeWidth").name("固定线宽/线宽随地图缩放")
			});

			let i = 0;
			function adaptTerrain() {
				i++;
				if (i % 2 === 1) {
					redPolylinePrimitive.adaptTerrain = false;
					bluePolylinePrimitive.adaptTerrain = false;
				}
				else{
					redPolylinePrimitive.adaptTerrain = true;
					bluePolylinePrimitive.adaptTerrain = true;
				}
			}

			let j = 0;
			function changeWidth() {
				j++;
				if (j % 2 === 1) {
					redPolylinePrimitive.material.pixelWidth = false;
					bluePolylinePrimitive.material.pixelWidth = false;
				}
				else{
					redPolylinePrimitive.material.pixelWidth = true;
					bluePolylinePrimitive.material.pixelWidth = true;
				}
			}

			map.on("click", function (e) {
				const feature = map.getFeatureByGPUPick(e.point);
				console.log(feature);
			});


		</script>
	</body>
</html>
