<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>日照分析</title>
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<!-- 引入MineMap API插件 -->
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<link rel="stylesheet" href="../lib/jquery-ui.css" />
		<script src="../lib/jquery-2.0.3.min.js"></script>
		<script src="../lib/jquery-ui.js"></script>
		<script src="../../dist/minemap-dev.js"></script>
		<script type="text/javascript" src="../js/lil-gui.umd.min.js"></script>
		<style>
			html,
			#map,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
			}

			.toolContainer {
				position: absolute;
				top: 0;
				left: 0;
				z-index: 999;
				background-color: #1f1f1f;
				color: white;
				font-size: 12px;
				padding: 10px;
			}

			#datepicker {
				border-radius: 3px;
				height: 20px;
				line-height: 20px;
				color: #2cc9ff;
				padding: 0 10px;
				background-color: #424242;
			}
		</style>
	</head>
	<div class="toolContainer">
		<p>日期选择: <input type="text" id="datepicker" /></p>
		<input type="range" id="myRange" value="420" max="1440" style="width: 230px" />
		<p>时间：<span id="rangeValue"></span></p>
	</div>

	<body>
		<div id="map"></div>
		<script>
			minemap.domainUrl = "//192.168.152.123";
			minemap.dataDomainUrl = "https://minedata.cn";
			minemap.serverDomainUrl = "https://minedata.cn";
			minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
			minemap.serviceUrl = "https://minedata.cn/service/";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;
			window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};
			var map = new minemap.Map({
				container: "map",
				style: style,
				center: [120.37618100413485, 36.08727622472278],
				bearing: 0,
				zoom: 16, //地图默认缩放等级
				pitch: 45, //地图俯仰角度
				maxZoom: 22, //地图最大缩放等级
				minZoom: 1, //地图最小缩放等级
				projection: "MERCATOR"
			});
			map.repaint = true;
			let popup = null;

			map.enableLight();
			map.enableShadow();
			const sunParams = {
				year: 2024,
				month: 2,
				day: 6,
				hours: 8,
				minutes: 0,
				seconds: 0,
				castShadow: true,
				intensity: 1
			};
			const timestamp = new Date(
				sunParams.year,
				sunParams.month - 1,
				sunParams.day,
				sunParams.hours ?? 0,
				sunParams.minutes ?? 0,
				sunParams.seconds ?? 0
			).getTime();
			map.setSunLightTime(sunParams);

			/**
			 * Attention:
			 * 动态绘制面的核心是把positions设置成回调函数！！！
			 * 左键绘制，右键结束
			 * 当左键点击选点个数大于2的时候才能动态绘制面
			 * 目前线还不支持动态更新，所以当鼠标左键点击数小于3个点位时，无法绘制线，
			 *
			 * TODO:
			 * 线更新动态绘制以后，增加少于3个点的情况下绘制线，保持整个绘制的过程可视化
			 */

			let geometry,
				primitive,
				startDraw = false, //开始绘制
				positions = [],
				tempPoint = []; // polygon点
			function drawPolygon() {
				positions = [];
				if (startDraw) {
					return;
				}
				startDraw = true;
				geometry = new minemap.Geometries.PolygonGeometry({
					polygonHierarchy: {
						positions: function () {
							const results = positions.concat(tempPoint);
							// 判断是否自相交，如果自相交则该点不进入数组内
							if (
								results.length > 3 &&
								minemap.Geometries.PolygonGeometry.isSelfIntersection(results, true)
							) {
								return positions;
							} else {
								return results;
							}
						}
					},
					perPositionHeight: true
				});

				const material = minemap.StandardMaterial.fromType("Color", {
					color: "red",
					doubleSided: true
				});

				primitive = new minemap.Primitive({
					geometry: geometry,
					material: material
				});

				map.addPrimitive(primitive);
			}

			function remove() {
				map.analysis.shadowAnalysisCollection.removeAll();
			}

			// leftClick
			map.on("click", function (e) {
				if (startDraw) {
					const point = map.painter.getPositionByGPUPick(e.point);
					positions.push(minemap.Math.Vector3.fromDegrees(point.x, point.y, point.z));
				} else {
					const feature = map.getFeatureByGPUPick(e.point);
					if (feature && feature instanceof minemap.PointPrimitive) {
						if (popup) {
							popup.remove();
						}

						if (feature.properties) {
							popup = new minemap.Popup()
								.setLngLat(feature.properties.position)
								.setAltitude(feature.properties.position[2])
								.setMaxWidth("300px")
								.setText(`${feature.properties.rate.toFixed(2)}`)
								.addTo(map);
						}
					}
				}
			});

			// mouseMove
			map.on("mousemove", function (e) {
				if (startDraw) {
					tempPoint = [];
					const point = map.painter.getPositionByGPUPick(e.point);
					tempPoint.push(minemap.Math.Vector3.fromDegrees(point.x, point.y, point.z));
				}
			});

			// rightClick
			map.on("contextmenu", function (e) {
				if (startDraw) {
					startDraw = false;
					map.removePrimitive(primitive);
					let needPoints = [];
					for (let i = 0; i < positions.length; i++) {
						const point = minemap.Transforms.cartesian3ToCartographic(positions[i]);
						needPoints.push(point);
					}
					needPoints.push(needPoints[0]);
					const shadowAnalysis = new minemap.ShadowAnalysis({
						positions: needPoints,
						colorRamp: [
							"rgb(0, 228, 0)",
							"rgb(256, 256, 0)",
							"rgb(256, 126, 0)",
							"rgb(153, 0, 76)",
							"rgb(126, 0, 35)",
							"rgb(256, 0, 0)"
						],
						colorRate: [0.05, 0.15, 0.25, 0.35, 0.5, 0.8], // 阴影率对照表
						minHeight: 50
						// maxHeight: 50
					});
					map.analysis.shadowAnalysisCollection.add(shadowAnalysis);
				}
			});

			$("#datepicker").datepicker();
			$("#datepicker").datepicker("setDate", "0");
			const currentDate = new Date($("#datepicker").val()).toLocaleDateString();
			const hour = Math.floor(parseInt($("#myRange").val()) / 60);
			const minute = parseInt($("#myRange").val() % 60);
			$("#rangeValue").text(`${currentDate} ${hour}时${minute}分`);
			$("#myRange").mousemove(function () {
				const currentDate = new Date($("#datepicker").val()).toLocaleDateString();
				const hour = Math.floor(parseInt($("#myRange").val()) / 60);
				const minute = parseInt($("#myRange").val() % 60);
				$("#rangeValue").text(`${currentDate} ${hour}时${minute}分`);
				map.style.sunLight.setTime(new Date(currentDate).getTime() + parseInt($("#myRange").val()) * 60 * 1000);
			});

			$("#datepicker").on("change", function () {
				const currentDate = new Date($("#datepicker").val()).toLocaleDateString();
				const hour = Math.floor(parseInt($("#myRange").val()) / 60);
				const minute = parseInt($("#myRange").val() % 60);
				$("#rangeValue").text(`${currentDate} ${hour}时${minute}分`);
				map.style.sunLight.setTime(new Date(currentDate).getTime() + parseInt($("#myRange").val()) * 60 * 1000);
			});
			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster",
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23
				});

				map.addSceneComponent({
					id: "serve",
					type: "3d-tiles",
					url: "https://minemap.minedata.cn/earth_data/oblique/QD/tileset.json", // 要加载的数据
					minzoom: 13,
					maxzoom: 19,
					sourceLoaded: (config) => {
						console.log(config._geoCenters[0]);
					},
					castShadow: true,
					receiveShadow: true
				});

				initializeGUI();
			});

			let requestFrame;
			checkTilesLoaded();

			/**
			 * 检查倾斜摄影是否加载完毕
			 */
			function checkTilesLoaded() {
				if (requestFrame) {
					cancelAnimationFrame(requestFrame);
				}

				if (map.areTilesLoaded()) {
					doAnalysis();
				} else {
					requestFrame = requestAnimationFrame(checkTilesLoaded);
				}
			}

			function doAnalysis() {
				const shadowAnalysis = new minemap.ShadowAnalysis({
					positions: [
						[120.3744365892152, 36.08848043781193, 136.15325072298998],
						[120.37392409099112, 36.0856371724809, 21.177734684626728],
						[120.37932468463238, 36.084985204677054, 32.61395592006324],
						[120.3744365892152, 36.08848043781193, 136.15325072298998]
					],
					colorRamp: [
						"rgb(0, 228, 0)",
						"rgb(256, 256, 0)",
						"rgb(256, 126, 0)",
						"rgb(153, 0, 76)",
						"rgb(126, 0, 35)",
						"rgb(256, 0, 0)"
					],
					colorRate: [0.05, 0.15, 0.25, 0.35, 0.5, 0.8], // 阴影率对照表
					minHeight: 50,
					date: "2024/7/31"
					// maxHeight: 50
				});
				map.analysis.shadowAnalysisCollection.add(shadowAnalysis);
			}

			function initializeGUI() {
				const gui = new lil.GUI({ width: 300 });
				const obj = {
					最小高度: 50,
					最大高度: 50,
					横向分布密度: 1,
					纵向分布密度: 1,
					点击开始绘制日照分析区域: function () {
						drawPolygon();
					},
					删除所有日照分析: function () {
						remove();
					}
				};

				gui.add(obj, "最小高度").onChange((value) => {
					// 获取第一个阴影分析
					const shadowAnalysis = map.analysis.shadowAnalysisCollection.getByIndex(0);
					shadowAnalysis.minHeight = value;
				}); // number field
				gui.add(obj, "最大高度").onChange((value) => {
					const shadowAnalysis = map.analysis.shadowAnalysisCollection.getByIndex(0);
					shadowAnalysis.maxHeight = value;
				}); // number field
				gui.add(obj, "横向分布密度").onChange((value) => {
					const shadowAnalysis = map.analysis.shadowAnalysisCollection.getByIndex(0);
					shadowAnalysis.horizontalScale = value;
				}); // number field
				gui.add(obj, "纵向分布密度").onChange((value) => {
					const shadowAnalysis = map.analysis.shadowAnalysisCollection.getByIndex(0);
					shadowAnalysis.verticalScale = value;
				}); // number field
				gui.add(obj, "点击开始绘制日照分析区域"); // button
				gui.add(obj, "删除所有日照分析"); // button
			}
		</script>
	</body>
</html>
