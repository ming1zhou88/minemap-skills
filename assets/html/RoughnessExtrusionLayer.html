<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>白膜图层粗糙度调节+环境图支持</title>
    </title>
    <link rel="stylesheet" href="../style/demo.css" />
    <link rel="stylesheet" href="../../dist/minemap.css" />
    <script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
    <style>
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>
        /**
         * 全局参数设置
         */
        minemap.domainUrl = "https://minedata.cn";
        minemap.dataDomainUrl = "https://minedata.cn";
        minemap.serverDomainUrl = "https://minedata.cn";
        minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
        minemap.serviceUrl = "https://minedata.cn/service/";

        minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
        minemap.solution = 11001;
        window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

        // 定义空底图样式
        var style = {
            glyphs: "minemap://fonts/{fontstack}/{range}",
            sprite: "minemap://sprite/sprite",
            sources: {},
            layers: [],
            version: 8
        };


        /**
         * 初始化地图实例
         */
        var map = new minemap.Map({
            container: "map",
            style: 'https://minedata.cn/service/solu/style/id/12878',
            // style: style,
            /*球面矢量底图样式*/
            center: [116.248815, 40.073050],
            /*地图中心点*/
            bearing: 340,
            zoom: 17,
            /*地图默认缩放等级*/
            pitch: 45,
            /*地图俯仰角度*/
            maxZoom: 22,
            /*地图最大缩放等级*/
            minZoom: 1,
            /*地图最小缩放等级*/
            projection: "MERCATOR"
        });
        map.repaint = true;
		map.enableLight()
		map.enableShadow();

		const extrusionLayers = [];

		map.on('load', function () {
			const layers = map.getAllLayers();
			for(const key in layers) {
				const layer = layers[key];
				if (layer.type === 'extrusion') {
					extrusionLayers.push(layer);
				}
			}
		});



        // 第一个电子围栏
        const fencePositions = [116.246040, 40.073956, 116.247040, 40.071956, 116.251321, 40.073216, 116.250421, 40.075216, 116.246040, 40.073956];
        const fenceMaximumHeight = 30.0;
        const fenceGeometry = minemap.Geometries.FenceGeometry.fromConstantHeights({
            positions: minemap.Math.Vector3.fromDegreesArray(fencePositions),
            maximumHeight: fenceMaximumHeight
        });

        // const fenceTexture = minemap.TextureLoader.load({ map, texUrl: "../image/fence.png" });
        const fenceTexture = minemap.TextureLoader.load({ map, texUrl: "http://192.168.152.123/minemapapi/v4.0.0/assets/fence.png" });
        const fenceMaterial = minemap.StandardMaterial.fromType("Texture", {
            baseColorMap: fenceTexture,
            opacity: 1.0,
            doubleSided: true,
            texRepeat: [1, 3]
        });

        fenceMaterial.flowTexture(
            {
                speed: 5,           // 速度取值范围：1-10, 值越大，流动速度越快
                direction: "up",   // 纹理流动方向，取值：left,right,up,down,
                rotation: 0,         // 纹理旋转角度，取值范围：0-360
                texRepeat: [0, 0]    // 纹理重复次数，第一个值为横向重复次数，第二个值为纵向重复次数，取值大于0
            }
        );

        const fencePrimitive = new minemap.Primitive({
            geometry: fenceGeometry,

            material: fenceMaterial
        });
        map.addPrimitive(fencePrimitive);

        // 第二个电子围栏
        const arrowPositions = [116.247440, 40.071665, 116.250705, 40.072686, 116.255705, 40.065686];
        const arrowMaximumHeight = 40.0;
        const arrowGeometry = minemap.Geometries.FenceGeometry.fromConstantHeights({
            positions: minemap.Math.Vector3.fromDegreesArray(arrowPositions),
            maximumHeight: arrowMaximumHeight,
			useEvennessUV: true
        });

        const arrowTexture = minemap.TextureLoader.load({ map, texUrl: "http://192.168.152.123/minemapapi/v4.0.0/assets/arrow.png" });
        // const arrowTexture = minemap.TextureLoader.load({ map, texUrl: "../image/arrow.png" });
        const arrowMaterial = minemap.StandardMaterial.fromType("Texture", {
            baseColorMap: arrowTexture,
            opacity: 1.0,
            doubleSided: true,
            texRepeat: [5, 2]
        });

        arrowMaterial.flowTexture(
            {
                speed: 5,           // 速度取值范围：1-10, 值越大，流动速度越快
                direction: "right",   // 纹理流动方向，取值：left,right,up,down,
                rotation: 0,         // 纹理旋转角度，取值范围：0-360
                texRepeat: [10, 1]    // 纹理重复次数，第一个值为横向重复次数，第二个值为纵向重复次数，取值大于0
            }
        );

        const arrowPrimitive = new minemap.Primitive({
            geometry: arrowGeometry,

            material: arrowMaterial
        });
        map.addPrimitive(arrowPrimitive);


		let params = {
			roughness: 1.0
		};
		const gui = new lil.GUI({title: "参数调节面板"});
		gui.add(params, "roughness", 0, 1, 0.01).name("白膜粗糙度").onChange(function (value) {
			for(let i = 0; i < extrusionLayers.length; i++) {
				const layer = extrusionLayers[i];
				layer.roughness = value;
				layer.useEnvMap = true;
			}
		});

    </script>
</body>

</html>
