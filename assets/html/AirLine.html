<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>航线</title>
	<link rel="stylesheet" href="../style/demo.css">
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="https://minemap.minedata.cn/minemapapi/v4.0.0/minemap.css">
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map">

</div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = "https://minemap.minedata.cn";
	minemap.dataDomainUrl = "https://minemap.minedata.cn";
	minemap.serverDomainUrl = "https://sd-data.minedata.cn";
	minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
	minemap.serviceUrl = "https://service.minedata.cn/service";

	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
	minemap.solution = 11003;

	var style = {
		"glyphs": "minemap://fonts/{fontstack}/{range}",
		"sprite": "minemap://sprite/sprite",
		"sources": {},
		"layers": [],
		"version": 8
	};

	var map = new minemap.Map({
		container: "map",
		style: "https://service.minedata.cn/map/solu/style/11003",
		center: [116.46, 39.92],
		zoom: 4,
		pitch: 60,
		maxZoom: 17,
		minZoom: 3,
		projection: "MERCATOR"
	});

	map.repaint = true;

	/**
	 * 创建地图对象后，开始加载地图资源，地图资源加载完成后触发load事件
	 */
	map.on("load", function() {
		add();
	});

	function add() {
		if (map.getSceneComponent("hangJiXian")) {
			return;
		}
		minemap.util.getJSON("https://minedata.cn/nce-static/support/demo/js-3d-ultra/zh/assets/airline.json", function(error, data) {
			if (data != undefined) {
				//
				// @param {[[lon,lat,lon,lat,height,...]]} options.data 起始点经度、起始点纬度、终点经度、终点纬度、高度（10km）、其他属性
				// @param {number}              [options["airline-width"]=1.0]                    线宽，默认为1.0
				// @param {number}              [options["airline-seg-group"]=5.0]                流动航迹线的长度，默认是5段
				// @param {number}              [options["airline-speed"]=6.0]                   流动航迹线的速度，一次性走多少段，默认是60
				// @param {number}              [options["airline-opacity"]=1.0]                    航迹线的透明度 默认是1.0
				// @param {object}              [options["airline-color"]=undefined]              航迹线的颜色配置
				// @param {object}              [options["id"]=uuid()]              id
				// 一个 1°x1°的航迹线 会被拆分为10段
				// @example
				//
				map.addSceneComponent(new minemap.AirLine(
					{
						"id": "hangJiXian",
						"data": data,
						"airline-seg-group": 5,
						"airline-width": 1,
						"airline-speed": 30,
						"airline-opacity": 1.0,
						"airline-color": {
							"steps": [
								[0, "#e9ebee"],
								[50, "#0154f0"],
								[100, "#deac0d"],
								[150, "#e70707"],
								[200, "#f2ebeb"]
							],
							"color-index": 5
						}
					}
				));
			}
		});
	}

	function remove() {
		if (map.getSceneComponent("hangJiXian")) {
			map.removeSceneComponent("hangJiXian");
		}
	}

	const myObj = {
		删除: ()=>{remove()},
		添加: ()=>{add()}
	};
	//添加gui
	const gui = new lil.GUI({ title: "控制菜单" });
	gui.add(myObj, "删除");
	gui.add(myObj, "添加");
</script>
</body>
