<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no"/>
	<title>地形上点标记的拖拽</title>
	<link rel="stylesheet" href="../style/demo.css">
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css">
	<script src="../../dist/minemap-dev.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = 'https://minemap.minedata.cn';
	minemap.dataDomainUrl = 'https://minemap.minedata.cn';
	minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
	minemap.spriteUrl = 'https://minemap.minedata.cn/minemapapi/v3.4.0/sprite/sprite';
	minemap.serviceUrl = 'https://service.minedata.cn/service';

	minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
	minemap.solution = 11001;

	// 定义空底图样式
	var style = {
		"glyphs": "minemap://fonts/{fontstack}/{range}",
		"sprite": "minemap://sprite/sprite",
		"sources": {},
		"layers": [{
			"id": "background",
			"type": "background",
			"source": "",
			"paint": {
				"background-color": "#005100"
			}
		}],
		"version": 8
	};

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: 'map',
		style: style, /*球面矢量底图样式*/
		center: [115.17269651524639, 39.615362018033615], /*地图中心点*/
		zoom: 12, /*地图默认缩放等级*/
		pitch: 60, /*地图俯仰角度*/
		bearing: 60,/*地图旋转角度*/
		maxZoom: 22, /*地图最大缩放等级*/
		minZoom: 1,  /*地图最小缩放等级*/
		projection: 'MERCATOR',
		requestInterval: 60 // 请求时间间隔，以秒为单位，目前仅请求地形时生效，默认60秒
	});

	//开启大气透视
	const skyAtmosphere = map.getSky();
	skyAtmosphere.useAerialPerspective = true;

	map.setTerrain({
		"tiles": ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
		"tileSize": 512,  //瓦片大小
		"maxzoom": 14        //dem最高切分zoom，30米一般是14级；12.5米一般是16级
		// bounds: [130, 60, 140, 70],//要显示区域的经纬度外包框，按west，south，east，north填写
	});

	/**
	 * 添加基本球体图层，包括球体表面、天空盒、大气层
	 *
	 */
	map.on('load', function () {
		/*添加DEM数字高程模型数据*/
		map.addSource("3D_SOURCE", {
			"type": "raster",//DEM的数据类型为"raster"
			"tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			"tileSize": 512,  //瓦片大小
		});
		map.addLayer({
			"type": "raster",//DEM的图层类型为"raster"
			"id": "3d-layer",
			"source": "3D_SOURCE",
			"minzoom": 1,
			"maxzoom": 20,
			"layout": {}
		})
	})

	//默认marker
	var lnglat = map.getCenter();
	var marker = new minemap.Marker({color: 'red'}).setLngLat([115.15699396984743, 39.92121320248471 - 0.3]).setAltitude(1138).addTo(map);
	marker.setDraggable(true); //此方法可以设置marker的拖拽属性，true为可以拖拽，false为不可以拖拽
	var draggable = marker.isDraggable()
	var popup = new minemap.Popup({
		closeOnClick: false,
		closeButton: false,
		offset: [0, -40]
	}).setText(`我是默认marker，我的拖拽属性是${draggable}`)
	marker.setPopup(popup).togglePopup();
	popup.setAltitude(1138);

	// 自定义marker
	var el = document.createElement('div');
	el.id = 'marker';
	el.style["background-image"] = "url(http://192.168.152.123:11187/demo-data/3d-ultra/images/park-blue2x.png)";
	el.style["background-size"] = "cover";
	el.style.width = "24px";
	el.style.height = "38px";
	el.style["border-radius"] = "20%";

	var _marker = new minemap.Marker({
		draggable: false, //可以在初始化的时候决定是否可以拖拽
		element: el, //可以将自定义的DOM元素给element字段
		offset: [-12, -38]
	}).setLngLat([115.15699396984743, 39.92121320248471]).addTo(map);
	var _draggable = _marker.isDraggable()
	var _popup = new minemap.Popup({
		closeOnClick: false,
		closeButton: false,
		offset: [0, -50]
	}).setText(`我是自定义marker，我的拖拽属性是${_draggable}`)
	_marker.setPopup(_popup).togglePopup();


</script>
</body>
