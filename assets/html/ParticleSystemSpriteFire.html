<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>粒子系统-雪碧图火焰</title>
	<link
		rel="stylesheet"
		href="../style/demo.css"
	/>
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = "https://minedata.cn";
	minemap.dataDomainUrl = "https://minedata.cn";
	minemap.serverDomainUrl = "https://minedata.cn";
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	minemap.serviceUrl = "https://minedata.cn/service/";

	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
	minemap.solution = 11001;
	window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

	// 定义空底图样式
	var style = {
		glyphs: "minemap://fonts/{fontstack}/{range}",
		sprite: "minemap://sprite/sprite",
		sources: {},
		layers: [],
		version: 8
	};

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: "map",
		style: style,
		/*球面矢量底图样式*/
		position: [108.9607142517632, 34.2182474094475, 4.54417511159378],
		/*地图中心点*/
		bearing: -58.94361943660047,
		/*地图默认缩放等级*/
		pitch: 71.60791601632805,
		/*地图俯仰角度*/
		maxZoom: 22,
		/*地图最大缩放等级*/
		minZoom: 1,
		/*地图最小缩放等级*/
		projection: "MERCATOR"
	});
	map.repaint = true;

	map.on("load", function() {
		/*添加栅格图*/
		map.addSource("IMAGERY_SOURCE", {
			type: "raster", //数据源类型：栅格数据源
			tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			tileSize: 512 //瓦片尺寸
		});

		map.addLayer({
			id: "IMAGERY",
			type: "raster", //图层类型为"raster"
			source: "IMAGERY_SOURCE",
			minzoom: 1,
			maxzoom: 23,
			paint: {
				"raster-opacity": 1
			}
		});

		const texture = minemap.TextureLoader.load({ map, texUrl: "../data/image/spriteFire.png", flipY: true  });
		const modelMatrix = minemap.Transforms.cartographicToFixedFrame(new minemap.Math.Vector3([108.9605960470355, 34.21830728693849, 0]));
		// 构建粒子系统
		const fireSystem = new minemap.ParticleSystem({
			modelMatrix: modelMatrix, // 模型矩阵
			duration: 2,
			looping: true,

			startLife: new minemap.ParticleFunctions.ConstantValue(1),
			startSpeed: new minemap.ParticleFunctions.ConstantValue(0),  // 设置为0，粒子系统不会移动，保证在固定位置
			startSize: new minemap.ParticleFunctions.ConstantValue(2),
			startColor: new minemap.ParticleFunctions.Gradient(
				[
					[new minemap.Math.Vector3(1, 1, 1), 0], // 第1个点的颜色
					[new minemap.Math.Vector3(1, 1, 1), 1]  // 第2个点的颜色
				],
				[
					[0.2, 0], // 第一个点的透明度 0.2
					[0.5, 1], // 第二个点的透明度 0.5
				],
			),
			worldSpace: false,


			emissionOverTime: new minemap.ParticleFunctions.ConstantValue(3),
			emissionBursts: [],

			shape: new minemap.PointEmitter(),
			material: new minemap.BasicMaterial({
				baseColorMap: texture,
				transparent: true,
				renderState: {
					cull: {
						enabled: true
					},
					depthTest: {
						enabled: true,
						func: minemap.WebGLConstants.LEQUAL
					},
					depthMask: false
				}
			}),
			startTileIndex: new minemap.ParticleFunctions.ConstantValue(0), // 雪碧图的起始索引号
			uTileCount: 4, // 雪碧图的列数
			vTileCount: 4, // 雪碧图的行数
			renderOrder: 1,
		});
		// 用来控制雪碧图的索引，从0开始，到15结束
		fireSystem.addBehavior(new minemap.ParticleBehaviors.FrameOverLife(new minemap.ParticleFunctions.PiecewiseBezier([[new minemap.ParticleFunctions.Bezier(0, 4, 8, 15), 0]])));
		fireSystem.emitter.name = 'fireSystem';
		// 添加粒子系统到地图
		map.addParticleSystem(fireSystem);

	});

</script>
</body>
</html>
