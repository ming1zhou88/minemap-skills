    <script>
        // 初始化配置
        minemap.domainUrl = "https://minedata.cn";

        minemap.key = '0c6ac62182404e5ebc7a789981f6db72';

        window.minemapCDN = 'https://minemap.minedata.cn/minemapapi/minemap-CDN'; // minemapCDN 配置

            var center = map.getCenter(); //获取当前地图中心位置

            document.getElementById("map-center").innerText = center.lng.toFixed(6) + "," + center.lat.toFixed(6);
        };

        // 初始化GUI

        map.setTerrain({
            tiles: ['https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain'],
            tileSize: 512

        function addImage(url, name) {
            return new Promise((resolve, reject) => {
                map.loadImage(url, (err, images) => {
                    if (err) throw err;
                    // 添加自定义图标
                    map.addImage(name, images);
                    resolve(name);
                });
            })
        }

        // 主加载函数
        map.on('load', async () => {

                        "icon-color": "#00f",

                    "auto-height": true, // 开启自动赋高
                    "auto-height-offset": 20, // 开启自动赋高后，在计算出的高度的基础上进行上下偏移的距离

                    type: 'fill',

                    paint: {
                        'fill-color': '#475AFF',
                        'fill-opacity': 0.5
                    }
                });

            })


            //添加数据源,该热力图效果，数据源类型支持geojson或vector两种形式
            map.addSource("heatmapSource", {
                type: "geojson",
                data: "../data/POIqingdao.geojson",
                adaptTerrain: true,
            });

            map.addLayer({
                "id": "heatmapLayer",
                "type": "heatmap",
                "source": "heatmapSource",
                "layout": {
                    "visibility": "none"
                },
                "paint": {
                    // 一个热力图数据点的模糊范围，单位是像素，默认值30；要求：值大于等于1，可根据zoom level进行插值设置
                    "heatmap-radius": 50,
                    //一个热力图单个数据点的热力程度，默认值为1；要求：值大于等于0，支持使用property中某个的热力值
                    "heatmap-weight": {
                        "property": "mag",
                        "stops": [[0, 0], [10, 1]]
                    },
                    // 用于统一控制热力值的强度，默认值1；要求：值大于等于0，可根据zoom level进行插值设置
                    "heatmap-intensity": 1,
                    // 表示热力图颜色阶梯，阶梯的值域范围为0-1，默认值为["interpolate",["linear"],["heatmap-density"],0,"rgba(0, 0, 255, 0)",0.1,"royalblue",0.3,"cyan",0.5,"lime",0.7,"yellow",1,"red"]
                    "heatmap-color": [
                        "interpolate",
                        ["linear"],
                        ["heatmap-density"],
                        0, "rgba(0, 0, 255, 0)", 0.1, "royalblue", 0.3, "cyan", 0.5, "lime", 0.7, "yellow", 1, "red"
                    ],

                    "heatmap-opacity": 1,

                zoom: 14,

                duration: 3000
            });

            // 初始化控制面板
            initControls();

            // 实现功能
            // implementFeatures();
        });

        // 核心功能实现
        function implementFeatures() {
            // 功能1：可视域分析
            map.on('click', async (e) => {
                if (!state.viewshed.active) return;

                if (state.viewshed.component) {
                    map.removeSceneComponent(state.viewshed.component);
                }

                state.viewshed.component = await map.addSceneComponent({
                    id: 'viewshed-' + Date.now(),
                    type: 'viewshed',
                    position: [e.lngLat.lng, e.lngLat.lat, 200],
                    horizontalAngle: 90,
                    verticalAngle: 60,
                    distance: 1000,
                    color: '#00FF00'
                });
            });

            // 功能2：POI统计
            const poiCount = map.querySourceFeatures('poi').length;
            document.getElementById('poiCount').textContent = poiCount;

            // 功能3：POI空间分析
            const functionFeatures = map.querySourceFeatures('function');
            map.setPaintProperty('poi-layer', 'circle-color', [
                'case',
                ...functionFeatures.flatMap(feature => [
                    ['within', ['geometry'], feature.geometry],
                    '#ff0000'
                ]),
                '#4287f5'
            ]);
        }
    </script>

    <script>

        map.repaint = true

        // 添加矢量图层-线、面，以及交互事件
        map.on("click", function (e) {
            const feature = map.getFeatureByGPUPick(e.point);
            if (feature && feature.material) {
                if (feature.material instanceof minemap.StandardMaterial) {
                    feature.material.updateProperty({
                        color: new minemap.Color(Math.random(), Math.random(), Math.random(), 1)
                    });
                } else {
                    feature.material.uniformMap.color = new minemap.Color(Math.random(), Math.random(), Math.random(), 1);
                }
            } else {
                console.log("未选中任何要素");
            }
        });

        function addPrimitives() {
            deletePrimitives()

            const height = 50;
            const linePosition = [
                center[0] - 0.06,
                center[1] - 0.06,
                height,
                center[0] - 0.01,
                center[1] + 0.01,
                height,
                center[0] + 0.02,
                center[1] + 0.02,
                height,
                center[0] - 0.01,
                center[1] - 0.01,
                height
            ];
            const polygonPosition = [
                ...center,
                center[0],
                center[1] + 0.06,
                center[0] + 0.06,
                center[1],
                ...center
            ];
            const lineGeometry = new minemap.Geometries.PolylineGeometry({
                positions: minemap.Math.Vector3.fromDegreesArrayHeights(linePosition),
                width: 10
            });
            const lineMaterial = new minemap.PolylineMaterial({
                color: new minemap.Color(1, 0, 0, 0.5)
                // dashed: true
            });
            const redPolylinePrimitive = new minemap.Primitive({
                geometry: lineGeometry,
                material: lineMaterial,
                name: "polyline",
                adaptTerrain: true, //贴合三维场景，单体化操作
                allowPick: true,
                id: "linePrimitive"
            });
            map.addPrimitive(redPolylinePrimitive);
            window.line = redPolylinePrimitive;
            const polygonGeometry = new minemap.Geometries.PolygonGeometry({
                polygonHierarchy: {
                    positions: minemap.Math.Vector3.fromDegreesArray(polygonPosition)
                },
                height: 10
            });
            const polygonMaterial = minemap.StandardMaterial.fromType("Color", {
                color: new minemap.Color(1, 0, 0, 0.5),
                doubleSided: true
            });
            const polygonPrimitive = new minemap.Primitive({
                geometry: polygonGeometry,
                material: polygonMaterial,
                adaptTerrain: true, //贴合三维场景，单体化操作
                allowPick: true,
                id: "polygonPrimitive"
            });
            map.addPrimitive(polygonPrimitive);
        }

        function deletePrimitives() {
            if (map.getPrimitiveById("polygonPrimitive")) {
                map.removePrimitive(map.getPrimitiveById("polygonPrimitive"));
            }
            if (map.getPrimitiveById("linePrimitive")) {
                map.removePrimitive(map.getPrimitiveById("linePrimitive"));
            }
        }

        function showPrimitives() {
            if (map.getPrimitiveById("polygonPrimitive")) {
                map.getPrimitiveById("polygonPrimitive").visible = !map.getPrimitiveById("polygonPrimitive").visible;
            }
            if (map.getPrimitiveById("linePrimitive")) {
                map.getPrimitiveById("linePrimitive").visible = !map.getPrimitiveById("linePrimitive").visible;
            }
        }

    </script>

    <script>
        function addLine(adaptTerrain) {
            // 加载线数据源
            map.addSource("lineSource",

    <script>

        function deleteVectorLayerLine(id) {
            if (map.getLayer("lineLayer" + id)) {
                map.removeLayer("lineLayer" + id)
            }
            if (map.getSource("lineSource" + id)) {
                map.removeSource("lineSource" + id)
            }
        }
        function deleteVectorLayerPolygon(id) {
            if (map.getLayer("fillLayer" + id)) {
                map.removeLayer("fillLayer" + id)
            }
            if (map.getSource("fillSource" + id)) {
                map.removeSource("fillSource" + id)
            }
        }

        function showVectorLayer(layerid) {
            if (map.getLayer(layerid)) {
                const visibility = map.getLayoutProperty(layerid, 'visibility');
                console.log(visibility); // 'visible' 或 'none'
                if (visibility === 'visible') {
                    map.setLayoutProperty(layerid, 'visibility', 'none');
                } else {
                    map.setLayoutProperty(layerid, 'visibility', 'visible');
                }
            }
        }


        function addVectorLine(adaptTerrain, id, url, maxzoom, color, sourceLayer) {
            deleteVectorLayerLine(id)
            // 加载线数据源
            map.addSource("lineSource" + id,
                {
                    "tiles": [
                        url
                    ],
                    "maxzoom": maxzoom || 19,
                    "type": "vector",
                    "minzoom": 7,
                    adaptTerrain
                }
            );
            // 加载线图层
            map.addLayer({
                "source": "lineSource" + id,
                "layout": {},
                "maxzoom": 24,
                "paint": {
                    "line-border-color": "#475AFF",
                    "line-color": color || "#FF3C31FF"
                },
                "source-layer": sourceLayer,
                "type": "line",
                "minzoom": 7,
                "id": "lineLayer" + id
            });
        }

        function addFill(adaptTerrain, id, url, maxzoom, color, sourceLayer) {

            deleteVectorLayerPolygon(id)

            // 添加面数据源
            map.addSource("fillSource" + id,
                {
                    "tiles": [
                        url || `http://data3-gateway.nke-0wnr83.cloud.app.ncloud.navinfo.com/service/map/mvt-layer/2600/{z}/{x}/{y}?tileMatrixSet=MERCATOR&key=${key}`
                    ],
                    "maxzoom": maxzoom || 16,
                    "type": "vector",
                    "minzoom": 7,
                    adaptTerrain
                });
            // 添加面图层
            map.addLayer({
                "source": "fillSource" + id,
                "layout": {},
                "maxzoom": 24,
                "paint": {
                    "fill-color": color || "#475AFF",
                    "fill-outline-color": color || "#475AFF",
                    "fill-opacity": 0.8
                },
                "source-layer": sourceLayer,
                "type": "fill",
                "minzoom": 7,
                "id": "fillLayer" + id
            });
        }


    </script>
