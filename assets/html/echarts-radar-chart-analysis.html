		.legend-panel {

	</style>
</head>
<body>
<div id="map"></div>

<div class="info-panel">

<div class="legend-panel">

	</div>
	<div class="legend-item">
		<div class="legend-color" style="background: #96CEB4;"></div>

	</div>
	<div class="legend-item">
		<div class="legend-color" style="background: #FFEAA7;"></div>
		<div class="legend-text">交通便利 - 公共交通、道路密度、通达性</div>
	</div>
	<div class="legend-item">
		<div class="legend-color" style="background: #DDA0DD;"></div>
		<div class="legend-text">教育水平 - 高校数量、教育投入、人才培养</div>
	</div>
</div>

<script>
	/**
	 * ========================================
	 * MineMap + ECharts 雷达图分析示例
	 * ========================================
	 * 本示例展示如何在地图上使用ECharts绘制城市评价雷达图和标记
	 * 适用于：城市综合评价、多维度对比分析、指标体系可视化
	 *
	 * 🎯 快速上手指南：
	 * 1. 替换API密钥：修改 minemap.key 和 minemap.solution
	 * 2. 替换数据源：修改 cityEvaluationData 数组
	 * 3. 自定义样式：重点关注 getEChartsOption() 和 getRadarChartOption() 函数
	 * 4. 调整评价指标：修改 indicators 数组来改变雷达图维度
	 *
	 * 📋 核心功能模块：
	 * 1. 地图初始化配置
	 * 2. 城市评价数据源定义
	 * 3. 双图表配置（地图标记 + 雷达图分析）
	 * 4. 城市选择与对比功能
	 * 5. 坐标转换与实时更新
	 *
	 * 🔧 自定义ECharts配置重点：
	 * - getEChartsOption(): 地图标记配置（散点图样式）
	 * - getRadarChartOption(): 雷达图配置（指标轴、数据系列）
	 * - cityEvaluationData: 城市评价数据（多维度评分）
	 * - indicators: 评价指标定义（经济、创新、生活等）
	 */

	// ==================== 1. 全局参数设置 ====================
	// 【配置说明】请根据实际项目替换以下参数
	minemap.domainUrl = "https://minedata.cn";
	minemap.dataDomainUrl = "https://minedata.cn";
	minemap.serverDomainUrl = "https://minedata.cn";
	minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
	minemap.serviceUrl = "https://service.minedata.cn/service";

	// 【重要】请替换为您的API密钥和解决方案ID
	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
	minemap.solution = 11001;

	// ==================== 2. 数据源定义 ====================
	// 【数据替换区域】城市评价数据 - 请根据实际需求替换城市信息和评价指标
	// 数据格式：{name: 城市名, coord: [经度, 纬度], tier: 城市等级, scores: {指标名: 分数}}
	const cityEvaluationData = [
		{
			name: '北京',
			coord: [116.4074, 39.9042],
			color: '#FF6B6B',
			tier: '一线',
			scores: {
				economy: 95,      // 经济实力
				innovation: 98,   // 创新能力
				living: 85,       // 生活质量
				environment: 72,  // 环境指数
				transport: 92,    // 交通便利
				education: 96     // 教育水平
			}
		},
		{
			name: '上海',
			coord: [121.4737, 31.2304],
			color: '#4ECDC4',
			tier: '一线',
			scores: {
				economy: 98,
				innovation: 94,
				living: 88,
				environment: 75,
				transport: 95,
				education: 92
			}
		},
		{
			name: '深圳',
			coord: [114.0579, 22.5431],
			color: '#45B7D1',
			tier: '一线',
			scores: {
				economy: 92,
				innovation: 96,
				living: 82,
				environment: 78,
				transport: 88,
				education: 85
			}
		},
		{
			name: '广州',
			coord: [113.2644, 23.1291],
			color: '#96CEB4',
			tier: '一线',
			scores: {
				economy: 88,
				innovation: 85,
				living: 86,
				environment: 76,
				transport: 90,
				education: 88
			}
		},
		{
			name: '杭州',
			coord: [120.1551, 30.2741],
			color: '#FFEAA7',
			tier: '新一线',
			scores: {
				economy: 85,
				innovation: 90,
				living: 88,
				environment: 82,
				transport: 85,
				education: 86
			}
		},
		{
			name: '成都',
			coord: [104.0665, 30.5723],
			color: '#DDA0DD',
			tier: '新一线',
			scores: {
				economy: 82,
				innovation: 78,
				living: 92,
				environment: 80,
				transport: 82,
				education: 84
			}
		},
		{
			name: '南京',
			coord: [118.7969, 32.0603],
			color: '#F0A500',
			tier: '新一线',
			scores: {
				economy: 80,
				innovation: 85,
				living: 85,
				environment: 84,
				transport: 80,
				education: 90
			}
		},
		{
			name: '武汉',
			coord: [114.3054, 30.5931],
			color: '#FF8C94',
			tier: '新一线',
			scores: {
				economy: 78,
				innovation: 82,
				living: 83,
				environment: 75,
				transport: 85,
				education: 88
			}
		}
	];

	// 【配置区域】评价指标定义 - 可根据业务需求修改评价维度和权重
	const indicators = [
		{name: '经济实力', max: 100},
		{name: '创新能力', max: 100},
		{name: '生活质量', max: 100},
		{name: '环境指数', max: 100},
		{name: '交通便利', max: 100},
		{name: '教育水平', max: 100}
	];

	// ==================== 3. 地图初始化 ====================
	// 【地图配置】可根据需求调整地图样式、中心点、缩放级别等
	const map = new minemap.Map({
		container: "map",
		style: "https://service.minedata.cn/map/solu/style/11001",
		center: [110, 32],
		zoom: 4.5,
		pitch: 0,
		bearing: 0
	});

	let echartsInstance;
	let radarChartInstance;
	let selectedCities = ['北京'];
	let compareMode = 'single';
	let animationFrameId = null;
	let animationFrameIds = new Set(); // 存储所有动画帧ID

	// 清除所有动画帧
	function clearAllAnimationFrames() {
		if (animationFrameId) {
			cancelAnimationFrame(animationFrameId);
			animationFrameId = null;
		}
		animationFrameIds.forEach(id => cancelAnimationFrame(id));
		animationFrameIds.clear();
	}

	// 使用requestAnimationFrame替代setTimeout
	function requestAnimationFrameWithDelay(callback, delay = 0) {
		if (delay === 0) {
			const id = requestAnimationFrame(callback);
			animationFrameIds.add(id);
			return id;
		}

		const startTime = performance.now();

		function frame(currentTime) {
			if (currentTime - startTime >= delay) {
				callback();
			} else {
				const id = requestAnimationFrame(frame);
				animationFrameIds.add(id);
			}
		}

		const id = requestAnimationFrame(frame);
		animationFrameIds.add(id);
		return id;
	}

	// 清理ECharts实例
	function disposeECharts() {
		clearAllAnimationFrames(); // 清除所有动画帧
		if (echartsInstance) {
			echartsInstance.dispose();
			echartsInstance = null;
		}
		if (radarChartInstance) {
			radarChartInstance.dispose();
			radarChartInstance = null;
		}
		// 移除动态创建的容器
		const container = document.getElementById('echarts-container');
		if (container && container.parentNode) {
			container.parentNode.removeChild(container);
		}
	}

	// ==================== 4. 核心工具函数 ====================
	// 【核心函数】地理坐标转屏幕坐标 - 实现地图与ECharts的坐标同步
	function convertGeoToScreen(coord) {
		const point = map.project(coord);
		const container = document.getElementById('echarts-container');
		const containerHeight = container.clientHeight;

		return [point.x, containerHeight - point.y];
	}

	// 【数据处理】生成城市标记系列 - 在地图上显示城市位置标记
	function generateCityMarkerSeries() {
		return {
			type: 'scatter',
			name: '城市标记',
			coordinateSystem: 'cartesian2d',
			data: cityEvaluationData.map(city => {
				const screenCoord = convertGeoToScreen(city.coord);
				const isSelected = selectedCities.includes(city.name);
				const avgScore = Object.values(city.scores).reduce((a, b) => a + b, 0) / 6;

				return {
					value: screenCoord,
					name: city.name,
					avgScore: avgScore.toFixed(1),
					tier: city.tier,
					itemStyle: {
						color: isSelected ? city.color : 'rgba(150, 150, 150, 0.6)',
						borderColor: isSelected ? '#fff' : 'rgba(255, 255, 255, 0.8)',
						borderWidth: isSelected ? 4 : 2,
						shadowBlur: isSelected ? 20 : 10,
						shadowColor: isSelected ? city.color : 'rgba(0, 0, 0, 0.3)',
						shadowOffsetX: 0,
						shadowOffsetY: 0
					}
				};
			}),
			symbolSize: function (data, params) {
				const isSelected = selectedCities.includes(params.data.name);
				const avgScore = params.data.avgScore;
				const baseSize = isSelected ? 35 : 25;
				return baseSize + (avgScore / 100) * 15;
			},
			label: {
				show: true,
				position: 'bottom',
				formatter: function (params) {
					const isSelected = selectedCities.includes(params.data.name);
					return isSelected ? `${params.name}\n${params.data.tier}城市\n综合: ${params.data.avgScore}分` : params.name;
				},
				fontSize: function (params) {
					return selectedCities.includes(params.data.name) ? 12 : 10;
				},
				fontWeight: function (params) {
					return selectedCities.includes(params.data.name) ? 'bold' : 'normal';
				},
				color: '#333',
				backgroundColor: function (params) {
					return selectedCities.includes(params.data.name) ? 'rgba(255, 255, 255, 0.95)' : 'rgba(255, 255, 255, 0.8)';
				},
				borderColor: '#ddd',
				borderWidth: 1,
				borderRadius: 4,
				padding: [6, 10],
				offset: [0, 20]
			},
			emphasis: {
				scale: true,
				scaleSize: 8,
				itemStyle: {
					shadowBlur: 30,
					shadowColor: 'rgba(0, 0, 0, 0.5)'
				}
			},
			animationType: 'scale',
			animationEasing: 'elasticOut',
			animationDelay: function (idx) {
				return idx * 100;
			}
		};
	}

	// ==================== 5. ECharts配置函数 ====================
	// 【重要配置】地图标记ECharts配置 - 自定义散点图样式和交互
	// 【自定义指南】
	// - animation: 控制动画效果（建议关闭以提升地图性能）
	// - grid: 调整图表边距和布局
	// - xAxis/yAxis: 坐标轴配置（与地图容器尺寸同步）
	// - series: 数据系列配置（散点图样式、颜色、大小等）
	// - tooltip: 悬浮提示框配置（显示城市详细信息）
	function getEChartsOption() {
		const containerWidth = document.getElementById('echarts-container').clientWidth;
		const containerHeight = document.getElementById('echarts-container').clientHeight;

		return {
			// 【性能优化】关闭动画以提升地图交互性能
			animation: false,
			animationDuration: 0,
			animationEasing: 'linear',
			useUTC: true,
			// 【坐标轴】X轴配置 - 与容器宽度同步
			xAxis: {
				type: 'value',
				show: false, // 隐藏坐标轴
				min: 0,
				max: containerWidth
			},
			// 【坐标轴】Y轴配置 - 与容器高度同步
			yAxis: {
				type: 'value',
				show: false, // 隐藏坐标轴
				min: 0,
				max: containerHeight
			},
			// 【布局配置】设置图表边距，确保与地图完全重叠
			grid: {
				left: 0, right: 0, top: 0, bottom: 0, containLabel: false
			},
			// 【数据系列】城市标记散点图配置
			series: [
				generateCityMarkerSeries()
			],
			// 【提示框配置】悬浮时显示城市详细评分信息
			tooltip: {
				trigger: 'item',
				// 【格式化函数】自定义提示框内容显示
				formatter: function (params) {
					const city = cityEvaluationData.find(c => c.name === params.data.name);
					if (!city) return '';

					let html = `<strong>${params.data.name}</strong> (${params.data.tier}城市)<br/>`;
					html += `综合评分: ${params.data.avgScore}分<br/><br/>`;
					html += `经济实力: ${city.scores.economy}分<br/>`;
					html += `创新能力: ${city.scores.innovation}分<br/>`;
					html += `生活质量: ${city.scores.living}分<br/>`;
					html += `环境指数: ${city.scores.environment}分<br/>`;
					html += `交通便利: ${city.scores.transport}分<br/>`;
					html += `教育水平: ${city.scores.education}分<br/>`;
					html += `<em>点击查看雷达图详情</em>`;

					return html;
				},
				// 【样式配置】提示框外观设置
				backgroundColor: 'rgba(0, 0, 0, 0.8)',
				borderColor: '#777',
				borderWidth: 1,
				textStyle: {
					color: '#fff',
					fontSize: 12
				},
				extraCssText: 'max-width: 300px; white-space: normal;'
			}
		};
	}

	// 【重要配置】雷达图ECharts配置 - 自定义雷达图样式和数据展示
	// 【自定义指南】
	// - radar: 雷达图坐标系配置（指标轴、网格、标签）
	// - series: 数据系列配置（线条样式、填充区域、颜色）
	// - legend: 图例配置（位置、样式）
	// - tooltip: 悬浮提示框格式和内容
	function getRadarChartOption() {
		// 【数据处理】根据选中城市生成雷达图数据
		const seriesData = selectedCities.map(cityName => {
			const city = cityEvaluationData.find(c => c.name === cityName);
			if (!city) return null;

			return {
				// 【数据映射】将城市评分映射到雷达图各维度
				value: [
					city.scores.economy,
					city.scores.innovation,
					city.scores.living,
					city.scores.environment,
					city.scores.transport,
					city.scores.education
				],
				name: city.name,
				// 【样式配置】数据点颜色
				itemStyle: {
					color: city.color
				},
				// 【线条样式】连接线配置
				lineStyle: {
					color: city.color,
					width: 2
				},
				// 【填充区域】透明度和颜色
				areaStyle: {
					color: city.color,
					opacity: 0.3
				}
			};
		}).filter(item => item !== null);

		return {
			// 【雷达坐标系】配置评价指标轴和网格样式
			radar: {
				indicator: indicators, // 评价指标定义
				center: ['50%', '55%'], // 雷达图中心位置
				radius: '70%', // 雷达图半径
				startAngle: 90, // 起始角度
				splitNumber: 5, // 网格分割数
				shape: 'polygon', // 雷达图形状
				// 【指标标签】样式配置
				name: {
					formatter: '{value}',
					textStyle: {
						color: '#333',
						fontSize: 11,
						fontWeight: 'bold'
					}
				},
				// 【分割区域】背景色配置
				splitArea: {
					areaStyle: {
						color: ['rgba(114, 172, 209, 0.1)', 'rgba(114, 172, 209, 0.05)'],
						shadowColor: 'rgba(0, 0, 0, 0.2)',
						shadowBlur: 10
					}
				},
				// 【坐标轴线】样式配置
				axisLine: {
					lineStyle: {
						color: 'rgba(114, 172, 209, 0.8)'
					}
				},
				// 【分割线】样式配置
				splitLine: {
					lineStyle: {
						color: 'rgba(114, 172, 209, 0.6)'
					}
				}
			},
			// 【数据系列】雷达图数据和样式配置
			series: [{
				name: '城市评价',
				type: 'radar',
				data: seriesData,
				symbol: 'circle', // 数据点形状
				symbolSize: 6, // 数据点大小
				// 【强调效果】鼠标悬浮时的样式变化
				emphasis: {
					lineStyle: {
						width: 4
					},
					areaStyle: {
						opacity: 0.6
					}
				},
				// 【动画配置】图表加载动画
				animationDuration: 1000,
				animationEasing: 'cubicInOut'
			}],
			// 【图例配置】显示选中城市列表（对比模式时显示）
			legend: {
				show: compareMode === 'compare' && selectedCities.length > 1,
				data: selectedCities,
				bottom: 10,
				textStyle: {
					fontSize: 11
				}
			},
			// 【提示框配置】悬浮时显示详细评分信息
			tooltip: {
				trigger: 'item',
				// 【格式化函数】自定义提示框内容显示
				formatter: function (params) {
					const city = cityEvaluationData.find(c => c.name === params.name);
					if (!city) return '';

					let html = `<strong>${params.name}</strong><br/>`;
					const scores = Object.entries(city.scores);
					const labels = ['经济实力', '创新能力', '生活质量', '环境指数', '交通便利', '教育水平'];

					scores.forEach(([key, value], index) => {
						html += `${labels[index]}: ${value}分<br/>`;
					});

					return html;
				}
			}
		};
	}

	// ==================== 6. 界面交互功能 ====================
	// 【界面功能】初始化城市列表 - 生成可选择的城市列表
	function initCityList() {
		const cityList = document.getElementById('city-list');
		cityList.innerHTML = '';

		cityEvaluationData.forEach(city => {
			const cityItem = document.createElement('div');
			cityItem.className = 'city-item';
			cityItem.textContent = `${city.name} (${city.tier})`;
			cityItem.dataset.cityName = city.name;

			if (selectedCities.includes(city.name)) {
				cityItem.classList.add('selected');
			}

			cityItem.addEventListener('click', function () {
				toggleCitySelection(city.name);
			});

			cityList.appendChild(cityItem);
		});
	}

	// 【交互功能】切换城市选择 - 处理单选和多选模式
	function toggleCitySelection(cityName) {
		if (compareMode === 'single') {
			selectedCities = [cityName];
		} else {
			const index = selectedCities.indexOf(cityName);
			if (index > -1) {
				if (selectedCities.length > 1) {
					selectedCities.splice(index, 1);
				}
			} else {
				if (selectedCities.length < 4) { // 最多对比4个城市
					selectedCities.push(cityName);
				}
			}
		}

		updateCityListDisplay();
		updateECharts();
		updateRadarChart();
	}

	// 【界面更新】更新城市列表显示状态
	function updateCityListDisplay() {
		const cityItems = document.querySelectorAll('.city-item');
		cityItems.forEach(item => {
			const cityName = item.dataset.cityName;
			if (selectedCities.includes(cityName)) {
				item.classList.add('selected');
			} else {
				item.classList.remove('selected');
			}
		});
	}

	// ==================== 7. 图表初始化与更新 ====================
	// 【图表初始化】初始化地图标记ECharts实例
	// 【性能优化】使用canvas渲染器和脏矩形检测提升渲染性能
	function initECharts() {
		if (echartsInstance) {
			echartsInstance.dispose();
		}

		// 动态创建echarts容器并添加到minemap的canvas容器中
		const mapCanvasContainer = map.getCanvasContainer();
		const container = document.createElement("div");
		container.id = "echarts-container";
		container.style.position = "absolute";
		container.style.left = "0";
		container.style.top = "0";
		container.style.width = "100%";
		container.style.height = "100%";
		mapCanvasContainer.appendChild(container);

		// 【渲染配置】优化ECharts实例配置
		// - renderer: 'canvas' 使用Canvas渲染，性能更好
		// - useDirtyRect: 启用脏矩形检测，只重绘变化区域
		// - useCoarsePointer: 优化触摸设备交互性能
		echartsInstance = echarts.init(container, null, {
			renderer: 'canvas',
			useDirtyRect: true,
			useCoarsePointer: true
		});
		updateECharts();

		// 【交互事件】城市标记点击选择功能
		// 点击散点图中的城市标记时切换选择状态
		echartsInstance.on('click', function (params) {
			if (params.componentType === 'series' && params.seriesType === 'scatter') {
				toggleCitySelection(params.data.name);
			}
		});
	}

	// 【图表初始化】初始化雷达图ECharts实例
	// 【专用配置】雷达图使用独立的ECharts实例，避免与地图标记冲突
	function initRadarChart() {
		if (radarChartInstance) {
			radarChartInstance.dispose();
		}
		const container = document.getElementById('radar-chart');
		// 【渲染优化】雷达图实例配置
		// 使用与地图标记相同的性能优化配置
		radarChartInstance = echarts.init(container, null, {
			renderer: 'canvas',
			useDirtyRect: true,
			useCoarsePointer: true
		});
		updateRadarChart();
	}

	// 【图表更新】更新地图标记显示
	// 【性能优化】使用高效的setOption配置减少重绘开销
	function updateECharts() {
		if (echartsInstance) {
			const option = getEChartsOption();
			// 【更新配置】优化图表更新性能
			// - notMerge: true 不合并配置，完全替换（避免配置冲突）
			// - lazyUpdate: true 延迟更新，批量处理变更
			// - silent: true 静默更新，不触发事件（提升性能）
			echartsInstance.setOption(option, {
				notMerge: true,
				lazyUpdate: true,
				silent: true
			});
		}
	}

	// 【图表更新】更新雷达图显示
	// 【数据驱动】根据选中城市动态更新雷达图数据和样式
	function updateRadarChart() {
		if (radarChartInstance) {
			const option = getRadarChartOption();
			// 【更新策略】雷达图使用相同的性能优化配置
			// 确保多城市对比时的流畅切换体验
			radarChartInstance.setOption(option, {
				notMerge: true,
				lazyUpdate: true,
				silent: true
			});
		}
	}

	// ==================== 8. 性能优化工具函数 ====================
	// 【性能优化】防抖函数（使用requestAnimationFrame）
	// 【应用场景】窗口大小调整、搜索输入等需要延迟执行的场景
	// 【优化原理】在指定时间内多次调用只执行最后一次，避免频繁执行
	function debounce(func, wait) {
		let frameId;
		return function executedFunction(...args) {
			const later = () => {
				if (frameId) {
					animationFrameIds.delete(frameId);
				}
				func(...args);
			};
			// 【帧管理】取消之前的动画帧，确保只执行最新的调用
			if (frameId) {
				cancelAnimationFrame(frameId);
				animationFrameIds.delete(frameId);
			}
			// 【延迟执行】使用自定义的requestAnimationFrame延迟函数
			frameId = requestAnimationFrameWithDelay(later, wait);
		};
	}

	// 【性能优化】节流函数（使用requestAnimationFrame）
	// 【应用场景】地图移动、滚动事件等高频触发的场景
	// 【优化原理】限制函数执行频率，在指定时间间隔内最多执行一次
	// 【性能提升】避免地图移动时过度频繁的ECharts重绘，保持60fps流畅度
	function throttle(func, limit) {
		let inThrottle;
		return function () {
			const args = arguments;
			const context = this;
			// 【执行控制】只有在非节流状态下才执行函数
			if (!inThrottle) {
				func.apply(context, args);
				inThrottle = true;
				// 【时间控制】使用requestAnimationFrame确保在下一帧重置状态
				requestAnimationFrameWithDelay(() => inThrottle = false, limit);
			}
		};
	}

	// ==================== 9. 事件监听与生命周期管理 ====================
	// 【生命周期】地图加载完成后初始化所有组件
	// 【初始化顺序】确保地图完全加载后再初始化ECharts，避免坐标转换错误
	map.on('load', function () {
		// 【组件初始化】按顺序初始化各个功能模块
		initECharts();      // 初始化地图标记图表
		initRadarChart();   // 初始化雷达分析图表
		initCityList();     // 初始化城市选择列表

		// 【性能优化】地图变化事件监听 - 双重优化策略
		// 节流处理：保证实时响应，维持60fps流畅度
		const throttledUpdate = throttle(updateECharts, 16); // ~60fps
		// 防抖处理：确保最终状态准确，避免中间状态误差
		const debouncedUpdate = debounce(updateECharts, 100); // 最终更新

		// 【实时更新】地图交互过程中的连续更新（高频事件）
		map.on('move', throttledUpdate);   // 地图拖拽移动
		map.on('zoom', throttledUpdate);   // 缩放级别变化
		map.on('rotate', throttledUpdate); // 地图旋转变化
		map.on('pitch', throttledUpdate);  // 倾斜角度变化

		// 【精确更新】地图交互结束后的最终更新（确保精度）
		map.on('moveend', debouncedUpdate);   // 移动结束
		map.on('zoomend', debouncedUpdate);   // 缩放结束
		map.on('rotateend', debouncedUpdate); // 旋转结束
		map.on('pitchend', debouncedUpdate);  // 倾斜结束
	});

	// ==================== 10. 窗口事件与响应式处理 ====================
	// 【响应式设计】窗口大小变化时重新计算图表尺寸和坐标
	// 【性能考虑】使用requestAnimationFrame确保在浏览器重绘前完成调整
	window.addEventListener('resize', function () {
		// 【延迟处理】避免窗口调整过程中的频繁重绘
		requestAnimationFrameWithDelay(() => {
			// 【地图标记】重新计算容器尺寸和坐标转换
			if (echartsInstance) {
				echartsInstance.resize();  // 调整ECharts容器尺寸
				updateECharts();          // 重新计算地理坐标到屏幕坐标的映射
			}
			// 【雷达图表】调整雷达图容器尺寸（固定布局，只需resize）
			if (radarChartInstance) {
				radarChartInstance.resize();
			}
		}, 50); // 50ms延迟，平衡响应速度和性能
	});

	// 【资源管理】页面卸载时清理ECharts实例和动画帧
	// 【内存优化】防止内存泄漏，确保所有资源正确释放
	window.addEventListener('beforeunload', function () {
		// 【清理策略】统一清理所有ECharts实例和相关资源
		disposeECharts(); // 释放ECharts实例、取消动画帧、清理事件监听
	});

	// 【性能优化】页面可见性变化时的智能资源管理
	// 【节能策略】页面隐藏时暂停渲染，页面显示时恢复更新
	// 【用户体验】确保用户切换回页面时图表状态正确
	document.addEventListener('visibilitychange', function () {
		if (document.hidden) {
			// 【暂停渲染】页面隐藏时停止图表更新，节省CPU和电池
			console.log('页面隐藏，暂停ECharts更新');
			// 注意：这里不销毁实例，只是暂停更新，保持状态
		} else {
			// 【恢复渲染】页面重新可见时立即更新图表状态
			console.log('页面可见，恢复ECharts更新');
			// 【状态同步】确保图表显示最新的数据和位置
			if (echartsInstance) {
				updateECharts();     // 同步地图标记位置
			}
			if (radarChartInstance) {
				updateRadarChart();  // 同步雷达图数据
			}
		}
	});

	// ==================== 11. 用户交互事件监听 ====================
	// 【交互控制】对比模式切换事件监听
	// 【业务逻辑】单城市分析 vs 多城市对比模式的切换处理
	document.getElementById('compare-mode').addEventListener('change', function (e) {
		compareMode = e.target.value;
		// 【模式切换】从多城市对比切换到单城市分析时的数据处理
		if (compareMode === 'single' && selectedCities.length > 1) {
			// 【数据清理】保留第一个选中城市，清除其他选择
			selectedCities = [selectedCities[0]];
			// 【界面同步】更新所有相关的显示组件
			updateCityListDisplay(); // 更新城市列表选中状态
			updateECharts();         // 更新地图标记显示
			updateRadarChart();      // 更新雷达图数据
		}
	});
</script>
