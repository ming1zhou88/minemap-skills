<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>面拉伸体(更新)</title>
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<!-- demo样式文件 -->
		<link rel="stylesheet" href="../style/demo.css" />
		<!-- 引入MineMap API插件 -->
		<link rel="stylesheet" href="../../dist/minemap.css" />
		<script src="../../dist/minemap-dev.js"></script>
		<style>
			#map {
				width: 100%;
				height: 100%;
			}
		</style>
	</head>

	<body>
		<div id="map"></div>
		<script>
			/**
			 * 全局参数设置
			 */
			minemap.domainUrl = "https://minedata.cn";
			minemap.dataDomainUrl = "https://minedata.cn";
			minemap.serverDomainUrl = "https://minedata.cn";
			minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
			minemap.serviceUrl = "https://minedata.cn/service/";

			minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
			minemap.solution = 11001;
			window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

			// 定义空底图样式
			var style = {
				glyphs: "minemap://fonts/{fontstack}/{range}",
				sprite: "minemap://sprite/sprite",
				sources: {},
				layers: [],
				version: 8
			};

			/**
			 * 初始化地图实例
			 */
			var map = new minemap.Map({
				container: "map",
				style: style,
				/*球面矢量底图样式*/
				center: [116.389, 39.947],
				/*地图中心点*/
				bearing: 0,
				zoom: 14.3,
				/*地图默认缩放等级*/
				pitch: 50,
				/*地图俯仰角度*/
				maxZoom: 22,
				/*地图最大缩放等级*/
				minZoom: 1,
				/*地图最小缩放等级*/
				projection: "MERCATOR",
				logarithmicDepthBuffer: true
			});
			map.repaint = true;

			/**
			 * // Example: 面拉伸体(向上拉伸)
			 */
			const orangePolygonHierarchy = {
				positions: minemap.Math.Vector3.fromDegreesArray([
					116.382, 39.942, 116.382, 39.94, 116.392, 39.94, 116.392, 39.942
				])
			};

			const options = {
				polygonHierarchy: orangePolygonHierarchy,
				extrudedHeight: 100,
				perPositionHeight: true,
				color: "rgba(255, 165, 0, 0.6)"
			};

			const polygonGeometry = new minemap.Geometries.PolygonGeometry(options);

			const polygonOutlineGeometry = new minemap.Geometries.PolygonOutlineGeometry(options);

			const material = minemap.StandardMaterial.fromType("Color", {
				color: options.color,
				doubleSided: true
			});

			const primitive = new minemap.Primitive({
				geometry: polygonGeometry,
				material: material
			});

			const material1 = minemap.StandardMaterial.fromType("Color", {
				color: "black",
				doubleSided: true
			});
			const outlinePrimitive = new minemap.Primitive({
				geometry: polygonOutlineGeometry,
				material: material1
			});

			map.addPrimitive(primitive);
			map.addPrimitive(outlinePrimitive);

			map.on("load", function () {
				/*添加栅格图*/
				map.addSource("IMAGERY_SOURCE", {
					type: "raster", //数据源类型：栅格数据源
					tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
					tileSize: 512 //瓦片尺寸
				});

				map.addLayer({
					id: "IMAGERY",
					type: "raster", //图层类型为"raster"
					source: "IMAGERY_SOURCE",
					minzoom: 1,
					maxzoom: 23,
					// "depth-test": true,
					paint: {
						"raster-opacity": 1
					}
				});
			});

			const newOrangePolygonHierarchy = {
				positions: minemap.Math.Vector3.fromDegreesArray([
					116.383, 39.943, 116.383, 39.94, 116.393, 39.94, 116.393, 39.943
				])
			};

			const newOptions = {
				polygonHierarchy: newOrangePolygonHierarchy,
				extrudedHeight: 1000,
				perPositionHeight: true
			};

			setTimeout(() => {
				// 更新几何属性
				polygonGeometry.setData(newOptions);
				polygonOutlineGeometry.setData(newOptions);
			}, 5000);
		</script>
	</body>
</html>
