<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>粒子系统-粒子点选</title>
	<link
		rel="stylesheet"
		href="../style/demo.css"
	/>
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = "https://minedata.cn";
	minemap.dataDomainUrl = "https://minedata.cn";
	minemap.serverDomainUrl = "https://minedata.cn";
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	minemap.serviceUrl = "https://minedata.cn/service/";

	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
	minemap.solution = 11001;
	window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

	// 定义空底图样式
	var style = {
		glyphs: "minemap://fonts/{fontstack}/{range}",
		sprite: "minemap://sprite/sprite",
		sources: {},
		layers: [],
		version: 8
	};

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: "map",
		style: style,
		/*球面矢量底图样式*/
		position: [108.96053782904924, 34.21819130565635, 58.99232576835604],
		/*地图中心点*/
		bearing: 0,
		/*地图默认缩放等级*/
		pitch: 0,
		/*地图俯仰角度*/
		maxZoom: 22,
		/*地图最大缩放等级*/
		minZoom: 1,
		/*地图最小缩放等级*/
		projection: "MERCATOR"
	});
	map.repaint = true;

	map.on("load", function () {
		/*添加栅格图*/
		map.addSource("IMAGERY_SOURCE", {
			type: "raster", //数据源类型：栅格数据源
			tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			tileSize: 512 //瓦片尺寸
		});

		map.addLayer({
			id: "IMAGERY",
			type: "raster", //图层类型为"raster"
			source: "IMAGERY_SOURCE",
			minzoom: 1,
			maxzoom: 23,
			paint: {
				"raster-opacity": 1
			}
		});

		const modelMatrix0 = minemap.Transforms.cartographicToFixedFrame(new minemap.Math.Vector3([108.9605360470355, 34.21812728693849, 1]));
		let particle0 = initParticleSystem(new minemap.PointEmitter(), modelMatrix0);
		map.addParticleSystem(particle0);

		const modelMatrix1 = minemap.Transforms.cartographicToFixedFrame(new minemap.Math.Vector3([108.9605360470355, 34.21818728693849, 1]));
		let particle1 = initParticleSystem(new minemap.RectangleEmitter({
			width: 2,
			height: 2,
			thickness: 0.2,
			mode: minemap.EmitterMode.Loop,
			spread: 0,
			speed: new minemap.ParticleFunctions.ConstantValue(1),
		}), modelMatrix1);
		map.addParticleSystem(particle1);

		const modelMatrix2 = minemap.Transforms.cartographicToFixedFrame(new minemap.Math.Vector3([108.9605360470355, 34.21824728693849, 1]));
		let particle2 = initParticleSystem(new minemap.SphereEmitter({
			radius: 1,
			thickness: 0.2,
			arc: Math.PI * 2,
		}), modelMatrix2);
		map.addParticleSystem(particle2);

		const modelMatrix3 = minemap.Transforms.cartographicToFixedFrame(new minemap.Math.Vector3([108.9605360470355, 34.21830728693849, 1]));
		let particle3 = initParticleSystem(new minemap.ConeEmitter({
			radius: 1,
			thickness: 1,
			arc: Math.PI * 2,
			angle: Math.PI / 4,
		}), modelMatrix3);
		map.addParticleSystem(particle3);

		const modelMatrix4 = minemap.Transforms.cartographicToFixedFrame(new minemap.Math.Vector3([108.9605960470355, 34.21812728693849, 1]));
		let particle4 = initParticleSystem(new minemap.HemisphereEmitter({
			radius: 1,
			thickness: 0.2,
			arc: Math.PI * 2,
		}), modelMatrix4);
		map.addParticleSystem(particle4);

		const modelMatrix5 = minemap.Transforms.cartographicToFixedFrame(new minemap.Math.Vector3([108.9605960470355, 34.21818728693849, 1]));
		let particle5 = initParticleSystem(new minemap.CircleEmitter({
			radius: 1,
			thickness: 0.2,
			arc: Math.PI * 2,
		}), modelMatrix5);
		map.addParticleSystem(particle5);

		const modelMatrix6 = minemap.Transforms.cartographicToFixedFrame(new minemap.Math.Vector3([108.9605960470355, 34.21824728693849, 1]));
		let particle6 = initParticleSystem(new minemap.DonutEmitter({
			radius: 2,
			thickness: 1,
			arc: Math.PI * 2,
			donutRadius: 0.2,
		}), modelMatrix6);
		map.addParticleSystem(particle6);

		const modelMatrix7 = minemap.Transforms.cartographicToFixedFrame(new minemap.Math.Vector3([108.9605960470355, 34.21830728693849, 1]));
		let particle7 = initParticleSystem(new minemap.GridEmitter({
			width: 2,
			height: 2,
			rows: 10,
			columns: 10,
		}), modelMatrix7);
		map.addParticleSystem(particle7);

		map.on("click", (e) => {
			const feature = map.getFeatureByGPUPick(e.point);
			if (feature) {
				// 选中
				alert("选中了")
				console.log(feature);
			}
			else {
				// 未选中
			}
		});
	});

	function initParticleSystem(emitter, modelMatrix) {
		return new minemap.ParticleSystem({
			modelMatrix,
			allowPick: true,
			duration: 5,
			looping: true,
			startLife: new minemap.ParticleFunctions.IntervalValue(1.0, 1.0),
			startSpeed: new minemap.ParticleFunctions.IntervalValue(1, 1),
			startSize: new minemap.ParticleFunctions.IntervalValue(0.1, 0.1),
			startColor: new minemap.ParticleFunctions.RandomColor(new minemap.Math.Vector4(1, 0.91, 0.51, 1), new minemap.Math.Vector4(1, 0.44, 0.16, 1)),
			worldSpace: true,

			maxParticle: 1000,
			emissionOverTime: new minemap.ParticleFunctions.ConstantValue(1000),
			emissionBursts: [],
			shape: emitter,
			material: new minemap.BasicMaterial({
				color: new minemap.Color(1, 0.91, 0.51, 1),
				transparent: true,
				doubleSided: true,
				renderState: {
					cull: {
						enabled: true
					},
					depthTest: {
						enabled: true,
						func: minemap.WebGLConstants.LEQUAL
					},
					depthMask: false
				}
			}),
			startTileIndex: new minemap.ParticleFunctions.ConstantValue(0),
			uTileCount: 10,
			vTileCount: 10,
			renderOrder: 1,
		});
	}

</script>
</body>
</html>
