	});

			type: 'raster', //DEM的数据类型为"raster"
			tiles: ['https://ol-data.minedata.cn/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg'], //瓦片服务地址
			tileSize: 512 //瓦片大小
		});
		map.addLayer({
			type: 'raster', //DEM的图层类型为"raster"
			id: '3d-layer',
			source: '3D_SOURCE',
			minzoom: 1,
			maxzoom: 20,
			layout: {}
		});

		const tileset = map.addSceneComponent({
			id: 'serve',
			type: '3d-tiles',
			show: true,
			url: 'https://minedata.cn/mine-support/assets/web/support-data/3d-tiles/QD/tileset.json', // 要加载的数据
			skipLevelOfDetail: false, //跨层调度
			maximumScreenSpaceError: 4,
			useMipmap: true, // 20210923 不开启useMipmap，3d-tiles 默认为 false
			sourceLoaded: tileset => { }
		});
		carModel = map.addSceneComponent({
			id: "police_car", // 唯一标识
			position: new minemap.Math.Vector3(120.35690098524475, 36.08792215919826, 0),
			rotation: [90, 90, 0],
			scale: [1, 1, 1],
			type: "3d-model",
			data: "../data/police_car.glb",
			castShadow: true,
			receiveShadow: true
		});
		initializeGUI();
		createTrackingPath();
		playAnimation();
	});

	let pickTolerance = 50;
	const params = {
		播放速度: 1,
		时间轴: 0,
		暂停: pause,
		停止: stop,
		复位: reset,
		拾取容差: pickTolerance,
		"拾取并拖动模型(左键按下拖动，抬起结束)": pickAndDragModel,
		当前拾取模型: "",
		自由模式: free,
		视野跟随: follow,
		视野锁定: lock,
		跟踪模型: "police_car1"
	};

	let timeAxis, pickAndDragButton;
	let dragModel = false;
	function initializeGUI() {
		const gui = new lil.GUI({ width: 300 });
		gui.onChange((event) => {
			params[event.property] = event.value;
		});

		const animationMode = gui.addFolder("动画设置");
		animationMode.open();
		animationMode.add(params, "播放速度", 0.1, 10).onChange((value) => {
			updateSpeed(value);
		});
		pauseButton = animationMode.add(params, "暂停");
		animationMode.add(params, "停止");
		animationMode.add(params, "复位");

		const animationEdit = gui.addFolder("动画编辑");
		timeAxis = animationEdit.add(params, "时间轴", 0, 20).onChange((value) => {
			if (!animationBlender) {
				return;
			}

			if (pauseButton.$button.children[0].innerText === "暂停") {
				animationBlender.currentTime = value; // 设置当前动画运行的时间(动画起止时间差值，单位：秒)
			} else if (pauseButton.$button.children[0].innerText === "继续") {
				carModel.modelInstanceCollection.instances.forEach((instance) => {
					let instancePositions;
					switch (instance.instanceName) {
						case "police_car1":
							instancePositions = animationPositions0;
							break;
						case "police_car2":
							instancePositions = animationPositions1;
							break;
						case "police_car3":
							instancePositions = animationPositions2;
							break;
					}
					if (instancePositions !== null) {
						updateModelAnimationByTime(instance, animationBlender, value, instancePositions);
					}
				});
			}
		});
		animationEdit.add(params, "拾取容差", 0.1, 100).onChange((value) => {
			pickTolerance = value;
		});
		pickAndDragButton = animationEdit.add(params, "拾取并拖动模型(左键按下拖动，抬起结束)");
		modelNameButton = animationEdit.add(params, "当前拾取模型");
		modelNameButton.$widget.children[0].style.color = "red";
		modelNameButton.disable();

		const trackingModelFolder = gui.addFolder("跟踪模型");
		trackingModelFolder.open();
		trackingModelFolder
			.add(params, "跟踪模型")
			.options(["police_car1", "police_car2", "police_car3"])
			.onChange(function (value) {
				currentModel = value;
				map.animationManager.animationTracking.name = currentModel;
			});

		const cameraMode = gui.addFolder("相机模式");
		cameraMode.open();
		cameraMode.add(params, "自由模式");
		cameraMode.add(params, "视野跟随");
		cameraMode.add(params, "视野锁定");
	}

	// 自由模式动画
	function free() {
		map.animationManager.animationTracking.enabled = false;
	}

	// 视野跟随动画
	function follow() {
		// 引擎自带动画跟踪配置，根据需要设置不同的效果和模式，也可以根据需求进行创建设置
		map.animationManager.animationTracking.name = currentModel;
		map.animationManager.animationTracking.mode = minemap.AnimationTrackingMode.FOLLOW;
		map.animationManager.animationTracking.effect = minemap.AnimationTrackingEffects.STABLE;
		map.animationManager.animationTracking.headingPitchRoll = new minemap.Math.HeadingPitchRoll(
			minemap.Math.toRadians(0),
			minemap.Math.toRadians(60),
			0
		);
		map.animationManager.animationTracking.distance = 100;
		map.animationManager.animationTracking.enabled = true;

		// 自主创建动画跟踪配置
		// map.animationManager.animationTracking = new minemap.AnimationTracking({
		// 	distance: 100,
		// 	effects: minemap.AnimationTrackingEffects.STABLE,
		// 	enabled: true,
		// 	mode: minemap.AnimationTrackingMode.FOLLOW,
		// 	name: currentModel,
		// 	headingPitchRoll: new minemap.Math.HeadingPitchRoll(
		// 		minemap.Math.toRadians(0),
		// 		minemap.Math.toRadians(60),
		// 		0
		// 	)
		// });
	}

	// 视野锁定动画
	function lock() {
		// 引擎自带动画跟踪配置，根据需要设置不同的效果和模式，也可以根据需求进行创建设置
		map.animationManager.animationTracking.name = currentModel;
		map.animationManager.animationTracking.mode = minemap.AnimationTrackingMode.LOCK;
		map.animationManager.animationTracking.effect = minemap.AnimationTrackingEffects.STABLE;
		map.animationManager.animationTracking.headingPitchRoll = new minemap.Math.HeadingPitchRoll(
			minemap.Math.toRadians(0),
			minemap.Math.toRadians(60),
			0
		);
		map.animationManager.animationTracking.distance = 100;
		map.animationManager.animationTracking.enabled = true;

		// 自主创建动画跟踪配置
		// map.animationManager.animationTracking = new minemap.AnimationTracking({
		// 	distance: 100,
		// 	effects: minemap.AnimationTrackingEffects.PRECISE,
		// 	enabled: true,
		// 	mode: minemap.AnimationTrackingMode.LOCK,
		// 	name: currentModel,
		// 	headingPitchRoll: new minemap.Math.HeadingPitchRoll(
		// 		minemap.Math.toRadians(0),
		// 		minemap.Math.toRadians(6),
		// 		0
		// 	)
		// });
	}

	// 创建跟踪路径
	const animationPathPrimitives = [];
	function createTrackingPath() {
		// red route
		const redRoute = new minemap.Geometries.PolylineGeometry({
			positions: minemap.Math.Vector3.fromDegreesArrayHeights(trackPositions0),
			width: 2,
			arcType: minemap.ARCTYPE.GEODESIC
		});

		const redRouteMaterial = new minemap.PolylineMaterial({
			color: "red"
		});

		const redRoutePrimitive = new minemap.Primitive({
			geometry: redRoute,
			material: redRouteMaterial,
			name: "redRoutePrimitive",
			adaptTerrain: true
		});

		animationPathPrimitives.push(map.addPrimitive(redRoutePrimitive));

		// yellow route
		const blueRoute = new minemap.Geometries.PolylineGeometry({
			positions: minemap.Math.Vector3.fromDegreesArrayHeights(trackPositions1),
			width: 2,
			arcType: minemap.ARCTYPE.GEODESIC
		});

		const yellowRouteMaterial = new minemap.PolylineMaterial({
			color: "blue"
		});

		const blueRoutePrimitive = new minemap.Primitive({
			geometry: blueRoute,
			material: yellowRouteMaterial,
			name: "yellowRoutePrimitive",
			adaptTerrain: true
		});

		animationPathPrimitives.push(map.addPrimitive(blueRoutePrimitive));

		// lime route
		const limeRoute = new minemap.Geometries.PolylineGeometry({
			positions: minemap.Math.Vector3.fromDegreesArrayHeights(trackPositions2),
			width: 2,
			arcType: minemap.ARCTYPE.GEODESIC,
		});

		const limeRouteMaterial = new minemap.PolylineMaterial({
			color: "lime"
		});

		const limeRoutePrimitive = new minemap.Primitive({
			geometry: limeRoute,
			material: limeRouteMaterial,
			name: "limeRoutePrimitive",
			adaptTerrain: true
		});

		animationPathPrimitives.push(map.addPrimitive(limeRoutePrimitive));
	}

	// 创建动画并播放
	function playAnimation() {
		const modelInstanceContent = {
			id: "police_car",
			type: "modelInstance",
			trackIds: ["police_car1", "police_car2", "police_car3"], //实例化模型id
			reference: "ellipsoid",
			positions: [trackPositions0, trackPositions1, trackPositions2],
			times: {
				start: "2023-08-21T11:30:00.000Z",
				end: "2023-08-21T11:30:20.000Z"
				// "steps":[
				// [0, 3, 5, 10, 13, 18, 21], //可选
				// [0, 3, 5, 10, 13, 18, 21], //可选
				// [0, 3, 5, 10, 13, 18, 21] //可选
				// ], //可选
			},
			loop: "repeat", //repeat, once, none
			autoPlay: true, // 默认:false
			autoHeight: true
		};

		const animationJson = {
			documnet: "Animation",
			contents: [modelInstanceContent]
		};

		animation = map.animationManager.add(animationJson);

		animation.then((values) => {
			values.forEach((value) => {
				animationBlender = value;
				timeAxis.max(animationBlender.duration); // 设置时间轴最大值
				// animationBlender.onPlay = (event) => {
				// 	console.log("Play", event);
				// }; // 开始播放时的回调
				animationBlender.onPlaying = (event) => {
					timeAxis.setValue(event.time);
					// console.log("Playing", event);
				}; // 播放时的回调，参数包含动画时间和模型状态
				// animationBlender.onPause = (event) => {
				// 	console.log("Pause", event);
				// }; // 暂停播放时的回调
				// animationBlender.onStop = (event) => {
				// 	console.log("Stop", event);
				// }; // 停止播放时的回调
				// animationBlender.onReset = (event) => {
				// 	console.log("Reset", event);
				// }; // 重置播放时的回调
			});
		});
	}

	// 暂停、停止、复位
	function pause() {
		if (!animationBlender) {
			return;
		}

		if (pauseButton.$button.children[0].innerText === "暂停") {
			pauseButton.$button.children[0].innerText = "继续";
			animationBlender.pause();
		} else {
			pauseButton.$button.children[0].innerText = "暂停";
			animationBlender.play();
		}
	}

	function stop() {
		if (!animationBlender) {
			return;
		}
		animationBlender.stop();
	}

	function reset() {
		if (!animationBlender) {
			return;
		}
		animationBlender.reset();
	}
	function updateSpeed(value) {
		if (!animationBlender) {
			return;
		}
		animationBlender.speed = value;
	}

	function pickAndDragModel() {
		dragModel = true;
		pickAndDragButton.$button.style.backgroundColor = "green";
	}

	const flickerMaterial = minemap.PolylineMaterial.fromType("Flicker", {
		color: "yellow", // 颜色
		speed: 3, // 可选，闪烁速度
		opacity: 1.0 // 可选，透明度
	});

	let selectModelInstance, animationPositions, preGeometry, preMaterial, flickerPrimitive;
	map.on("mousedown", (e) => {
		if (dragModel) {
			map.cameraController.enableInputs = false;
			const feature = map.getFeatureByGPUPick(e.point);
			if (feature instanceof minemap.ModelInstance) {
				selectModelInstance = feature;
				animationBlender.pause();
				modelNameButton.setValue(selectModelInstance.instanceName);

				let currentGeometry;
				switch (selectModelInstance.instanceName) {
					case "police_car1":
						animationPositions = animationPositions0;
						currentGeometry = geometry0;
						flickerPrimitive = animationPathPrimitives[0];
						break;
					case "police_car2":
						animationPositions = animationPositions1;
						currentGeometry = geometry1;
						flickerPrimitive = animationPathPrimitives[1];
						break;
					case "police_car3":
						animationPositions = animationPositions2;
						currentGeometry = geometry2;
						flickerPrimitive = animationPathPrimitives[2];
						break;
				}

				if (flickerPrimitive !== undefined) {
					preGeometry = flickerPrimitive.geometry;
					preMaterial = flickerPrimitive.material;
					flickerPrimitive.geometry = currentGeometry;
					flickerPrimitive.material = flickerMaterial;
				}
			}
		}
	});

	map.on("mouseup", () => {
		if (dragModel) {
			dragModel = false;
			selectModelInstance = undefined;
			if (pauseButton.$button.children[0].innerText === "暂停") {
				animationBlender.play();
			}
			map.cameraController.enableInputs = true;
			modelNameButton.setValue("");
			animationPositions = undefined;
			if (flickerPrimitive !== undefined) {
				flickerPrimitive.geometry = preGeometry;
				flickerPrimitive.material = preMaterial;
				flickerPrimitive = undefined;
			}
			preMaterial = undefined;
			pickAndDragButton.$button.style.backgroundColor = "";
		}
	});

	map.on("mousemove", function (e) {
		if (
			dragModel &&
			selectModelInstance !== undefined &&
			animationBlender !== undefined &&
			animationPositions !== undefined
		) {
			const point = map.painter.getPositionByGPUPick(e.point);
			const pickPosition = minemap.Math.Vector3.fromDegrees(point.x, point.y, point.z);
			updateModelAnimationByPick(
				selectModelInstance,
				animationBlender,
				pickPosition,
				pickTolerance,
				animationPositions
			);
		}
	});

	/**
	 * 更新模型位置和动画运行时间
	 * @param {SceneModel} model 模型对象
	 * @param {AnimationBlender} blender 动画混合器对象
	 * @param {Vector3} pickPosition 鼠标拾取点(世界坐标)
	 * @param {number} tolerance 点吸附线容差
	 * @param {Vector3[]} positions 轨迹点数组(世界坐标)
	 */
	function updateModelAnimationByPick(model, blender, pickPosition, tolerance, positions) {
		let currentTime;
		if (positions.length >= 2) {
			const duration = blender.duration;
			let minDist = Infinity;
			// 点吸附线信息，包含吸附点索引和吸附点坐标
			let adsorptionInformation = {
				index: undefined,
				point: undefined
			};
			let totalDist = 0;
			let insectPointDist = 0;
			for (let i = 1; i < positions.length; i++) {
				// 计算拾取点到轨迹线段的投影
				const segment = minemap.Math.Vector3.subtract(positions[i], positions[i - 1]);
				const segmentToPoint = minemap.Math.Vector3.subtract(pickPosition, positions[i - 1]);
				const projection =
					minemap.Math.Vector3.dot(segmentToPoint, segment) /
					minemap.Math.Vector3.magnitudeSquared(segment);
				// 若投影在线段上，则计算拾取点到线段投影点的世界坐标
				if (projection >= 0 && projection <= 1) {
					// 计算投影点的世界坐标
					const insectPoint = minemap.Math.Vector3.add(
						positions[i - 1],
						segment.multiplyScalar(projection)
					);
					// 计算拾取点到投影点的距离，若小于容差则吸附到该点
					const dist = minemap.Math.Vector3.distance(pickPosition, insectPoint);
					if (dist <= minDist && dist <= tolerance) {
						minDist = dist;
						adsorptionInformation.index = i;
						adsorptionInformation.point = insectPoint;
						insectPointDist = dist;
					}
				}
				totalDist += minemap.Math.Vector3.distance(positions[i], positions[i - 1]);
			}

			if (adsorptionInformation.point !== undefined) {
				model.position = adsorptionInformation.point;
				// 计算投影点所对应的动画运行时间
				currentTime = ((adsorptionInformation.index - 1) / (positions.length - 1)) * duration;
				currentTime +=
					(insectPointDist /
						minemap.Math.Vector3.distance(
							positions[adsorptionInformation.index],
							positions[adsorptionInformation.index - 1]
						) /
						(positions.length - 1)) *
					duration;

				// 设置当前动画运行的时间(动画起止时间差值，单位：秒)
				blender.currentTime = currentTime;
			}
		}
	}

	/**
	 * 更新模型位置和动画运行时间
	 * @param {SceneModel} model 模型对象
	 * @param {AnimationBlender} blender 动画混合器对象
	 * @param {number} currentTime 当前动画运行的时间(动画起止时间差值，单位：秒)
	 * @param {Vector3[]} positions 轨迹点数组(世界坐标)
	 */
	function updateModelAnimationByTime(model, blender, currentTime, positions) {
		const unitInterval = blender.duration / (positions.length - 1); // 计算轨迹段之间的时间间隔
		const index = Math.floor(currentTime / unitInterval); // 计算当前时间所在的轨迹段起点索引
		const periodOfTime = currentTime % unitInterval; // 计算当前时间在当前轨迹某一段轨迹中的时间
		// 计算当前时间在当前轨迹段中的位置，并更新模型位置和设置动画运行时间
		let position;
		if (index < positions.length - 1) {
			const direction = minemap.Math.Vector3.subtract(positions[index + 1], positions[index]).normalize();
			position = positions[index].add(direction.multiplyScalar(periodOfTime));
		} else {
			position = positions[index];
		}

		model.position = position;
		blender.currentTime = currentTime; // 设置当前动画运行的时间(动画起止时间差值，单位：秒)
	}
