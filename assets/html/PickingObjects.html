<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>目标选取（含纹理更新）</title>
    </title>
    <link rel="stylesheet" href="../style/demo.css" />
    <link rel="stylesheet" href="../../dist/minemap.css" />
    <script src="../../dist/minemap-dev.js"></script>
    <!-- <style>
        #map {
            width: 100%;
            height: 100%;
        }
    </style> -->
    <style>
        html,
        body,
        #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        table {
            position: fixed;
            top: 16px;
            right: 14px;
            z-index: 999;
            background: #fff;
            border: solid 1px #000000;
            border-collapse: collapse;
            padding: 2px 3px;
            text-align: center;
        }

        tbody {
            max-height: 600px;
            max-width: 400px;
            display: block;
            overflow: auto;
        }

        td,
        th {
            border: solid 1px #000000;
            border-collapse: collapse;
            padding: 2px 3px;
            text-align: center;
        }

        th {
            font-weight: bold;
        }

        #map {
            position: relative;
        }

        #update {
            position: absolute;
            top: 16px;
            left: 14px;
            z-index: 999;
            border: solid 2px #ffffff;
            padding: 2px 3px;
            text-align: center;
        }

        button {
            margin: 5px;
        }
    </style>
</head>

<body>

    <div id="map">
        <div id="update">
            <button id="updateFence" onclick="updateFenceMaterial()">更新围栏</button>
            <button id="updateArrow" onclick="updateArrowMaterial()">更新箭头</button>
        </div>
    </div>
    <script>
        /**
         * 全局参数设置
         */
        minemap.domainUrl = "https://minedata.cn";
        minemap.dataDomainUrl = "https://minedata.cn";
        minemap.serverDomainUrl = "https://minedata.cn";
        minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
        minemap.serviceUrl = "https://minedata.cn/service/";

        minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
        minemap.solution = 11001;
        window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

        // 定义空底图样式
        var style = {
            glyphs: "minemap://fonts/{fontstack}/{range}",
            sprite: "minemap://sprite/sprite",
            sources: {},
            layers: [],
            version: 8
        };


        /**
         * 初始化地图实例
         */
        var map = new minemap.Map({
            container: "map",
            style: 'https://minedata.cn/service/solu/style/id/12878',
            // style: style,
            /*球面矢量底图样式*/
            center: [116.248815, 40.073050],
            /*地图中心点*/
            bearing: 340,
            zoom: 17,
            /*地图默认缩放等级*/
            pitch: 45,
            /*地图俯仰角度*/
            maxZoom: 22,
            /*地图最大缩放等级*/
            minZoom: 1,
            /*地图最小缩放等级*/
            projection: "MERCATOR"
        });
        map.repaint = true;

        // 第一个电子围栏
        const fencePositions = [116.246040, 40.073956, 116.247040, 40.071956, 116.251321, 40.073216, 116.250421, 40.075216, 116.246040, 40.073956];
        const fenceMaximumHeight = 30.0;
        const fenceGeometry = minemap.Geometries.FenceGeometry.fromConstantHeights({
            positions: minemap.Math.Vector3.fromDegreesArray(fencePositions),
            maximumHeight: fenceMaximumHeight
        });

        // const fenceTexture = minemap.TextureLoader.load({ map, texUrl: "../image/fence.png" });
        const fenceTexture = minemap.TextureLoader.load({ map, texUrl: "http://192.168.152.123/minemapapi/v4.0.0/assets/fence.png" });
        const fenceMaterial = minemap.StandardMaterial.fromType("Texture", {
            baseColorMap: fenceTexture,
            opacity: 1.0,
            doubleSided: true,
        });

        fenceMaterial.flowTexture(
            {
                speed: 10,           // 速度,取值范围：1-10
                direction: "up",   // 纹理流动方向，取值：left,right,up,down,
                rotation: 0,         // 纹理旋转角度，取值范围：0-360
                texRepeat: [0, 0]    // 纹理重复次数，第一个值为横向重复次数，第二个值为纵向重复次数，取值大于0
            }
        );

        const fencePrimitive = new minemap.Primitive({
            geometry: fenceGeometry,

            material: fenceMaterial,

            allowPick: true
        });
        map.addPrimitive(fencePrimitive);

        // 第二个电子围栏
        const arrowPositions = [116.247440, 40.071665, 116.250705, 40.072686];
        const arrowMaximumHeight = 40.0;
        const arrowGeometry = minemap.Geometries.FenceGeometry.fromConstantHeights({
            positions: minemap.Math.Vector3.fromDegreesArray(arrowPositions),
            maximumHeight: arrowMaximumHeight
        });

        const arrowTexture = minemap.TextureLoader.load({ map, texUrl: "http://192.168.152.123/minemapapi/v4.0.0/assets/arrow.png" });
        // const arrowTexture = minemap.TextureLoader.load({ map, texUrl: "../image/arrow.png" });
        const arrowMaterial = minemap.StandardMaterial.fromType("Texture", {
            baseColorMap: arrowTexture,
            opacity: 1.0,
            doubleSided: true,
        });

        arrowMaterial.flowTexture(
            {
                speed: 10,           // 速度,取值范围：1-10
                direction: "right",   // 纹理流动方向，取值：left,right,up,down,
                rotation: 0,         // 纹理旋转角度，取值范围：0-360
                texRepeat: [5, 1]    // 纹理重复次数，第一个值为横向重复次数，第二个值为纵向重复次数，取值大于0
            }
        );

        const arrowPrimitive = new minemap.Primitive({
            geometry: arrowGeometry,

            material: arrowMaterial,

            allowPick: true
        });
        map.addPrimitive(arrowPrimitive);
        arrowPrimitive.name = {
            json: {
                "name": "arrowPrimitive",
                "type": "arrow",
                "position": [116.247440, 40.071665, 116.250705, 40.072686],
                "height": 40.0
            }
        }

        let prePrimitive;
        let preMaterial;
        map.on("click", function (e) {
            const feature = map.getFeatureByGPUPick(e.point);
            if (feature && feature.material) {
                if (prePrimitive) {
                    prePrimitive.material = preMaterial
                }

                prePrimitive = feature;
                preMaterial = feature.material

                feature.material = minemap.StandardMaterial.fromType("Color", { //选中部分，设置高亮颜色
                    color: "rgba(255,255,0,1)",
                    doubleSided: true,
                });

            }
            else {
                if (prePrimitive) {
                    prePrimitive.material = preMaterial
                }
                console.log("未选中任何要素");
            }
        });
        map.on("load", function () {
            /*添加栅格图*/
            // map.addSource("IMAGERY_SOURCE", {
            //     type: "raster", //数据源类型：栅格数据源
            //     tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
            //     tileSize: 512 //瓦片尺寸
            // });

            // map.addLayer({
            //     id: "IMAGERY",
            //     type: "raster", //图层类型为"raster"
            //     source: "IMAGERY_SOURCE",
            //     minzoom: 1,
            //     maxzoom: 23,
            //     paint: {
            //         "raster-opacity": 1
            //     },
            //     "depth-test": true
            // });

        });

        // 更新纹理
        function updateFenceMaterial() {
            console.log("更新围栏纹理");
            // 设置围栏更新纹理参数
            fenceOptions = {
                baseColorMap: minemap.TextureLoader.load({ map, texUrl: "http://192.168.152.123/minemapapi/v4.0.0/assets/fence2.png" }),
                opacity: 1.0,
                doubleSided: true,
            }
            fencePrimitive.material = fenceMaterial.updateTexture("Texture", fenceOptions);
            // 重新设置围栏纹理流动
            fencePrimitive.material.flowTexture(
                {
                    speed: 10,
                    direction: "up",
                    rotation: 0,
                    texRepeat: [0, 0]
                }
            );
        }

        function updateArrowMaterial() {
            console.log("更新箭头纹理");
            // 设置箭头更新纹理参数
            arrowOptions = {
                baseColorMap: minemap.TextureLoader.load({ map, texUrl: "http://192.168.152.123/minemapapi/v4.0.0/assets/arrow1.png" }),
                opacity: 1.0,
                doubleSided: true,
            }
            arrowPrimitive.material = arrowMaterial.updateTexture("Texture", arrowOptions);
            // 重新箭头设置纹理流动
            arrowPrimitive.material.flowTexture(
                {
                    speed: 10,
                    direction: "right",
                    rotation: 0,
                    texRepeat: [5, 1]
                }
            );
        }

    </script>
</body>

</html>
