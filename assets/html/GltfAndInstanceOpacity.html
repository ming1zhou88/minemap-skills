<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>GLFT模型设置透明度</title>
	<!-- demo样式文件 -->
	<link rel="stylesheet" href="../style/demo.css" />
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = "https://minemap.minedata.cn";
	minemap.dataDomainUrl = "https://minemap.minedata.cn";
	minemap.serverDomainUrl = "https://sd-data.minedata.cn";
	minemap.spriteUrl = "http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite";
	minemap.serviceUrl = "https://service.minedata.cn/service";

	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
	minemap.solution = 11001;

	// 定义空底图样式
	var style = {
		glyphs: "minemap://fonts/{fontstack}/{range}",
		sprite: "minemap://sprite/sprite",
		sources: {},
		layers: [],
		version: 8
	};
	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: "map",
		style: style /*球面矢量底图样式*/,
		center: [116.3875, 39.9867] /*地图中心点*/,
		bearing: 0,
		zoom: 14 /*地图默认缩放等级*/,
		pitch: 60 /*地图俯仰角度*/,
		maxZoom: 22 /*地图最大缩放等级*/,
		minZoom: 1 /*地图最小缩放等级*/,
		projection: "MERCATOR"
	});

	var operateParams = {
		GLTFModel: 0.8,
		instance1: 0.5,
		instance2: 1
	};

	map.repaint = true;
	map.enableLight();
	initializeGUI();

	map.on("load", function () {
		/*添加栅格图*/
		map.addSource("IMAGERY_SOURCE", {
			type: "raster", //数据源类型：栅格数据源
			tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			tileSize: 512 //瓦片尺寸
		});

		map.addLayer({
			id: "IMAGERY",
			type: "raster", //图层类型为"raster"
			source: "IMAGERY_SOURCE",
			minzoom: 1,
			maxzoom: 23
		});

		// 添加gltf
		map.addSceneComponent({
			id: "trafficScene",
			type: "3d-model",
			data: "../data/traffic/scene.gltf", // 要加载的gltf格式数据
			modelFolder: "../data/traffic/", // 该数据引用图片等资源的文件夹路径
			scale: [30, 30, 30], // 在xyz轴方向上的缩放比例
			rotation: [90, 90, 0], // 绕xyz轴方向上的旋转，单位为度
			position: [116.3875, 39.9867, 40], // 锚点（模型局部坐标原点）的经纬度位置
			minzoom: 13, //gltf加载显示的最小层级
			maxzoom: 18, //gtlf加载显示的最大层级
			allowPick: true,
			loaded: () => {
				// 模型加载完成的回调函数
			},
			opacity: operateParams.GLTFModel
		});

		// map.addSceneComponent({
		// 	id: "treeGltf",
		// 	type: "3d-model",
		// 	show: true,
		// 	data: "../data/shu-max-003/shu13_new.glb",
		// 	positions:  [new minemap.Math.Vector3([
		// 		116.3935,
		// 		39.9867,
		// 		0
		// 	]), new minemap.Math.Vector3([
		// 		116.3945,
		// 		39.9867,
		// 		0
		// 	])],
		// 	rotations: [ minemap.Math.HeadingPitchRoll.fromDegrees(0, 0, 90), minemap.Math.HeadingPitchRoll.fromDegrees(0, 0, 90)],
		// 	scales: [new minemap.Math.Vector3([60, 80, 100]), new minemap.Math.Vector3([60, 80, 100])],
		// 	instanceNames: ['treeGltf1', 'treeGltf2'],
		// 	opacitys: [operateParams.instance1, operateParams.instance2]
		// });
	});
	function initializeGUI()  {
		const gui = new lil.GUI({ width: 300, title: "透明度控制" });
		gui.add(operateParams, "GLTFModel", 0, 1, 0.01).onChange((value) => {
			map.getSceneComponent('trafficScene').opacity = value;

		});
		// gui.add(operateParams, "instance1", 0, 1, 0.01).onChange((value) => {
		// 	map.getSceneComponent('treeGltf').modelInstanceCollection.getByName('treeGltf1').opacity = value;
		// });
		// gui.add(operateParams, "instance2", 0, 1, 0.01).onChange((value) => {
		// 	map.getSceneComponent('treeGltf').modelInstanceCollection.getByName('treeGltf2').opacity = value;
		// });
	}
</script>
</body>
</html>
