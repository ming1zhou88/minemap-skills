<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>相机近裁剪面最小阈值设定</title>
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<script src="http://192.168.152.123/minemapapi/minemap-CDN/dat.gui/dat.gui.min.js"></script>
	<style>
		html,
		body,
		#map {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}

		.toolContainer {
			display:inline-block;
			position:absolute;
			top:0;
			left:0;
			z-index:999;
			border-radius:5px;
			border: 1px solid white;
			padding: 3px;
			width:400px;
			background: rgba(131,211,111, 0.7);
		}
	</style>
</head>

<body>
	<div id="map">
		<span class="toolContainer">注意：此demo 为了说明在某些情况下，如果minemap的最近裁剪面的阈值影响了深度的话，可以人为调大，这会使得地图绘制更清晰
		但是此项尽量不要随意调整，有可能会导致近处的物体莫名看不到</span>
	</div>
	<script>

		minemap.domainUrl = "https://minedata.cn";
		minemap.dataDomainUrl = "https://minedata.cn";
		minemap.serverDomainUrl = "https://minedata.cn";
		minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
		minemap.serviceUrl = "https://minedata.cn/service/";

		minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
		minemap.solution = 11001;
		window.minemapCDN = 'https://minedata.cn/minemapapi/minemap-CDN'; // minemapCDN 配置

		// 定义空底图样式
		var style = {
			glyphs: "minemap://fonts/{fontstack}/{range}",
			sprite: "minemap://sprite/sprite",
			sources: {},
			layers: [],
			version: 8
		};
		/**
		 * 初始化地图实例
		 */

		var map = new minemap.Map({
			container: "map",
			style: style,
			// style: "https://mineservice.minedata.cn/map/solu/style/11001" /*底图样式*/ /*球面矢量底图样式*/,
			bearing: -87.18744098264303,
			center: [108.94733550459136, 34.30940496948484],
			pitch: 61.603551292866726,
			zoom: 15.7,
			maxZoom: 22 /*地图最大缩放等级*/,
			minZoom: 1 /*地图最小缩放等级*/,
		});
		map.repaint = true;

		map.on("load", function () {
			/*添加栅格图*/
			map.addSource("IMAGERY_SOURCE", {
				"type": "raster",//数据源类型：栅格数据源
				"tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
				"tileSize": 512,//瓦片尺寸
			});

			map.addLayer({
				"id": "IMAGERY",
				"type": "raster", //图层类型为"raster"
				"source": "IMAGERY_SOURCE",
				"minzoom": 1,
				"maxzoom": 23,
				"depth-test": true,
			});

			// 3dtiles
			const tileset = map.addSceneComponent({
				id: "serve",
				type: "3d-tiles",
				show: true,
				translation: new minemap.Math.Vector3(0, 0, 0), //在enu坐标系下的位置移动距离，顺序为[east, north, height]，单位为m，并且只用于3dtiles图层
				url: "https://staticdata-b.minedata.cn:14434/oblique/tileset.json",
				skipLevelOfDetail: false, //跨层调度
				maximumScreenSpaceError: 8,
				sourceLoaded: (tileset) => {
				},
				/**
				 * 飞行选择
				 * index: 指定飞行目标(优先)
				 * combine: 合并bounds为飞行目标
				 */
				geoBoundsOptions: {
					index: 1,
					combine: true
				},
				allowPick: true,
				lightingModel: minemap.LightingModelType.NONE,
			});
			window.tileset = tileset;
		});

		const props = {
			near: 0.1
		};

		initDatGui();
		function initDatGui(){
			const gui = new dat.GUI(); //外部UI
			const fGui = gui.addFolder("近裁剪面参数设置");

			fGui.add(props, "near", 0.1, 10000).onChange(updateNearThreshold);
		}

		function updateNearThreshold(h){
			map.setNearClippingPlaneMinThreshold(h);
		}

	</script>
</body>

</html>
