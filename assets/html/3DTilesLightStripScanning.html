<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>3dtiles加载光带扫描</title>
	<!-- demo样式文件 -->
	<link rel="stylesheet" href="../style/demo.css" />
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>

<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */

	minemap.domainUrl = "https://minedata.cn";
	minemap.dataDomainUrl = "https://minedata.cn";
	minemap.serverDomainUrl = "https://minedata.cn";
	minemap.spriteUrl = "https://minedata.cn/minemapapi/sprite/latest/sprite";
	minemap.serviceUrl = "https://minedata.cn/service/";

	minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
	minemap.solution = 11001;
	window.minemapCDN = "https://minedata.cn/minemapapi/minemap-CDN";

	// 定义空底图样式
	var style = {
		glyphs: "minemap://fonts/{fontstack}/{range}",
		sprite: "minemap://sprite/sprite",
		sources: {},
		layers: [],
		version: 8
	};

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: "map",
		style: style,
		/*球面矢量底图样式*/
		position: [120.37796643765078, 36.07093244353641, 986.0362986138038],
		pitch: 61,
		bearing: -4.5,
		/*地图俯仰角度*/
		maxZoom: 24,
		/*地图最大缩放等级*/
		minZoom: 1,
		/*地图最小缩放等级*/
		projection: "MERCATOR",
		OIT: true,
		logDepth: true
	});
	map.repaint = true;

	map.setTerrain({
		"tiles": ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
		"tileSize": 512,  //瓦片大小
		"maxzoom": 14        //dem最高切分zoom，30米一般是14级；12.5米一般是16级
		// bounds: [130, 60, 140, 70],//要显示区域的经纬度外包框，按west，south，east，north填写
	});
	var sceneComponent;
	map.on("load", function() {
		/*添加栅格图*/
		map.addSource("IMAGERY_SOURCE", {
			type: "raster", //数据源类型：栅格数据源
			tiles: ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			tileSize: 256 //瓦片尺寸
		});

		map.addLayer({
			id: "IMAGERY",
			type: "raster", //图层类型为"raster"
			source: "IMAGERY_SOURCE",
			minzoom: 1,
			maxzoom: 23,
			"depth-test": true,
			paint: {
				"raster-opacity": 1
			}
		});

		sceneComponent = map.addSceneComponent({
			id: "serve",
			type: "3d-tiles",
			url: "https://minemap.minedata.cn/earth_data/oblique/QD/tileset.json" // 要加载的数据
		});

		initializeGUI();
	});

	function initializeGUI() {
		//参数控制面板
		const gui = new lil.GUI({ title: "控制菜单" });
		gui.add({
			"光带扫描": false
		}, "光带扫描").onChange(function(value) {
			if (value) {
				sceneComponent.bloomOptions = {
					selfBloom: true, //是否开启自发光
					bloomWidth: 0.015, //条带的宽度
					bloomSpeed: 50, //条带刷新的速度，单位m/s
				}
			} else {
				sceneComponent.bloomOptions = null;
			}
		});
	}
</script>
</body>
</html>
