<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8"/>
	<title>MSAA Anti-aliasing</title>
	<!-- demo样式文件 -->
	<link rel="stylesheet" href="../style/demo.css"/>
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="https://minedata.cn/minemapapi/v3.4.0/minemap.css"/>
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>
<body>
<div id="map"></div>

<script>
	/**
	 * 全局参数设置
	 */
	minemap.domainUrl = 'https://minemap.minedata.cn';
	minemap.dataDomainUrl = 'https://minemap.minedata.cn';
	minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
	minemap.spriteUrl = 'https://minemap.minedata.cn/minemapapi/v3.4.0/sprite/sprite';
	minemap.serviceUrl = 'https://service.minedata.cn/service';

	minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
	minemap.solution = 11001;

	// 定义空底图样式
	var style = {
		glyphs: "minemap://fonts/{fontstack}/{range}",
		sprite: "minemap://sprite/sprite",
		sources: {},
		layers: [],
		version: 8,
	};

	/**
	 * 初始化地图实例
	 */
	var map = new minemap.Map({
		container: "map",
		// style: 'https://mineservice.minedata.cn/service/solu/style/id/13123' /*球面矢量底图样式*/,
		style: style,
		center: [113.32501634420439, 23.152902258887114] /*地图中心点*/,
		bearing: -43,
		zoom: 17 /*地图默认缩放等级*/,
		pitch: 63 /*地图俯仰角度*/,
		maxZoom: 22 /*地图最大缩放等级*/,
		minZoom: 1 /*地图最小缩放等级*/,
		MSAASamples: 8 // 可以在此处修改MSAA
	});

	map.repaint = true;

	/**
	 * 添加基本球体图层，包括球体表面、天空盒、大气层
	 *
	 */
	map.on("load", function () {

		/*添加栅格图*/
		map.addSource("IMAGERY_SOURCE", {
			"type": "raster",//数据源类型：栅格数据源
			"tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
			"tileSize": 256,//瓦片尺寸
		});

		map.addLayer({
			"id": "IMAGERY",
			"type": "raster", //图层类型为"raster"
			"source": "IMAGERY_SOURCE",
			"minzoom": 1,
			"maxzoom": 23,
			"depth-test": false,
		});

		map.addSceneComponent({
			id: 'road',
			type: "3d-model", // 数据类型为“3d-model”
			// data: "../../complete-data/road.gltf", // 要加载的gltf格式数据
			data: "http://10.130.19.90/had-model/C516EAE3ABC/19174789.gltf", // 要加载的gltf格式数据
			modelFolder: "http://10.130.19.90/had-model/C516EAE3ABC/images", // 该数据引用图片等资源的文件夹路径
			scale: [1, 1, 1], // 在xyz轴方向上的缩放比例
			translation: [0, 0, 0], // 在xyz轴方向上的偏移量，单位为m
			rotation: [90, 0, 0], // 绕xyz轴方向上的旋转，单位为度
			position: [113.32377378902402, 23.153198759912605], // 锚点（模型局部坐标原点）的经纬度位置
		});
	});

	const myObj = {
		"当前参数": "MSAA 4x samples",
		"MSAA off": ()=>{
			setMSAA(1, 'MSAA off')
		},
		"MSAA 2 sample": ()=>{
			setMSAA(2, 'MSAA 2x sample')
		},
		"MSAA 4 samples":()=>{
			setMSAA(4, 'MSAA 4x samples')
		},
		"MSAA 8 samples":()=>{
			setMSAA(8, 'MSAA 8x samples')
		}
	}
	// 设置SSAA
	function setMSAA(number, text) {
		map.MSAASamples = number;
		paramControl.setValue(text);
	}

	const gui = new lil.GUI({title: "参数控制"});
	const paramControl = gui.add(myObj, "当前参数");
	gui.add(myObj, "MSAA off");
	gui.add(myObj, "MSAA 2 sample");
	gui.add(myObj, "MSAA 4 samples");
	gui.add(myObj, "MSAA 8 samples");
</script>
</body>
</html>
