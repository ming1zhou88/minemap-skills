<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>地下显示</title>
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css" />
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
<!--	<script src="http://192.168.152.123/minemap-engine/v4.0.0/minemap.js"></script>-->
	<style>
		html,
		body,
		#map {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>

<body>
	<div id="map"></div>
	<script>
		minemap.domainUrl = "https://minedata.cn";
		minemap.dataDomainUrl = "https://minedata.cn";
		minemap.serverDomainUrl = "https://minedata.cn";
		minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
		minemap.serviceUrl = "https://minedata.cn/service/";

		minemap.key = "0c6ac62182404e5ebc7a789981f6db72";
		minemap.solution = 11001;
		window.minemapCDN = 'https://minedata.cn/minemapapi/minemap-CDN'; // minemapCDN 配置
		// window.minemapCDN = "http://192.168.152.123/minemap-engine/minemap-CDN/"; // minemapCDN 配置 http://192.168.152.123/

		// 定义空底图样式
		var style = {
			glyphs: "minemap://fonts/{fontstack}/{range}",
			sprite: "minemap://sprite/sprite",
			sources: {},
			layers: [],
			version: 8
		};
		/**
		 * 初始化地图实例
		 */

		var map = new minemap.Map({
			container: "map",
			style: style,
			// style: "https://mineservice.minedata.cn/map/solu/style/11001" /*底图样式*/ /*球面矢量底图样式*/,
			center: [120.3855, 36.09],
			pitch: 60,
			zoom: 18,
			maxZoom: 22 /*地图最大缩放等级*/,
			minZoom: 1 /*地图最小缩放等级*/,
			OIT: true, // 开启OIT才能让被遮挡的地下物体显示出来
			enableUnderGround: true,
			terrainSkirtHeight: 0,    //如果开启地表透明，强烈建议将地形裙边设置为0，不然会有透明白线
			logDepth: true
		});

		map.repaint = true;
		// map.enableLight();

		map.setTerrain({
			"tiles": ["https://staticdata-b.minedata.cn:14434/dem/{z}/{r}/{c}/{z}_{x}_{y}.terrain"], //瓦片服务地址
			"tileSize": 512,  //瓦片大小
			"availabilities": ["https://staticdata-b.minedata.cn:14434/dem/layer.json"], // 查询最高级别DEM时必须设定索引文件
		});

		function addBaseLayer() {
			/*添加栅格图*/
			map.addSource("IMAGERY_SOURCE", {
				"type": "raster",//数据源类型：栅格数据源
				"tiles": ["https://staticdata-b.minedata.cn:14434/satellite/{z}/{r}/{c}/{z}_{x}_{y}.jpg"], //瓦片服务地址
				"tileSize": 512,//瓦片尺寸
			});

			map.addLayer({
				"id": "IMAGERY",
				"type": "raster", //图层类型为"raster"
				"source": "IMAGERY_SOURCE",
				"minzoom": 1,
				"maxzoom": 23,
				"depth-test": true,
				"paint": {
					"raster-opacity": 0.7,
					// "raster-contrast": 0.5
				},
			});
		}

		function add3DTile() {
			map.addSceneComponent({
				id: "serve",
				type: "3d-tiles",
				show: true,
				translation: new minemap.Math.Vector3(0, 0, -20), //在enu坐标系下的位置移动距离，顺序为[east, north, height]，单位为m，并且只用于3dtiles图层
				url: "../data/bimangle/pipeline/tileset.json",
				skipLevelOfDetail: false, //跨层调度
				maximumScreenSpaceError: 8,
				allowPick: true,
				lightingModel: minemap.LightingModelType.PBR
			});
		}

		map.on("load", function () {
			addBaseLayer()
			add3DTile()
			createGUI()
		});

		const props = {
			"栅格不透明度": 0.7,
			OIT: true,
			"地下模式": true
		}

		function createGUI() {
			const gui = new lil.GUI({ width: 300 });
			const common = gui.addFolder("通用设置");
			common.open();
			common.add(props, "栅格不透明度", 0, 1).onChange((value) => {
				map.setPaintProperty("IMAGERY", "raster-opacity", value);
			});
			common.add(props, "OIT").onChange((value) => {
				map.OIT = value;
			});
			common.add(props, "地下模式").onChange((value) => {
				map.enableUnderGround = value;
			});
		}
	</script>
</body>

</html>
