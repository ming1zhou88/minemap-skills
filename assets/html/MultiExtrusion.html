<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>多个Extrusion图层叠加</title>
	<!-- demo样式文件 -->
	<link rel="stylesheet" href="../style/demo.css">
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css">
	<script src="../../dist/minemap-dev.js"></script>
	<style>
		#map {
			width: 100%;
			height: 100%;
		}
	</style>
</head>

<body>
<div id="map"></div>
<script>
	/**
	 * 全局参数设置
	 */

	minemap.domainUrl = 'https://minemap.minedata.cn';
	minemap.dataDomainUrl = 'https://minemap.minedata.cn';
	minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
	minemap.spriteUrl = 'http://192.168.152.123/minemapapi/v4.0.0/sprite/sprite';
	minemap.serviceUrl = 'https://service.minedata.cn/service';

	minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
	minemap.solution = 12878;

	var style = {
		"glyphs": "minemap://fonts/{fontstack}/{range}",
		"sprite": "minemap://sprite/sprite",
		"sources": {},
		"layers": [{
			"id": "background",
			"type": "background",
			"source": "",
			"paint": {
				"background-color": "#F9F5ED"
			}
		}],
		"version": 8
	};

	var map = new minemap.Map({
		container: 'map',
		style,
		//style: 'https://service.minedata.cn/map/solu/style/12878',
		center: [116.45948196424372, 39.92045875385242],
		zoom: 19.277165613422934,
		pitch: 60.773745788686874,
		bearing: -33.16218935897954,
		// maxZoom: 17,
		minZoom: 3,
		projection: 'MERCATOR'
	});

	/**
	 * 创建地图对象后，开始加载地图资源，地图资源加载完成后触发load事件
	 */
	map.on('load', function () {
		// 增加自定义数据源、自定义图层
		addSources();
		addLayers();
	});

	function addSources() {
		map.addSource("buildingSource", {
			type: "vector",
			tiles: ["cloudservice://mvt-layer/merge/{z}/{r}/{c}/{z}_{x}_{y}.pbf"],
		});
	}

	function addLayers() {
		map.addLayer({
			"layout": { "visibility": "visible" },
			"maxzoom": 20,
			"paint": {
				"extrusion-height": 10, // 高度为10
				"extrusion-color": "#0c3b70",
				"extrusion-base": 0, // 底部高度为0
				"extrusion-opacity": 1.0,
				"extrusion-translate-anchor": "viewport",
				"extrusion-translate": [0, 0]
			},
			"source": "buildingSource", // 共用一个source
			"source-layer": "building",
			"id": "buildingLayer",
			"type": "extrusion",
			"minzoom": 10,
		});
		map.addLayer({
			"layout": { "visibility": "visible" },
			"maxzoom": 20,
			"paint": {
				"extrusion-height": 20, // 高度为20
				"extrusion-color": "#2bd610",
				"extrusion-base": 10, // 底部高度为10
				"extrusion-opacity": 1.0,
				"extrusion-translate-anchor": "viewport",
				"extrusion-translate": [0, 0]
			},
			"source": "buildingSource", // 共用一个source
			"source-layer": "building",
			"id": "buildingLayer2",
			"type": "extrusion",
			"minzoom": 10,
		});
	}

</script>
</body>
