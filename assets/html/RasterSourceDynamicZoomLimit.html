<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
	<title>栅格数据源动态大小比例尺设定</title>
	<!-- 引入MineMap API插件 -->
	<link rel="stylesheet" href="../../dist/minemap.css">
	<script src="../../dist/minemap-dev.js"></script>
	<script src="../js/lil-gui.umd.min.js"></script>
	<style>
		html,
		body,
		#map {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
		}
	</style>
</head>

<body>
	<div id="map"></div>
	<script>
		/**
		 * 全局参数设置
		 */
		minemap.domainUrl = 'https://minemap.minedata.cn';
		minemap.dataDomainUrl = 'https://minemap.minedata.cn';
		minemap.serverDomainUrl = 'https://sd-data.minedata.cn';
		minemap.spriteUrl = 'https://minemap.minedata.cn/minemapapi/v4.0.0/sprite/sprite';
		minemap.serviceUrl = 'https://service.minedata.cn/service';

		minemap.key = '0c6ac62182404e5ebc7a789981f6db72';
		minemap.solution = 11001;

		// 定义空底图样式
		var style = {
			"glyphs": "minemap://fonts/{fontstack}/{range}",
			"sprite": "minemap://sprite/sprite",
			"sources": {},
			"layers": [],
			"version": 8
		};

		/**
		 * 初始化地图实例
		 */
		var map = new minemap.Map({
			container: 'map',
			style: style, /*球面矢量底图样式*/
			position:[115.55233803732919, 35.56765427117358, 84.24987551030172],
			zoom: 5, /*地图默认缩放等级*/
			pitch: 75, /*地图俯仰角度*/
			maxZoom: 22, /*地图最大缩放等级*/
			minZoom: 1,  /*地图最小缩放等级*/
			projection: 'MERCATOR'
		});
		map.repaint = true
		/**
		 * 添加基本球体图层，包括球体表面、天空盒、大气层
		 *
		 */
		map.on('load', function () {
			/*添加DEM数字高程模型数据*/
			map.addSource("3D_SOURCE", {
				"type": "raster",//DEM的数据类型为"raster"
				"tiles": ["https://ol-data.minedata.cn/service/data/satellite?x={x}&y={y}&z={z}"], //瓦片服务地址
				"tileSize": 512,  //瓦片大小
			});
			map.addLayer({
				"type": "raster",//DEM的图层类型为"raster"
				"id": "3d-layer",
				"source": "3D_SOURCE",
				"minzoom": 1,
				"maxzoom": 20,
				"layout": {}
			})
		});


		const gui = new lil.GUI();

		// 存储比例尺值的对象
		const scaleSettings = {
			minScale: 1,    // 最小比例尺，默认1
			maxScale: 17,   // 最大比例尺，默认17
		};

		// 创建最小比例尺控制器
		const minScaleFolder = gui.addFolder('最小比例尺');
		const minScaleController = minScaleFolder.add(scaleSettings, 'minScale', 1, 17)
			.step(1)  // 只能选择整数
			.name('最小比例尺 (1-17)')
			.onFinishChange(updateScales);

		// 创建最大比例尺控制器
		const maxScaleFolder = gui.addFolder('最大比例尺');
		const maxScaleController = maxScaleFolder.add(scaleSettings, 'maxScale', 1, 17)
			.step(1)  // 只能选择整数
			.name('最大比例尺 (1-17)')
			.onFinishChange(updateScales);

		// 初始时确保最大值不小于最小值
		maxScaleController.min(scaleSettings.minScale);

		// 响应比例尺变化的函数
		function updateScales() {
			// 确保最大值不小于最小值
			if (scaleSettings.maxScale < scaleSettings.minScale) {
				scaleSettings.maxScale = scaleSettings.minScale;
				maxScaleController.updateDisplay(); // 更新显示
			}

			// 或者反过来确保最小值不大于最大值
			if (scaleSettings.minScale > scaleSettings.maxScale) {
				scaleSettings.minScale = scaleSettings.maxScale;
				minScaleController.updateDisplay(); // 更新显示
			}

			// 这里添加你的响应逻辑
			console.log(`比例尺已更新 - 最小: ${scaleSettings.minScale}, 最大: ${scaleSettings.maxScale}`);

			const source = map.getSource('3D_SOURCE');
			if (source){
				source.minzoom = scaleSettings.minScale;
				source.maxzoom = scaleSettings.maxScale;
			}

		}

	</script>
</body>
